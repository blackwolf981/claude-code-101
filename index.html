<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 101 — Interactive Learning Guide</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">

  <style>
    :root {
      --bg:        #111111;
      --surface:   #1c1c1c;
      --border:    rgba(255,255,255,0.07);
      --border-md: rgba(255,255,255,0.13);
      --text:      #F0F0F0;
      --text-sec:  #A0A0A0;
      --text-ter:  #606060;
      --accent:    #FFD166;
      --accent-bg: #2b2200;
      --radius:    10px;
      --radius-lg: 14px;
      --sidebar-w: 270px;
      --header-h:  53px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    button { font-family: system-ui, -apple-system, sans-serif; }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border-md);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: baseline;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      height: var(--header-h);
    }
    .header-title {
      font-family: Georgia, serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
    }
    .header-sub {
      font-size: 12px;
      color: var(--text-sec);
    }
    .header-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 500;
      background: var(--accent-bg);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .layout { display: flex; flex: 1; min-height: 0; }

    /* ── Sidebar ────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 0.5px solid var(--border-md);
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #sb-nav { flex: 1; }

    .ch-btn {
      width: 100%;
      text-align: left;
      padding: 10px 1.25rem;
      background: none;
      border: none;
      border-left: 2px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      transition: all .15s;
    }
    .ch-btn:hover { background: var(--bg); }
    .ch-btn.active { border-left-color: var(--accent); background: var(--accent-bg); }
    .ch-btn-inner { flex: 1; min-width: 0; }
    .ch-part {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-ter);
      font-weight: 500;
      margin-bottom: 2px;
    }
    .ch-btn.active .ch-part { color: var(--accent); }
    .ch-name { display: block; font-size: 12.5px; color: var(--text-sec); line-height: 1.35; }
    .ch-btn.active .ch-name { color: var(--accent); font-weight: 500; }
    .ch-chevron {
      font-size: 13px;
      color: var(--text-ter);
      transition: transform .2s;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .ch-btn.active .ch-chevron { transform: rotate(90deg); color: var(--accent); }

    .ch-sections { display: none; background: var(--bg); border-bottom: 0.5px solid var(--border); }
    .ch-sections.open { display: block; }

    .obj-panel { padding: 10px 1.25rem 10px 1.5rem; border-bottom: 0.5px solid var(--border); }
    .obj-title { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); margin-bottom: 6px; }
    .obj-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .obj-list li { font-size: 12px; color: var(--text-sec); line-height: 1.4; padding-left: 12px; position: relative; }
    .obj-list li::before { content: '·'; position: absolute; left: 0; color: var(--accent); }

    .sidebar-item {
      display: flex; flex-direction: column;
      padding: 8px 1.25rem 8px 1.5rem;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all .15s;
    }
    .sidebar-item:hover { background: var(--surface); }
    .sidebar-item.active { border-left-color: var(--accent); background: var(--surface); }
    .si-lesson { font-size: 11px; color: var(--text-ter); margin-bottom: 1px; }
    .si-title  { font-size: 13px; color: var(--text); line-height: 1.4; }
    .sidebar-item.active .si-lesson,
    .sidebar-item.active .si-title { color: var(--accent); font-weight: 500; }

    .refl-panel { padding: 10px 1.25rem 12px; border-top: 0.5px solid var(--border); }
    .refl-title { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); margin-bottom: 6px; }
    .refl-item {
      font-size: 12px; color: var(--text-sec);
      padding: .4rem .5rem;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer; margin-bottom: 4px;
      line-height: 1.4; transition: all .15s;
      display: flex; align-items: flex-start; gap: .4rem;
    }
    .refl-item:hover { background: var(--surface); border-color: var(--border-md); }
    .refl-item i { flex-shrink: 0; font-size: 13px; color: var(--text-ter); margin-top: 1px; }
    .refl-hint { font-size: 11.5px; color: var(--accent); padding: .35rem .5rem .5rem 1.5rem; display: none; line-height: 1.45; }
    .refl-hint.open { display: block; }

    /* ── Language switcher ──────────────────────────────────────── */
    .lang-bar { padding: .75rem 1.25rem; border-top: 0.5px solid var(--border-md); }
    .lang-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-ter); margin-bottom: .4rem; }
    .lang-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .lang-btn {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      border: 0.5px solid var(--border-md); background: none;
      cursor: pointer; color: var(--text-sec); transition: all .15s;
    }
    .lang-btn:hover { background: var(--surface); }
    .lang-btn.active { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 600; }

    /* ── Content ────────────────────────────────────────────────── */
    .content { flex: 1; padding: 2rem 2.5rem 3rem; max-width: 900px; overflow-y: auto; }

    .sec-lesson { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); font-weight: 500; margin-bottom: .5rem; }
    .sec-title  { font-size: 22px; font-weight: 500; color: var(--text); line-height: 1.2; margin-bottom: .25rem; }
    .sec-sub    { font-size: 13px; color: var(--text-sec); margin-bottom: 1.5rem; }
    .sec-gap    { margin-bottom: 1.5rem; }

    /* ── Notes ──────────────────────────────────────────────────── */
    .note-youtube {
      width: 100%; aspect-ratio: 16/9;
      border-radius: var(--radius); overflow: hidden;
      border: 0.5px solid var(--border-md); margin-bottom: 1.25rem;
    }
    .note-youtube iframe { width: 100%; height: 100%; display: block; border: none; }

    .note-desc { font-size: 13px; color: var(--text-sec); line-height: 1.65; margin-bottom: 1rem; }

    .note-tip {
      display: flex; align-items: flex-start; gap: .5rem;
      background: rgba(125,211,252,0.08); border-left: 2px solid #38BDF8;
      padding: 9px 13px; font-size: 12px; line-height: 1.6;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #7DD3FC; margin-bottom: .75rem;
    }
    .note-tip i { flex-shrink: 0; margin-top: .1rem; }

    .note-warning {
      display: flex; align-items: flex-start; gap: .5rem;
      background: rgba(251,146,60,0.08); border-left: 2px solid #FB923C;
      padding: 9px 13px; font-size: 12px; line-height: 1.6;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #FB923C; margin-bottom: .75rem;
    }
    .note-warning i { flex-shrink: 0; margin-top: .1rem; }

    .note-subsection {
      font-size: 10px; text-transform: uppercase; letter-spacing: .07em;
      color: var(--text-ter); padding-top: 1rem; margin: .5rem 0 .75rem;
      border-top: 0.5px solid var(--border);
    }

    /* ── View toggle ────────────────────────────────────────────── */
    .view-toggle { display: flex; gap: 6px; margin-bottom: 1.25rem; align-items: center; }
    .view-label  { font-size: 12px; color: var(--text-ter); margin-right: 4px; }
    .view-btn {
      padding: 4px 12px; border-radius: 20px;
      border: 0.5px solid var(--border-md); background: transparent;
      font-size: 12px; color: var(--text-sec); cursor: pointer;
      display: flex; align-items: center; gap: .3rem; transition: all .15s;
    }
    .view-btn:hover { background: var(--surface); }
    .view-btn.active { background: var(--accent); color: #111; border-color: transparent; font-weight: 500; }

    /* ── Feature cards ──────────────────────────────────────────── */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px; margin-bottom: 1rem;
    }
    .feature-grid.hide { display: none; }

    .feature-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 1rem 1.25rem;
      cursor: pointer; transition: border-color .15s; user-select: none;
    }
    .feature-card:hover { border-color: var(--border-md); }
    .feature-card.selected { border: 1.5px solid var(--accent); }
    .feature-card.selected .feature-name i { color: var(--accent); }

    .badge {
      display: inline-block; font-size: 10px; padding: 2px 8px;
      border-radius: 20px; margin-bottom: 8px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge-when    { background: rgba(134,239,172,0.12); color: #86EFAC; }
    .badge-caution { background: rgba(251,146,60,0.12);  color: #FB923C; }
    .badge-rare    { background: rgba(255,255,255,0.07);  color: #A0A0A0; }

    .feature-name {
      font-size: 14px; font-weight: 500; color: var(--text);
      margin-bottom: 4px; display: flex; align-items: center; gap: .35rem;
    }
    .feature-name i { font-size: 15px; color: var(--text-ter); }
    .feature-desc { font-size: 12px; color: var(--text-sec); line-height: 1.5; }

    /* ── Feature table ──────────────────────────────────────────── */
    .features-table {
      width: 100%; border-collapse: collapse; display: none;
      margin-bottom: 1rem; font-size: 13px; background: var(--surface);
      border-radius: var(--radius-lg); overflow: hidden;
      border: 0.5px solid var(--border); table-layout: fixed;
    }
    .features-table.show { display: table; }
    .features-table th {
      text-align: left; padding: 9px 14px; background: var(--bg);
      color: var(--text-sec); font-weight: 500; font-size: 11px;
      text-transform: uppercase; letter-spacing: .04em;
      border-bottom: 0.5px solid var(--border-md);
    }
    .features-table td {
      padding: 10px 14px; border-bottom: 0.5px solid var(--border);
      color: var(--text); vertical-align: top; line-height: 1.5; cursor: pointer;
    }
    .features-table tr:last-child td { border-bottom: none; }
    .features-table tr:hover td { background: var(--bg); }
    .features-table tr.row-selected td { background: var(--accent-bg); }

    /* ── Detail panel — inline 2×2 ──────────────────────────────── */
    .detail-panel {
      background: var(--surface); border: 1.5px solid var(--accent);
      border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem;
    }
    .detail-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 1rem;
    }
    .detail-title {
      font-size: 15px; font-weight: 500; color: var(--text);
      display: flex; align-items: center; gap: .5rem;
    }
    .detail-title i { color: var(--accent); font-size: 16px; }
    .detail-title .badge { margin-bottom: 0; }
    .detail-close {
      background: none; border: 0.5px solid var(--border-md);
      color: var(--text-ter); font-size: 12px; padding: 3px 10px;
      border-radius: 20px; cursor: pointer;
      display: flex; align-items: center; gap: 4px; transition: all .15s; flex-shrink: 0;
    }
    .detail-close:hover { color: var(--text); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detail-cell { padding: 10px 14px; background: var(--bg); border-radius: var(--radius); }
    .detail-cell-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-ter); margin-bottom: 4px; }
    .detail-cell-val   { font-size: 13px; color: var(--text); line-height: 1.6; }

    /* ── Chapter overview ──────────────────────────────────────────── */
    .ch-overview { padding: 0; }
    .ch-overview-header { margin-bottom: 2rem; }
    .ch-overview-num { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); font-weight: 500; margin-bottom: .4rem; }
    .ch-overview-title { font-size: 26px; font-weight: 500; color: var(--text); line-height: 1.2; margin-bottom: 0; }

    .ch-overview-block { margin-bottom: 2rem; }
    .ch-overview-block-title { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); font-weight: 500; margin-bottom: .75rem; padding-bottom: .5rem; border-bottom: 0.5px solid var(--border); }

    .ch-obj-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .ch-obj-list li { font-size: 14px; color: var(--text-sec); line-height: 1.5; padding-left: 16px; position: relative; }
    .ch-obj-list li::before { content: '·'; position: absolute; left: 0; color: var(--accent); font-size: 16px; line-height: 1.3; }

    .ch-lesson-list { display: flex; flex-direction: column; gap: 8px; }
    .ch-lesson-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: .9rem 1.25rem;
      cursor: pointer; transition: border-color .15s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .ch-lesson-card:hover { border-color: var(--border-md); }
    .ch-lesson-card-left { display: flex; flex-direction: column; gap: 2px; }
    .ch-lesson-card-num { font-size: 11px; color: var(--text-ter); }
    .ch-lesson-card-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .ch-lesson-card i { font-size: 16px; color: var(--text-ter); }

    .ch-refl-list { display: flex; flex-direction: column; gap: 6px; }
    .ch-refl-item {
      font-size: 13px; color: var(--text-sec);
      padding: .6rem .75rem;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer; line-height: 1.5; transition: all .15s;
      display: flex; align-items: flex-start; gap: .5rem;
    }
    .ch-refl-item:hover { background: var(--surface); border-color: var(--border-md); }
    .ch-refl-item i { flex-shrink: 0; font-size: 14px; color: var(--text-ter); margin-top: 2px; }
    .ch-refl-hint { font-size: 12px; color: var(--accent); padding: .4rem .75rem .5rem 2rem; display: none; line-height: 1.5; }
    .ch-refl-hint.open { display: block; }

    /* ── Footer ─────────────────────────────────────────────────── */
    .footer { text-align: center; padding: 1.5rem; font-size: 12px; color: var(--text-ter); border-top: 0.5px solid var(--border); }

    /* ── Quiz: sidebar links ───────────────────────────────────────── */
    .ch-quiz-btn {
      background: none; border: 0.5px solid var(--border-md);
      border-radius: 6px; color: var(--text-ter);
      width: 24px; height: 24px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; font-size: 13px; margin-top: 1px;
    }
    .ch-quiz-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }

    .ch-total-btn {
      width: 100%; text-align: left; padding: 12px 1.25rem;
      background: none; border: none; border-top: 0.5px solid var(--border-md);
      border-left: 2px solid transparent; cursor: pointer;
      display: flex; align-items: center; gap: 8px; transition: all .15s;
    }
    .ch-total-btn:hover { background: var(--bg); }
    .ch-total-btn.active { border-left-color: var(--accent); background: var(--accent-bg); }
    .ch-total-btn i { font-size: 16px; color: var(--text-ter); }
    .ch-total-btn.active i { color: var(--accent); }
    .ch-total-inner { flex: 1; }
    .ch-total-part { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); font-weight: 500; }
    .ch-total-btn.active .ch-total-part { color: var(--accent); }
    .ch-total-name { display: block; font-size: 12.5px; color: var(--text-sec); }
    .ch-total-btn.active .ch-total-name { color: var(--accent); font-weight: 500; }

    /* ── Quiz: lesson inline block ─────────────────────────────────── */
    .quiz-start-block {
      margin-top: 1.5rem; padding: 1.5rem;
      background: var(--surface); border: 0.5px solid var(--border-md);
      border-radius: var(--radius-lg); text-align: center;
    }
    .quiz-start-icon { font-size: 32px; margin-bottom: .5rem; }
    .quiz-start-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: .25rem; }
    .quiz-start-desc { font-size: 12.5px; color: var(--text-sec); margin-bottom: 1rem; line-height: 1.5; }

    /* ── Quiz: full-panel (chapter / total) ────────────────────────── */
    .quiz-panel-header { margin-bottom: 1.5rem; }
    .quiz-panel-label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); font-weight: 500; margin-bottom: .4rem; }
    .quiz-panel-title { font-size: 24px; font-weight: 500; color: var(--text); line-height: 1.2; }

    /* ── Quiz: shared engine UI ────────────────────────────────────── */
    .quiz-engine {
      background: var(--surface); border: 0.5px solid var(--border-md);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .quiz-bar {
      padding: 1rem 1.25rem; border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 1rem;
    }
    .quiz-bar-count { font-size: 12px; color: var(--text-sec); white-space: nowrap; font-weight: 500; }
    .quiz-bar-count span { color: var(--accent); }
    .quiz-progress { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .quiz-progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .35s ease; }
    .quiz-engine-body { padding: 1.5rem; }

    .quiz-question { font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.45; margin-bottom: 1.25rem; }
    .quiz-options { display: flex; flex-direction: column; gap: 8px; }
    .quiz-option {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--bg);
      border: 0.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: all .13s; font-size: 14px; color: var(--text-sec);
    }
    .quiz-option:not(.answered):hover { border-color: var(--accent); color: var(--text); background: var(--accent-bg); }
    .quiz-option.answered { cursor: default; }
    .quiz-option.correct { background: rgba(134,239,172,0.10); border-color: rgba(134,239,172,0.30); color: #86EFAC; }
    .quiz-option.wrong   { background: rgba(248,113,113,0.10); border-color: rgba(248,113,113,0.30); color: #FB7185; }
    .quiz-option.reveal  { background: rgba(134,239,172,0.10); border-color: rgba(134,239,172,0.30); color: #86EFAC; opacity: .6; }
    .quiz-option-letter {
      width: 24px; height: 24px; border-radius: 5px; background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .quiz-option.correct .quiz-option-letter { background: rgba(134,239,172,0.20); }
    .quiz-option.wrong .quiz-option-letter   { background: rgba(248,113,113,0.20); }
    .quiz-option.reveal .quiz-option-letter  { background: rgba(134,239,172,0.20); }

    .quiz-explain {
      display: none; margin-top: 1rem; padding: 10px 14px;
      background: var(--bg); border-left: 2px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      font-size: 12.5px; color: var(--text-sec); line-height: 1.6;
    }
    .quiz-explain.show { display: block; }
    .quiz-engine-foot { margin-top: 1.5rem; display: flex; justify-content: flex-end; }

    .quiz-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #111;
      font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600;
      padding: 9px 20px; border-radius: 8px; border: none; cursor: pointer; transition: opacity .15s;
    }
    .quiz-btn:hover { opacity: .88; }
    .quiz-btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; color: var(--text-sec);
      font-family: system-ui, sans-serif; font-size: 13px; font-weight: 500;
      padding: 9px 20px; border-radius: 8px; border: 0.5px solid var(--border-md); cursor: pointer; transition: all .15s;
    }
    .quiz-btn-ghost:hover { color: var(--text); background: var(--surface); }

    /* ── Quiz: final score ─────────────────────────────────────────── */
    .quiz-final { text-align: center; padding: 1.5rem 1rem; }

samodejno, ti ga ne upravljaš. Za kritične dolge naloge pa raje razdeli seje."}, {"id": 12, "q": "Kaj so 'tools' v kontekstu Claude Code?", "options": ["Fizična orodja", "Razlog, da Claude Code izvaja akcije — branje datotek, splet, terminal", "Nastavitve videza", "Tipkovne bližnjice"], "correct": 1, "explanation": "Tools so ločnica med chatbotom in agentom — vsako orodje je akcija v resničnem svetu, ne samo besedilo."}, {"id": 13, "q": "Kaj naredi Default Mode?", "options": ["Izvede vse brez vprašanja", "Vpraša za dovoljenje pred vsako datoteko ali ukazom", "Onemogoči terminal", "Samo bere kodo"], "correct": 1, "explanation": "V Default Mode Claude Code pokaže vsako akcijo in počaka na tvoje 'yes'. Priporočeno za začetnike in kritične sisteme."}, {"id": 14, "q": "Česa Auto-accept Mode NE naredi samodejno?", "options": ["Urejanja datotek", "Terminal ukazov (npm install, git push)", "Branja kode", "Ničesar — vse dela samodejno"], "correct": 1, "explanation": "V Auto-accept Mode datoteke ureja samodejno, ampak terminal ukazi še vedno zahtevajo potrditev."}, {"id": 15, "q": "Kaj počne Claude Code v Plan Mode?", "options": ["Takoj izvede vse spremembe", "Samo bere in sestavi načrt — nobene spremembe dokler ne odobriš", "Izbriše nepotrebne datoteke", "Se izklopi"], "correct": 1, "explanation": "V Plan Mode uporablja samo bralna orodja in sestavi natančen načrt. Šele po odobritvi preide v izvedbo. Aktiviraš s Shift+Tab."}, {"id": 16, "q": "Kdaj je Plan Mode najbolj smiseln?", "options": ["Za majhne, enostavne naloge", "Pred večjimi ali tveganimi spremembami: refaktoring, migracije, brisanje", "Nikoli", "Samo za branje dokumentacije"], "correct": 1, "explanation": "Plan Mode je obvezen varnostni korak za kompleksne naloge, kjer napaka pride drago."}, {"id": 17, "q": "Ali je zanka zaklenjena, ko Claude Code dela?", "options": ["Da, ne moreš poseči vmes", "Ne — kadarkoli lahko dodaš kontekst, prekineš ali preusmeriš", "Samo v Default Mode lahko posežeš", "Samo če ustaviš terminal"], "correct": 1, "explanation": "Med agentno zanko lahko kadarkoli dodaš kontekst, prekineš izvajanje ali preusmeriš Claude Code."}]}]}, {"id": 2, "title": "Your first prompt", "objectives": ["Vedeti, da Claude Code deluje v terminalu, IDE-jih, Desktop appu in spletu — enako orodje, različna okolja", "Razumeti razliko med okolji: katera zahtevajo namestitev, katera ne", "Znati izbrati pravo okolje glede na lastni profil in način dela", "Razumeti koncept delovnega direktorija — kaj Claude Code vidi in česa ne"], "reflections": ["Katero okolje bi izbral za svoje delo? Zakaj?|Desktop je najboljša izbira za ne-developerje — zaženeš ga brez terminala, dela v ozadju, in imaš vizualni vmesnik. Web je odlična alternativa, če delaš na GitHub projektih.", "Zakaj Claude Code 'ne vidi' datoteke, ki jo imaš odprto kje drugje?|Claude Code vidi samo mapo, v kateri si ga zagnal, in vse njene podmape. Datoteke zunaj tega direktorija zanjo preprosto ne obstajajo.", "Katera metoda namestitve ne podpira samodejnih posodobitev?|Metoda curl — direkten prenos skripte. Za samodejne posodobitve uporabi npm ali brew (macOS).", "Zakaj je pri namestitvi važno, kateri račun izbereš?|Claude Code te med namestitvijo vpraša za Pro, Team ali Enterprise. Napačna prijava pomeni napačen model, napačne limite — posebej kritično za organizacije z Enterprise računom."], "sections": [{"id": 3, "lesson": "Lekcija 1", "title": "Installing Claude Code", "features": [{"id": 15, "section_id": 3, "name": "Terminal", "icon": "ti-terminal-2", "badge_type": "when", "badge_text": "Največja kontrola", "short_desc": "Namesti prek npm, brew ali curl — direkten dostop, priporočen za napredne", "what_it_does": "V terminalu namestiš Claude Code z enim ukazom: npm install ali brew install za macOS. Obstaja tudi curl metoda, a ta ne podpira samodejnih posodobitev. Na Windowsu uporabiš PowerShell ali winget. Po namestitvi poženete ukaz claude in Claude Code se zažene.", "when_to_use": "Ko že delaš v terminalu, ko hočeš najbolj svežo verzijo Claude Code, ali ko potrebuješ polno kontrolo nad namestitvijo in posodobitvami.", "when_not": "Ni najboljša izbira za ne-developerje — zahteva Node.js in osnovno poznavanje terminala. Za začetnike je Desktop app boljša pot.", "why_it_matters": "Terminal daje največjo svobodo in je vedno prvi, ki dobi nove funkcije. Če veš, kaj delaš — to je tvoje okolje.", "sort_order": 1}, {"id": 16, "section_id": 3, "name": "Visual Studio Code", "icon": "ti-brand-vscode", "badge_type": "when", "badge_text": "Za VS Code uporabnike", "short_desc": "Razširitev v VS Code — Claude Code teče vzporedno z editorjem", "what_it_does": "V VS Code odpreš ploščo Extensions, poiščeš 'Claude Code' in namestiš razširitev Anthropic. Po namestitvi restartiraj VS Code, odpri ukazno paleto (Ctrl+Shift+P) in poišči 'Open in New Tab'. Claude logo bo viden v stranski vrstici.", "when_to_use": "Ko že delaš v VS Code in hočeš Claude Code neposredno ob svoji kodi — brez preklapljanja med okni.", "when_not": "Če ne delaš v VS Code, ni razloga za to pot. Desktop ali Web sta enostavnejša.", "why_it_matters": "VS Code razširitev ti da terminalno izkušnjo Claude Code znotraj editorja — Claude Code vidi tvojo kodo, ti pa vidiš Claude Code. Vse na enem mestu.", "sort_order": 2}, {"id": 17, "section_id": 3, "name": "JetBrains", "icon": "ti-device-laptop", "badge_type": "when", "badge_text": "Za JetBrains IDE-je", "short_desc": "Plugin iz JetBrains Marketplace — deluje vzporedno z editorjem", "what_it_does": "Namestiš Claude Code plugin iz JetBrains Marketplace, restartiraj IDE. Ob kliku na Claude logo se odpre stranski panel s terminalno izkušnjo — Claude Code dela vzporedno s tvojim editorjem.", "when_to_use": "Ko delaš v JetBrains IDE-jih (IntelliJ, PyCharm, WebStorm…) in hočeš Claude Code ob svoji kodi.", "when_not": "Samo za JetBrains ekosistem — za VS Code ali terminal uporabi drugo pot.", "why_it_matters": "JetBrains IDE-ji so priljubljeni med profesionalnimi razvijalci. Plugin prinaša enako izkušnjo kot VS Code razširitev — Claude Code ob editorju, brez menjave orodij.", "sort_order": 3}, {"id": 18, "section_id": 3, "name": "Claude Desktop", "icon": "ti-device-desktop", "badge_type": "when", "badge_text": "Brez terminala", "short_desc": "Toggle 'Code' v Desktop appu — idealno za ne-developerje", "what_it_does": "Po namestitvi in prijavi v Claude Desktop app najdeš toggle 'Code' na vrhu vmesnika. Klikni ga — in Claude Code je aktiven. Omogoča delo v specifični mapi, spreminjanje dovoljenj in celo delo v oblačnem okolju.", "when_to_use": "Ko hočeš Claude Code brez terminala in brez nameščanja paketov. Desktop app je najboljša vstopna točka za ne-developerje — vizualen vmesnik, dela v ozadju.", "when_not": "Ni za napredne scenarije, kjer rabiš polno kontrolo nad terminalom ali nastavitvami.", "why_it_matters": "Desktop odstranjuje tehnično bariero. Ne rabiš vedeti, kaj je npm ali brew — samo klikneš 'Code' in začneš. To je Claude Code za vse, ne samo za razvijalce.", "sort_order": 4}, {"id": 19, "section_id": 3, "name": "Web", "icon": "ti-world", "badge_type": "when", "badge_text": "Brez namestitve", "short_desc": "claude.ai/code ali 'Code' v stranskem meniju — dela v brskalniku", "what_it_does": "Na spletu dosežeš Claude Code na claude.ai/code ali s klikom na oznako 'Code' v stranskem meniju Claude.ai. Izkušnja je podobna Desktop appu — brez lokalne namestitve.", "when_to_use": "Ko delaš na daljavo, na tujem računalniku, ali ko hočeš Claude Code brez kakršne koli namestitve. Še posebej dobro za delo z GitHub repozitoriji.", "when_not": "Manj primerno za dolgotrajne lokalne naloge — brez dostopa do lokalnih datotek, ki niso v repozitoriju.", "why_it_matters": "Web verzija pomeni, da Claude Code nimaš nič vezanega na en računalnik. Odpri brskalnik, prijavi se — in si tam, kjer si bil.", "sort_order": 5}, {"id": 20, "section_id": 3, "name": "Delovni direktorij", "icon": "ti-folder-open", "badge_type": "when", "badge_text": "Meja vidljivosti", "short_desc": "Claude Code vidi samo mapo, v kateri ga zaženemo — in vse njene podmape", "what_it_does": "Ko zaženete Claude Code (v terminalu, VS Code ali Desktop appu), mu daš dostop do specifičnega direktorija. Vse datoteke v tej mapi in njenih podmapah so vidne. Karkoli zunaj te meje — ne obstaja.", "when_to_use": "Vedno, ko Claude Code 'ne najde' datoteke — prvi korak je preveriti, ali je datoteka znotraj delovnega direktorija.", "when_not": "Ne dodajaj celotnega diska kot delovni direktorij — Claude Code deluje bolje, ko je kontekst fokusiran na en projekt.", "why_it_matters": "To je eden najpomembnejših mentalnih modelov za razumevanje Claude Code. Ni vsevideč — ima mejo, in to mejo si postaviš sam z izbiro direktorija.", "sort_order": 6}, {"id": 21, "section_id": 3, "name": "Prijava & plan", "icon": "ti-user-check", "badge_type": "when", "badge_text": "Pro, Team ali Enterprise", "short_desc": "Med namestitvijo izbereš račun — napačna izbira pomeni napačne nastavitve", "what_it_does": "Med prvim zagonom Claude Code te vodi skozi začetne korake: barvna tema, prijava z računom. Izbiraš med Claude Pro, Team, Enterprise računom ali API ključem. Vsaka možnost prinaša drugačen model, drugačne limite in drugačne nastavitve.", "when_to_use": "Vsakič, ko namestiš Claude Code — ta korak je obvezen. Za organizacije z Enterprise računom je izbira 'Enterprise' kritična, da dobiš prave nastavitve in varnostne politike.", "when_not": "Ne preskoči tega koraka na hitro — napačna prijava pomeni napačen plan in morebitne varnostne težave v poslovnem okolju.", "why_it_matters": "Za posameznike je to preprosta odločitev. Za organizacije je ta korak varnostna in upravljavska odločitev — kdo ima dostop, kateri model se uporablja, kateri podatki so zaščiteni.", "sort_order": 7}, {"id": 22, "section_id": 3, "name": "Kateri izbrati?", "icon": "ti-help-circle", "badge_type": "rare", "badge_text": "Odločitveni vodič", "short_desc": "Terminal = kontrola, Desktop = preprostost, Web = mobilnost, IDE = integracija", "what_it_does": "Vsako okolje ima svoj profil: Terminal je za napredne, ki hočejo svežo verzijo in polno kontrolo. Desktop je za ne-developerje in tiste, ki hočejo Claude Code delati v ozadju. Web je za mobilne scenarije in GitHub projekte. VS Code in JetBrains sta za razvijalce, ki hočejo vse na enem mestu.", "when_to_use": "Ko si prvič pred izbiro — ta kartica ti da okvir za odločitev. Kasneje jo ne rabiš več.", "when_not": "Ni nujno, da izbereš samo eno. Mnogi uporabljajo Desktop doma in Web na delu.", "why_it_matters": "Ni napačne izbire — je pa prava izbira za tvoj profil. Non-developer → Desktop. Remote worker → Web. Developer → Terminal ali IDE.", "sort_order": 8}], "notes": [{"id": 11, "section_id": 3, "note_type": "youtube", "content": "0kILa02vKuI", "sort_order": -3}, {"id": 12, "section_id": 3, "note_type": "desc", "content": "Claude Code je preprosto namestiti — ne glede na to, ali raje delaš v terminalu, v IDE-ju, v Desktop appu ali kar v brskalniku. Enako orodje, pet različnih vrat.", "sort_order": -2}, {"id": 13, "section_id": 3, "note_type": "tip", "content": "Vsa okolja poganjajo isti Claude Code — razlika je samo v tem, kako komuniciraš z njim. Izberi tisto, ki ti leži.", "sort_order": -1}, {"id": 14, "section_id": 3, "note_type": "subsection-header", "content": "Kateri izbrati?", "sort_order": 10}, {"id": 15, "section_id": 3, "note_type": "tip", "content": "Desktop je najprimernejša izbira za ne-developerje: ni terminala, ni nameščanja paketov, dela v ozadju. Web je idealen, če delaš na GitHub projektih iz katere koli naprave.", "sort_order": 11}], "questions": [{"id": 18, "q": "Katera metoda namestitve v terminalu NE podpira samodejnih posodobitev?", "options": ["npm install", "brew install", "curl metoda", "winget"], "correct": 2, "explanation": "Curl metoda je direkten prenos skripte — posodobitve moraš narediti ročno. npm in brew to uredita samodejno."}, {"id": 19, "q": "Kje v VS Code najdeš Claude Code razširitev?", "options": ["V meniju File", "V plošči Extensions", "V ukazni paleti", "V nastavitvah"], "correct": 1, "explanation": "Odpreš ploščo Extensions, poiščeš 'Claude Code' in namestiš razširitev Anthropic."}, {"id": 20, "q": "Kaj moraš narediti po namestitvi Claude Code razširitve v VS Code?", "options": ["Nič — takoj deluje", "Restartati VS Code", "Namestiti Node.js", "Ustvariti nov projekt"], "correct": 1, "explanation": "Po namestitvi rabiš restartati VS Code, nato odpreti ukazno paleto in poiskati 'Open in New Tab'."}, {"id": 21, "q": "Kako aktiviraš Claude Code v Claude Desktop appu?", "options": ["Z ukazom v terminalu", "S klikom na toggle 'Code' na vrhu vmesnika", "Z namestitvijo razširitve", "Z odprtjem novega okna"], "correct": 1, "explanation": "V Desktop appu je toggle 'Code' na vrhu — klikni ga in Claude Code je aktiven. Brez terminala."}, {"id": 22, "q": "Kateri URL uporabiš za Claude Code na spletu?", "options": ["claude.ai/agent", "claude.ai/code", "code.anthropic.com", "claude.ai/terminal"], "correct": 1, "explanation": "Spletna verzija je dostopna na claude.ai/code ali s klikom na 'Code' v stranskem meniju Claude.ai."}, {"id": 23, "q": "Katero okolje je priporočeno za ne-developerje brez izkušenj s terminalom?", "options": ["Terminal z npm", "JetBrains plugin", "Claude Desktop app", "VS Code razširitev"], "correct": 2, "explanation": "Desktop app ne zahteva terminala ali nameščanja paketov — samo klikneš 'Code' in začneš."}, {"id": 24, "q": "Katero okolje je najboljše za delo z GitHub repozitoriji na daljavo?", "options": ["Terminal", "VS Code", "Claude Desktop", "Web (claude.ai/code)"], "correct": 3, "explanation": "Web verzija je idealna za GitHub projekte in oddaljeno delo — brez lokalne namestitve."}, {"id": 25, "q": "Kaj vidi Claude Code, ko ga zaženemo v določenem direktoriju?", "options": ["Vse datoteke na računalniku", "Samo datoteko, ki jo odpremo", "Samo mapo in vse njene podmape", "Samo datoteke, ki jih eksplicitno pošljemo"], "correct": 2, "explanation": "Claude Code vidi samo izbrani direktorij in vse podmape. Karkoli zunaj te meje zanj ne obstaja."}, {"id": 26, "q": "Zakaj je izbira direktorija pri zagonu Claude Code pomembna?", "options": ["Samo iz estetičnih razlogov", "Ker Claude Code vidi samo ta direktorij — to je njegova meja vidljivosti", "Ker vpliva na hitrost", "Ker določa barvno temo"], "correct": 1, "explanation": "Direktorij = meja vidljivosti. Datoteke zunaj njega Claude Code ne more brati ali urejati."}, {"id": 27, "q": "Katere možnosti prijave ponudi Claude Code med namestitvijo?", "options": ["Samo Google račun", "Claude Pro, Team, Enterprise ali API ključ", "Samo API ključ", "Facebook ali Apple račun"], "correct": 1, "explanation": "Med prvim zagonom izbiraš med Pro, Team, Enterprise računom ali API ključem — vsaka možnost prinaša drugačne nastavitve."}, {"id": 28, "q": "Zakaj je za organizacije kritično izbrati Enterprise račun med namestitvijo?", "options": ["Ker je cenejši", "Ker prinaša prave varnostne politike in nastavitve za organizacijo", "Ker ima boljši UI", "Ker je edini, ki deluje v VS Code"], "correct": 1, "explanation": "Napačna prijava pomeni napačen model in napačne varnostne nastavitve — za organizacije je to resna težava."}, {"id": 29, "q": "Kateri dve okolji ne zahtevata ločene namestitve Claude Code?", "options": ["Terminal in VS Code", "Desktop in JetBrains", "Web in Claude Desktop", "VS Code in Web"], "correct": 2, "explanation": "Web deluje v brskalniku brez namestitve. Desktop app vključuje Claude Code brez ločene namestitve — samo namestiš Claude Desktop in aktiviraš toggle."}, {"id": 30, "q": "Kje najdeš Claude Code plugin za JetBrains IDE-je?", "options": ["V VS Code Extensions", "V JetBrains Marketplace", "Na claude.ai", "V GitHub repozitoriju"], "correct": 1, "explanation": "JetBrains plugin namestiš iz JetBrains Marketplace — enako kot ostale JetBrains plugine."}, {"id": 31, "q": "Katero okolje je priporočeno, če hočeš vedno najnovejšo verzijo Claude Code?", " ed načini: Approval → Auto-accept → Plan Mode", "Odpre nastavitve"], "correct": 2, "explanation": "SHIFT+TAB je hitri dostop do menjave načinov — brez ponovnega zagona ali nastavitev."}, {"id": 39, "q": "Ali Auto-accept Mode zahteva potrditev za terminalne ukaze?", "options": ["Ne — vse sprejme samodejno", "Da — datoteke so samodejne, ukazi pa še vedno zahtevajo potrditev", "Samo za git ukaze", "Samo za npm ukaze"], "correct": 1, "explanation": "Auto-accept Mode ne pomeni vse samodejno. Datoteke se uredijo brez vprašanja, a terminalni ukazi ostanejo zaklenjeni za potrditev."}, {"id": 40, "q": "Za kakšno nalogo je Plan Mode posebej primeren?", "options": ["Za popravek tipkarske napake", "Za branje dokumentacije", "Za kompleksne spremembe čez več datotek, npr. dark mode čez celotno aplikacijo", "Za namestitev paketa"], "correct": 2, "explanation": "Plan Mode zasije pri večjih implementacijah — vidite natančno, kaj bo Claude Code naredil, preden to naredi. Idealno za multi-file spremembe."}]}]}];

let currentLang       = 'sl';
let currentChapterId  = 1;
let currentSectionId  = null;
let currentView       = 'cards';
let selectedFeatureId = null;

// Quiz config — all questions shown (no limit per tier)
// Active quiz object (null when no quiz running)
// { scope:'lesson'|'chapter'|'total', pool:[...], idx:0, correct:0, answered:false }
let quiz = null;

const LANGS = [
  {code:'sl',label:'SL'},{code:'it',label:'IT'},{code:'de',label:'DE'},
  {code:'fr',label:'FR'},{code:'pl',label:'PL'},{code:'en',label:'EN'},
];

/* ── Sidebar ────────────────────────────────────────────────────── */
function renderSidebar() {
  const nav = document.getElementById('sb-nav');
  nav.innerHTML = '';

  DATA.forEach(ch => {
    const isActive = ch.id === currentChapterId;

    const chBtn = document.createElement('button');
    chBtn.className = 'ch-btn' + (isActive ? ' active' : '');
    chBtn.innerHTML = `
      <div class="ch-btn-inner">
        <span class="ch-part">Poglavje ${ch.id}</span>
        <span class="ch-name">${ch.title}</span>
      </div>
      <i class="ti ti-chevron-right ch-chevron" aria-hidden="true"></i>`;
    chBtn.onclick = () => {
      currentChapterId = ch.id;
      currentSectionId = null;
      selectedFeatureId = null;
      quiz = null;
      render();
    };
    nav.appendChild(chBtn);

    if (isActive) {
      const sec = document.createElement('div');
      sec.className = 'ch-sections open';

      // Lesson items only
      ch.sections.forEach(s => {
        const isCur = s.id === currentSectionId && !quiz;
        const item = document.createElement('div');
        item.className = 'sidebar-item' + (isCur ? ' active' : '');
        item.innerHTML = `
          <span class="si-lesson">${s.lesson}</span>
          <span class="si-title">${s.title.split(':')[0].trim()}</span>`;
        item.onclick = () => { currentSectionId = s.id; selectedFeatureId = null; quiz = null; render(); };
        sec.appendChild(item);
      });

      nav.appendChild(sec);
    }
  });

  // Total Quiz — special entry at the bottom
  const totalBtn = document.createElement('button');
  totalBtn.className = 'ch-total-btn' + (quiz && quiz.scope === 'total' ? ' active' : '');
  totalBtn.innerHTML = `
    <i class="ti ti-trophy" aria-hidden="true"></i>
    <div class="ch-total-inner">
      <span class="ch-total-part">Zaključni izziv</span>
      <span class="ch-total-name">Total Claude Code 101 kviz</span>
    </div>`;
  totalBtn.onclick = () => startQuiz('total');
  nav.appendChild(totalBtn);

  // Language switcher
  const grid = document.getElementById('lang-grid');
  grid.innerHTML = '';
  LANGS.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (l.code === currentLang ? ' active' : '');
    btn.textContent = l.label;
    btn.onclick = () => { currentLang = l.code; render(); };
    grid.appendChild(btn);
  });
}

function toggleRefl(id) { document.getElementById(id)?.classList.toggle('open'); }

/* ── Chapter Overview ──────────────────────────────────────────── */
function renderChapterOverview(ch) {
  const panel = document.getElementById('lesson-panel');
  if (!ch) return;

  let html = `
    <h1 class="sr-only">Poglavje ${ch.id}: ${ch.title}</h1>
    <div class="ch-overview">
      <div class="ch-overview-header">
        <div class="ch-overview-num">Poglavje ${ch.id}</div>
        <div class="ch-overview-title">${ch.title}</div>
      </div>

      <div class="ch-overview-block">
        <div class="ch-overview-block-title">Learning Objectives</div>
        <ul class="ch-obj-list">
          ${ch.objectives.map(o => `<li>${o}</li>`).join('')}
        </ul>
      </div>

      <div class="ch-overview-block">
        <div class="ch-overview-block-title">Lekcije</div>
        <div class="ch-lesson-list">
          ${ch.sections.map(s => `
            <div class="ch-lesson-card" onclick="goToLesson(${ch.id}, ${s.id})">
              <div class="ch-lesson-card-left">
                <span class="ch-lesson-card-num">${s.lesson}</span>
                <span class="ch-lesson-card-title">${s.title.split(':')[0].trim()}</span>
              </div>
              <i class="ti ti-chevron-right" aria-hidden="true"></i>
            </div>`).join('')}
        </div>
      </div>`;

  if (ch.reflections?.length) {
    html += `
      <div class="ch-overview-block">
        <div class="ch-overview-block-title">Refleksija</div>
        <div class="ch-refl-list">`;
    ch.reflections.forEach((r, i) => {
      const [q, hint] = r.split('|');
      const id = `chrefl-${ch.id}-${i}`;
      html += `
          <div class="ch-refl-item" onclick="toggleRefl('${id}')">
            <i class="ti ti-help-circle" aria-hidden="true"></i><span>${q}</span>
          </div>
          <div class="ch-refl-hint" id="${id}">${hint || ''}</div>`;
    });
    html += `</div></div>`;
  }

  // Chapter quiz block (inline, at bottom of overview)
  const chAllQ = collectQuestions('chapter', ch.id);
  if (chAllQ.length) {
    html += `<div id="quiz-anchor"></div>`;
    if (quiz && quiz.scope === 'chapter' && quiz.id === ch.id) {
      html += quizEngineHTML();
    } else {
      html += `
        <div class="quiz-start-block">
          <div class="quiz-start-icon">🧠</div>
          <div class="quiz-start-title">Preveri poglavje</div>
          <div class="quiz-start-desc">${chAllQ.length} vprašanj iz vseh lekcij tega poglavja. Naključni vrstni red, rezultat na koncu.</div>
          <button class="quiz-btn" onclick="startQuiz('chapter', ${ch.id})"><i class="ti ti-player-play"></i> Začni kviz</button>
        </div>`;
    }
  }

  html += `</div>`;
  panel.innerHTML = html;
}

function goToLesson(chId, secId) {
  currentChapterId = chId;
  currentSectionId = secId;
  selectedFeatureId = null;
  render();
}

/* ── Lesson ─────────────────────────────────────────────────────── */
function renderLesson() {
  const ch  = DATA.find(c => c.id === currentChapterId);

  // Chapter overview mode
  if (currentSectionId === null) {
    renderChapterOverview(ch);
    return;
  }

  const sec = ch?.sections.find(s => s.id === currentSectionId);
  if (!sec) return;

  const panel    = document.getElementById('lesson-panel');
  const prenotes = [...sec.notes].filter(n => n.sort_order <= 0).sort((a,b) => a.sort_order - b.sort_order);
  const postnotes= [...sec.notes].filter(n => n.sort_order >  0).sort((a,b) => a.sort_order - b.sort_order);
  const features = [...sec.features].sort((a,b) => a.sort_order - b.sort_order);

  const parts    = sec.title.split(':');
  const secTitle = parts[0].trim();
  const secSub   = parts.length > 1 ? parts.slice(1).join(':').trim() : '';

  let html = `
    <h1 class="sr-only">Lekcija: ${sec.title}</h1>
    <div class="sec-lesson">${sec.lesson} · Poglavje ${ch.id}</div>
    <div class="sec-title">${secTitle}</div>
    ${secSub ? `<div class="sec-sub">${secSub}</div>` : '<div class="sec-gap"></div>'}
  `;

  prenotes.forEach(n => { html += renderNote(n); });

  html += `
    <div class="view-toggle">
      <span class="view-label">Pogled:</span>
      <button class="view-btn ${currentView==='cards'?'active':''}" onclick="setView('cards')">
        <i class="ti ti-layout-grid" aria-hidden="true"></i> Kartice
      </button>
      <button class="view-btn ${currentView==='table'?'active':''}" onclick="setView('table')">
        <i class="ti ti-table" aria-hidden="true"></i> Tabela
      </button>
    </div>`;

  // Cards
  html += `<div class="feature-grid${currentView==='table'?' hide':''}" id="feat-grid">`;
  features.forEach(f => {
    html += `<div class="feature-card${f.id===selectedFeatureId?' selected':''}" onclick="selectFeature(${f.id})">
      <span class="badge badge-${f.badge_type}">${f.badge_text}</span>
      <p class="feature-name"><i class="ti ${f.icon}" aria-hidden="true"></i>${f.name}</p>
      <p class="feature-desc">${f.short_desc}</p>
    </div>`;
  });
  html += `</div>`;

  // Table
  html += `<table class="features-table${currentView==='table'?' show':''}" id="feat-table">
    <thead><tr><th style="width:28%">Koncept</th><th style="width:18%">Tip</th><th>Opis</th></tr></thead>
    <tbody>`;
  features.forEach(f => {
    html += `<tr class="${f.id===selectedFeatureId?'row-selected':''}" onclick="selectFeature(${f.id})">
      <td><strong><i class="ti ${f.icon}" style="margin-right:.3rem;color:var(--text-ter)"></i>${f.name}</strong></td>
      <td><span class="badge badge-${f.badge_type}">${f.badge_text}</span></td>
      <td style="color:var(--text-sec)">${f.short_desc}</td>
    </tr>`;
  });
  html += `</tbody></table>`;

  // Inline detail panel 2×2
  if (selectedFeatureId !== null) {
    const f = features.find(feat => feat.id === selectedFeatureId);
    if (f) html += `
      <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
          <div class="detail-title">
            <i class="ti ${f.icon}" aria-hidden="true"></i>
            ${f.name}
            <span class="badge badge-${f.badge_type}">${f.badge_text}</span>
          </div>
          <button class="detail-close" onclick="selectFeature(${f.id})">
            <i class="ti ti-x"></i> Zapri
          </button>
        </div>
        <div class="detail-grid">
          <div class="detail-cell">
            <div class="detail-cell-label">Kaj dela</div>
            <div class="detail-cell-val">${f.what_it_does}</div>
          </div>
          <div class="detail-cell">
            <div class="detail-cell-label">Kdaj uporabiti</div>
            <div class="detail-cell-val">${f.when_to_use}</div>
          </div>
          <div class="detail-cell">
            <div class="detail-cell-label">Kdaj NE</div>
            <div class="detail-cell-val">${f.when_not}</div>
          </div>
          <div class="detail-cell">
            <div class="detail-cell-label">Zakaj to šteje</div>
            <div class="detail-cell-val">${f.why_it_matters}</div>
          </div>
        </div>
      </div>`;
  }

  postnotes.forEach(n => { html += renderNote(n); });

  // ── Lesson quiz block (inline) ──
  if (sec.questions && sec.questions.length) {
    html += `<div id="quiz-anchor"></div>`;
    if (quiz && quiz.scope === 'lesson' && quiz.id === sec.id) {
      html += quizEngineHTML();
    } else {
      html += `
        <div class="quiz-start-block">
          <div class="quiz-start-icon">🧠</div>
          <div class="quiz-start-title">Preveri lekcijo</div>
          <div class="quiz-start-desc">${sec.questions.length} vprašanj o tej lekciji. Naključni vrstni red, rezultat na koncu.</div>
          <button class="quiz-btn" onclick="startQuiz('lesson', ${sec.id})"><i class="ti ti-player-play"></i> Začni kviz</button>
        </div>`;
    }
  }

  panel.innerHTML = html;

  if (selectedFeatureId !== null && !quiz) {
    requestAnimationFrame(() =>
      document.getElementById('detail-panel')?.scrollIntoView({behavior:'smooth', block:'nearest'})
    );
  }
}

function renderNote(n) {
  switch (n.note_type) {
    case 'youtube':
      return `<div class="note-youtube">
        <iframe src="https://www.youtube.com/embed/${n.content}?rel=0"
          title="Lekcija — video" allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
        </iframe></div>`;
    case 'desc':
      return `<p class="note-desc">${n.content}</p>`;
    case 'tip':
      return `<div class="note-tip"><i class="ti ti-info-circle" aria-hidden="true"></i><span>${n.content}</span></div>`;
    case 'warning':
      return `<div class="note-warning"><i class="ti ti-alert-triangle" aria-hidden="true"></i><span>${n.content}</span></div>`;
    case 'subsection-header':
      return `<div class="note-subsection">${n.content}</div>`;
    default: return '';
  }
}

/* ── View + Feature select ──────────────────────────────────────── */
function setView(v) { currentView = v; renderLesson(); }

function selectFeature(id) {
  selectedFeatureId = (selectedFeatureId === id) ? null : id;
  renderLesson();
}

/* ── Quiz engine ────────────────────────────────────────────────── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Collect question pool by scope. lesson→id=sectionId, chapter→id=chapterId, total→all
function collectQuestions(scope, id) {
  let qs = [];
  if (scope === 'lesson') {
    DATA.forEach(ch => ch.sections.forEach(s => { if (s.id === id) qs = (s.questions || []).slice(); }));
  } else if (scope === 'chapter') {
    const ch = DATA.find(c => c.id === id);
    if (ch) ch.sections.forEach(s => qs.push(...(s.questions || [])));
  } else { // total
    DATA.forEach(ch => ch.sections.forEach(s => qs.push(...(s.questions || []))));
  }
  return qs;
}

function startQuiz(scope, id) {
  const all = collectQuestions(scope, id);
  if (!all.length) return;
  quiz = { scope, id, pool: shuffle(all), idx: 0, correct: 0, answered: false, selected: null };

  if (scope === 'lesson') {
    renderLesson();
    requestAnimationFrame(() =>
      document.getElementById('quiz-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' })
    );
  } else if (scope === 'chapter') {
    currentSectionId = null;
    render();
    requestAnimationFrame(() =>
      document.getElementById('quiz-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' })
    );
  } else {
    currentSectionId = null;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function answerQuiz(oi) {
  if (!quiz || quiz.answered) return;
  quiz.answered = true;
  quiz.selected = oi;
  if (oi === quiz.pool[quiz.idx].correct) quiz.correct++;
  rerenderQuiz();
}

function nextQuiz() {
  if (!quiz) return;
  quiz.idx++;
  quiz.answered = false;
  quiz.selected = null;
  rerenderQuiz();
}

function restartQuiz() { if (quiz) startQuiz(quiz.scope, quiz.id); }

function exitQuiz() {
  if (!quiz) return;
  const { scope, id } = quiz;
  quiz = null;
  if (scope === 'chapter') { currentChapterId = id; currentSectionId = null; }
  render();
}

function rerenderQuiz() {
  if (!quiz) return;
  if (quiz.scope === 'total') renderQuizPanel();
  else renderLesson();
}

// Renders the shared quiz UI (question + options + progress, or final score)
function quizEngineHTML() {
  const total = quiz.pool.length;

  // Final screen
  if (quiz.idx >= total) {
    const pct = Math.round(quiz.correct / total * 100);
    const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '💪';
    const msg = pct >= 80 ? 'Odlično! Snov ti je jasna.'
              : pct >= 50 ? 'Dobro! Ponovi, kar je zmanjkalo.'
              : 'Še en krog ti bo pomagal.';
    return `
      <div class="quiz-engine">
        <div class="quiz-engine-body">
          <div class="quiz-final">
            <div class="quiz-final-emoji">${emoji}</div>
            <div class="quiz-final-score">${quiz.correct}/${total}</div>
            <div class="quiz-final-pct">${pct}% pravilnih</div>
            <div class="quiz-final-msg">${msg}</div>
            <div class="quiz-final-actions">
              <button class="quiz-btn" onclick="restartQuiz()"><i class="ti ti-refresh"></i> Igraj znova</button>
              <button class="quiz-btn-ghost" onclick="exitQuiz()"><i class="ti ti-x"></i> Zapri</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  // Active question
  const q = quiz.pool[quiz.idx];
  const letters = ['A','B','C','D','E','F'];
  const done = quiz.answered ? quiz.idx + 1 : quiz.idx;
  const pct = Math.round(done / total * 100);

  const opts = q.options.map((opt, oi) => {
    let cls = 'quiz-option';
    if (quiz.answered) {
      cls += ' answered';
      if (oi === q.correct) cls += (oi === quiz.selected) ? ' correct' : ' reveal';
      else if (oi === quiz.selected) cls += ' wrong';
    }
    const click = quiz.answered ? '' : ` onclick="answerQuiz(${oi})"`;
    return `<div class="${cls}"${click}>
      <span class="quiz-option-letter">${letters[oi]}</span><span>${opt}</span>
    </div>`;
  }).join('');

  let foot = '';
  if (quiz.answered) {
    const isLast = quiz.idx === total - 1;
    foot = `<div class="quiz-engine-foot">
      <button class="quiz-btn" onclick="nextQuiz()">
        ${isLast ? '<i class="ti ti-flag"></i> Zaključek' : '<i class="ti ti-arrow-right"></i> Naprej'}
      </button>
    </div>`;
  }

  return `
    <div class="quiz-engine">
      <div class="quiz-bar">
        <span class="quiz-bar-count">Vprašanje <span>${quiz.idx + 1}</span> / ${total}</span>
        <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="quiz-engine-body">
        <div class="quiz-question">${q.q}</div>
        <div class="quiz-options">${opts}</div>
        <div class="quiz-explain ${quiz.answered ? 'show' : ''}">${q.explanation}</div>
        ${foot}
      </div>
    </div>`;
}

// Full-panel quiz (chapter / total)
function renderQuizPanel() {
  const panel = document.getElementById('lesson-panel');
  let label, title;
  if (quiz.scope === 'chapter') {
    const ch = DATA.find(c => c.id === quiz.id);
    label = `Kviz · Poglavje ${quiz.id}`;
    title = ch ? ch.title : 'Kviz poglavja';
  } else {
    label = 'Zaključni izziv';
    title = 'Total Claude Code 101 kviz';
  }
  panel.innerHTML = `
    <h1 class="sr-only">${title} — kviz</h1>
    <div class="quiz-panel-header">
      <div class="quiz-panel-label">${label}</div>
      <div class="quiz-panel-title">${title}</div>
    </div>
    ${quizEngineHTML()}`;
}

/* ── Boot ───────────────────────────────────────────────────────── */
function render() {
  renderSidebar();
  if (quiz && quiz.scope === 'total') renderQuizPanel();
  else renderLesson();
}
render();
</script>
