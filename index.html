omin in stisne sum. /clear je za svez start na novi nalogi."},{"id":55,"q":"Kaj prikazˇe ukaz /context?","options":["Zgodovino ukazov","Vizualni pregled porabe kontekstnega okna po kategorijah","Seznam vseh datotek v projektu","Nastavitve Claude Code"],"correct":1,"explanation":"/context pokazˇe, koliko prostora je zasedenega, katere kategorije porabijo najvec, in vizualni grafikon — diagnosticno orodje za informirano odlocitev."},{"id":56,"q":"Zakaj natancen prompt zasede manj konteksta kot splosˇen?","options":["Ker je krajsi v znakih","Ker Claude z jasnimi navodili manj isce po kodi in opravi manj sklepanja","Ker Claude splosnih promptov ne razume","Ker splosni prompti niso podprti"],"correct":1,"explanation":"Splosˇen prompt prisili Claude k vec iskanjem in sklepanju — to zasede bistveno vec prostora kot natancen prompt z jasnim ciljem."},{"id":57,"q":"Zakaj je dobro ugasniti MCP strežnike, ki jih ne potrebuješ?","options":["Ker upocasnijo internet","Claude naloži orodja vseh aktivnih strežnikov v kontekst samodejno — neuporabljeni jedo prostor brez koristi","Ker so nevarni","Ker jih Claude ne zna uporabljati"],"correct":1,"explanation":"Claude naloži seznam orodij vsakega aktivnega MCP strežnika v kontekst — tudi neuporabljenih. Ugasni kar ne potrebuješ za projekt."}]},{"id":7,"lesson":"Lekcija 3","title":"Code Review: Git workflow z Claude Code","features":[{"id":43,"section_id":7,"name":"Subagent reviewer","icon":"ti-eye-check","badge_type":"when","badge_text":"Pred PR-jem","short_desc":"Svez kontekst, brez pristranskosti — ne ve, kako si kodo napisal, samo ali deluje","what_it_does":"Subagent za code review tece v lastnem kontekstnem oknu — brez spomina na to, kako je bila koda napisana. To mu da svez pogled, ki ga glavna seja nima, ker je ves cas nosila breme pisanja.","when_to_use":"Pred vsakim PR-jem. Prosi Claude: »Pozeni subagenta, ki bo pregledal spremembe.« Subagent oznaci tezave brez pristranskosti.","when_not":"Ne namesto lastnega pregleda — subagent je dodaten par oci, ne nadomestek za razumevanje kode.","why_it_matters":"Glavna seja je slepa za napake, ki jih je sama naredila. Subagent z locenim kontekstom ujame, kar dolga delovna seja spregleda.","sort_order":1},{"id":44,"section_id":7,"name":"Read-only konfiguracija","icon":"ti-lock","badge_type":"when","badge_text":"Samo bere","short_desc":"Omeji subagenta na bralna orodja — reviewer naj oznaci tezave, ne ureja datotek","what_it_does":"Ko nastavljas subagent reviewerja, mu dovoli samo bralna orodja. Njegova naloga je oznaciti tezave — ne popravljati kode. Ce ima pisalni dostop, zacne resevati namesto pregledovati.","when_to_use":"Vedno pri konfiguraciji code-reviewer subagenta. Shrani konfiguracijo v repozitorij, da jo uporablja celotna ekipa.","when_not":"Ne za subagente, ki imajo nalogo popraviti kodo — tam je pisalni dostop smiseln. Read-only je specificno za reviewer vlogo.","why_it_matters":"Jasna vloga = boljsi rezultat. Reviewer, ki samo bere, da fokusirano povratno informacijo. Ce uredja, zacne resevati probleme namesto da bi jih identificiral.","sort_order":2},{"id":45,"section_id":7,"name":"/commit-push-pr","icon":"ti-git-pull-request","badge_type":"when","badge_text":"Vse v enem","short_desc":"En ukaz za commit + push + PR — Claude uredi celoten tok namesto tebe","what_it_does":"Skill /commit-push-pr poskrbi za celoten git tok v enem koraku: pripravi commit sporocilo, potisne spremembe in ustvari PR. Namesto treh locenih korakov — en ukaz.","when_to_use":"Ko si zadovoljen s kodo in subagent review je opravljen. Zozeni /commit-push-pr in Claude prevzame vse do odprtega PR-ja.","when_not":"Ne za vmesne commite med razvojem — tam je rucni nadzor nad commit sporocili bolj smiseln.","why_it_matters":"Odstranjuje trenje iz zadnje mile git workflowa. Manj preklopov med orodji, manj prilo znosti za napako pri commitu ali pushu.","sort_order":3},{"id":46,"section_id":7,"name":"Slack MCP obvestilo","icon":"ti-brand-slack","badge_type":"rare","badge_text":"Opcijsko","short_desc":"Ce imas Slack MCP strežnik, Claude samodejno objavi PR link v ekipni kanal","what_it_does":"Ce imas Slack MCP strežnik konfiguriran in kanale definirane v CLAUDE.md, /commit-push-pr po ustvaritvi PR-ja samodejno objavi link v ustrezni Slack kanal.","when_to_use":"V ekipah, ki sledijo PR-jem prek Slacka. Enkratna nastavitev — potem se zgodi samodejno ob vsakem PR-ju.","when_not":"Ni potrebno za individualno delo ali ekipe, ki ne uporabljajo Slacka za PR obvestila.","why_it_matters":"Ekipa je takoj obvescena o novem PR-ju brez rocnega deljenja linka. Manj administrativnega dela, vec fokusa na pregled.","sort_order":4},{"id":47,"section_id":7,"name":"--from-pr","icon":"ti-git-branch","badge_type":"when","badge_text":"Nadaljuj PR","short_desc":"Nadaljuj sejo PR-ja pozneje: claude --from-pr <PR_NUMBER> — tocno tam, kjer si ostal","what_it_does":"Ko Claude ustvari PR prek gh pr create, se seja samodejno poveze s tem PR-jem. Ce se vrnes pozneje — po review komentarjih ali neuspelem buildu — zozeni claude --from-pr <PR_NUMBER> in nadaljujes tocno tam, kjer si ostal.","when_to_use":"Ko se vracas na PR po review komentarjih, po CI napaki ali po daljsi prekinitvi. --from-pr obnovi kontekst PR-ja brez ponovnega razlaganja.","when_not":"Ni potrebno, ce ze imas odprto sejo, ki je ustvarila PR — tam je kontekst ze prisoten.","why_it_matters":"PR review je pogosto prekinjen proces — napises kodo, cakash review, popravish, again. --from-pr odstranjuje trenje pri vsakem vracanju na nedokoncano nalogo.","sort_order":5}],"notes":[{"id":33,"section_id":7,"note_type":"youtube","content":"RKsADl0ZC3Y","sort_order":-3},{"id":34,"section_id":7,"note_type":"desc","content":"Claude Code ima vgrajene funkcije, ki pospesijo git workflow. Pred vsakim PR-jem: subagent code review za svez pogled brez pristranskosti. Za commit + push + PR v enem koraku: /commit-push-pr skill. Za nadaljevanje dela na PR-ju po prekinitvi: --from-pr.","sort_order":-2},{"id":35,"section_id":7,"note_type":"tip","content":"Subagent za code review je eden najpreprostejsih nacinov, da ujamet napake, ki jih glavna seja spregleda — ker ves cas nosi kontekst pisanja kode in z njim tudi njene slepe pege.","sort_order":-1},{"id":36,"section_id":7,"note_type":"subsection-header","content":"Subagent reviewer — nastavitev","sort_order":10},{"id":37,"section_id":7,"note_type":"tip","content":"Konfiguracijo subagent reviewerja shrani v repozitorij — tako celotna ekipa uporablja enako nastavitev in enaka pravila pregleda. En reviewer za vse, ne vsak svoja nastavitev.","sort_order":11}],"questions":[{"id":58,"q":"Zakaj je subagent boljsi za code review kot glavna seja?","options":["Ker je hitrejsi","Ker tece v locenim kontekstu brez pristranskosti — ne ve, kako je bila koda napisana","Ker ima vec orodij","Ker ne potrebuje interneta"],"correct":1,"explanation":"Glavna seja nosi ves kontekst pisanja kode in z njim slepe pege. Subagent z locenim kontekstom da svez, nepristranski pogled."},{"id":59,"q":"Katera orodja mora imeti subagent code reviewer?","options":["Vsa — tudi pisalna, da lahko takoj popravi","Samo bralna — reviewer oznaci tezave, ne ureja datotek","Samo terminal","Samo dostop do spleta"],"correct":1,"explanation":"Reviewer subagent mora biti omejen na bralna orodja. Ce ima pisalni dostop, zacne resevati namesto pregledovati."},{"id":60,"q":"Zakaj shraniti konfiguracijo subagent reviewerja v repozitorij?","options":["Ker je to obvezno","Da celotna ekipa uporablja enako nastavitev in enaka pravila pregleda","Ker drugace ne deluje","Samo iz organizacijskih razlogov"],"correct":1,"explanation":"Konfiguracija v repozitoriju zagotavlja, da vsi clani ekipe uporabljajo enako nastavitev reviewerja — konsistenten pregled za vse."},{"id":61,"q":"Kaj naredi /commit-push-pr skill?","options":["Samo ustvari commit","Samo potisne spremembe","Uredi commit + push + PR ustvaritev v enem koraku","Izbrise lokalne spremembe"],"correct":2,"explanation":"/commit-push-pr prevzame celoten git tok: pripravi commit sporocilo, potisne spremembe in ustvari PR — vse v enem ukazu."},{"id":62,"q":"Kdaj Claude samodejno objavi PR link na Slack?","options":["Vedno, samodejno","Ko imas Slack MCP strežnik konfiguriran in kanale definirane v CLAUDE.md","Ko aktiviras poseben nacin","Nikoli — to moraš narediti rocno"],"correct":1,"explanation":"Slack obvestilo zahteva Slack MCP strežnik in kanale definirane v CLAUDE.md. Ko je to nastavljeno, /commit-push-pr PR link objavi samodejno."},{"id":63,"q":"Kaj naredi ukaz claude --from-pr <PR_NUMBER>?","options":["Ustvari nov PR","Izbrise PR","Obnovi sejo PR-ja in nadaljuje tocno tam, kjer si ostal","Pokaze seznam vseh PR-jev"],"correct":2,"explanation":"--from-pr obnovi kontekst PR-ja ustvarjenega prek gh pr create in nadaljuje sejo tocno tam, kjer si jo prekinil."},{"id":64,"q":"Kdaj je --from-pr najbolj koristen?","options":["Ob prvem ustvarjanju PR-ja","Ko se vracas na PR po review komentarjih ali CI napaki","Ko hoces izbrisati PR","Ko hoces spremeniti ime PR-ja"],"correct":1,"explanation":"--from-pr je za vracanje na nedokoncano nalogo — po review komentarjih, po neuspelem buildu, ali po daljsi prekinitvi. Obnovi kontekst brez ponovnega razlaganja."}]}]},{"id":4,"title":"Customizing Claude Code","objectives":["Razumeti, kako CLAUDE.md daje Claudu trajni spomin o projektu in zakaj je to ključno","Znati ustvariti, strukturirati in vzdrževati lastno CLAUDE.md datoteko","Spoznati napredne možnosti prilagoditve: Subagents, Skills, MCP in Hooks"],"reflections":["Zakaj Claude Code vsakič začne znova brez CLAUDE.md?|Brez trajnega spomina mora Claude vsakič re-explorirati kodo, ugibati o konvencijah in razumeti arhitekturo — to je izguba časa in vzrok napak.","V čem se razlikuje projektni in uporabniški CLAUDE.md?|Projektni živi v root mapi in je v version controlu — deli ga cel team. Uporabniški je v tvoji konfiguracijski mapi in velja za vse projekte — tam so tvoje osebne preference.","Kdaj je pravi čas za ustvariti CLAUDE.md?|Anthropic priporoča: začni brez nje. Ko vidiš, kje pogosto popravljaš Clauda, veš kaj dodati. Nato poženi /init in Claude ustvari izhodišče zate.","Zakaj je Skills boljša rešitev kot dodajanje vsega v CLAUDE.md?|CLAUDE.md se naloži vsakič — prekomerna vsebina poveča kontekst pri vsaki seji. Skills so na zahtevo — kličeš jih samo ko so relevantni. Ločitev 'vedno' in 'ko je treba' je ključna za zdravo upravljanje konteksta.","Kdaj bi dodal MCP strežnik in kdaj bi raje napisal Skill?|MCP: ko potrebuješ real-time dvosmerni dostop do zunanjega servisa (baza podatkov, projektno orodje). Skill: ko imaš dobro definirano proceduro in CLI ekvivalent. Skill je kontekstno cenejši — MCP primeš za trajno integracijo.","Kdaj je hook nujno potreben namesto navodila v CLAUDE.md?|Ko rabiš garancijo, ne priporočilo. Claude z navodilom v CLAUDE.md 'bo poskušal' formatirati — hook zagotovi da se to zgodi vsakič, brez izjeme. Za varnostne blokade (prepreči pisanje v produkcijo) je hook edina zanesljiva rešitev."],"sections":[{"id":8,"lesson":"Lekcija 1","title":"The CLAUDE.md file: Trajni spomin za tvoj projekt","features":[{"id":48,"section_id":8,"name":"CLAUDE.md datoteka","icon":"ti-file-description","badge_type":"when","badge_text":"Ključna funkcija","short_desc":"Markdown datoteka v root mapi projekta — Claude jo prebere ob vsakem zagonu seje","what_it_does":"CLAUDE.md je Markdown datoteka, ki jo dodaš v korensko mapo projekta. Claude Code jo prebere avtomatično ob vsakem zagonu nove seje. Njena vsebina se doda k tvojemu promptu — Claude tako vedno pozna tvoj projekt.","when_to_use":"Pri vsakem resnejšem projektu, kjer z Claudom delaš redno in ponavljajoče naloge","when_not":"Za enkratne eksperimente ali manjše skripte, kjer ne potrebuješ trajnega konteksta","why_it_matters":"Razlika med Claudom, ki ugiba, in Claudom, ki točno ve — tvoj stack, arhitektura, konvencije in ukazi","sort_order":1},{"id":49,"section_id":8,"name":"Problem brez CLAUDE.md","icon":"ti-refresh-alert","badge_type":"caution","badge_text":"Brez tega","short_desc":"Brez nje Claude vsakič začne znova — re-explorira kodo, ugiba o odvisnostih in konvencijah","what_it_does":"Vsaka nova seja brez CLAUDE.md je kot prvi dan: Claude mora re-explorirati strukturo projekta, ugibati o vzorcih in ne ve za pretekle odločitve. To vodi do napak in nepotrebnih vprašanj.","when_to_use":"Razumevanje tega problema pojasni, zakaj je CLAUDE.md tako vredna — ne kot opcija, ampak kot osnova produktivnega dela","when_not":"Na enostavnih, enkratnih projektih brez ponavljajočega dela s Claudom ta problem ni kritičen","why_it_matters":"Brez konteksta Claude dela napake: napačne knjižnice, napačni vzorci, prezrte odločitve. Z CLAUDE.md se temu izogneš.","sort_order":2},{"id":50,"section_id":8,"name":"Kaj vsebuje CLAUDE.md","icon":"ti-list-details","badge_type":"when","badge_text":"Trije bloki","short_desc":"# Project, # Commands, # Code Style — trije ključni razdelki za produktivno CLAUDE.md","what_it_does":"Tipična CLAUDE.md vsebuje tri razdelke: # Project (opis stacka in arhitekture), # Commands (ukazi za dev server, teste, lint), # Code Style (konvencije: zamiki, izvozi, struktura map). S tem Claude takoj ve vse kar potrebuje.","when_to_use":"Ko začneš nov projekt z Claudom ali ko ugotoviš, da ga pogosto popravljaš glede istih stvari","when_not":"Ne polni je z vsem — osredotoči se samo na kar Claude resnično potrebuje. Preveč konteksta je prav tako problem kot premalo.","why_it_matters":"Če napišeš 'This is a Next.js 15 app using Tailwind', Claude ne bo predlagal Bootstrap niti ne bo ustvaril API routes, kjer niso potrebne.","sort_order":3},{"id":51,"section_id":8,"name":"Hierarhija CLAUDE.md","icon":"ti-hierarchy","badge_type":"when","badge_text":"Dva nivoja","short_desc":"Projektni CLAUDE.md za team, uporabniški za tvoje osebne preference — oba delujeta skupaj","what_it_does":"Projektni CLAUDE.md živi v root mapi projekta, commitaš ga v version control — cel team ga deli. Uporabniški CLAUDE.md živi v tvoji konfiguracijski mapi in velja za vse projekte — tam so tvoje osebne preference.","when_to_use":"Projektni: za team konvencije, ki jih morajo upoštevati vsi. Uporabniški: za osebne preference (ton odgovorov, format, jezik)","when_not":"Ne podvajaj vsebine med nivojema — kar je specifično za projekt gre v projektni, kar je splošno tvoje gre v uporabniški","why_it_matters":"Claude kombinira oba avtomatično. Team dobi konsistentnost, ti pa ohranišo osebne preference brez konfliktov.","sort_order":4},{"id":52,"section_id":8,"name":"Korekture → trajni spomin","icon":"ti-brain","badge_type":"when","badge_text":"Pro nasvet","short_desc":"Ko Clauda enkrat popravljaš, ga prosi, da si to zapomni — naslednjič bo vedel sam","what_it_does":"Ko ugotoviš, da daješ ista navodila znova in znova (npr. 'vedno rabi server actions, ne API routes'), reci Claudu: 'shrani to pravilo v CLAUDE.md'. Naslednjič bo pravilo že tam, preden začneš.","when_to_use":"Vsakič ko se ujameš pri tem, da daješ ista navodila večkrat — to je signal za CLAUDE.md","when_not":"Ne dodajaj pravil za enkratne situacije. CLAUDE.md mora ostati jedrnat in fokusiran.","why_it_matters":"CLAUDE.md postane živ dokument, ki raste skupaj s projektom. Vsaka korektura je potencialno pravilo za jutri.","sort_order":5},{"id":53,"section_id":8,"name":"Začni brez nje, /init ko si pripravljen","icon":"ti-wand","badge_type":"rare","badge_text":"Za začetek","short_desc":"Anthropic priporoča: najprej brez CLAUDE.md. Ko vidiš vzorce, poženi /init","what_it_does":"Začni projekt brez CLAUDE.md — opazuj, kje vedno popravljaš Clauda. Ko vidiš vzorce, poženi /init in Claude analizira projekt ter ustvari CLAUDE.md izhodišče zate. Nato uredi po potrebi.","when_to_use":"Pri novih projektih, ko ne veš točno kaj vključiti — bolje da odkriješ organsko","when_not":"Ko prevzemaš obstoječ projekt s teamom, kjer CLAUDE.md že obstaja ali je jasno potrebna","why_it_matters":"Rezultat je boljši: CLAUDE.md, ki vsebuje samo kar res potrebuješ — ne vsak možen podatek o projektu.","sort_order":6}],"notes":[{"id":38,"section_id":8,"note_type":"youtube","content":"O0FGCxkHM-U","sort_order":-2},{"id":39,"section_id":8,"note_type":"desc","content":"CLAUDE.md je ena najpomembnejših funkcij Claude Code. Je Markdown datoteka v korenski mapi projekta, ki Claudu dá trajni spomin — vsebina se avtomatično doda k vsakemu promptu ob vsaki novi seji.","sort_order":-1},{"id":40,"section_id":8,"note_type":"tip","content":"Referenciraj dokumentacijo projekta z @ simbolom: napiši @README.md v CLAUDE.md in Claude bo vedel kje iskati dodatni kontekst.","sort_order":1},{"id":41,"section_id":8,"note_type":"desc","content":"Razlika med frustrantno in produktivno sejo s Claude Code je kontekst — in CLAUDE.md je kako ga zagotoviš. Začni s stackom, ukazi in konvencijami, nato gradišo naprej.","sort_order":2}],"questions":[{"id":65,"q":"Kje se nahaja CLAUDE.md datoteka v projektu?","options":["V root (korenski) mapi projekta","V podmapi /src","V ~/.claude/ konfiguracijski mapi","V .git/ mapi"],"correct":0,"explanation":"CLAUDE.md živi v root (korenski) mapi projekta. Claude Code jo poišče in prebere tam ob vsakem zagonu seje."},{"id":66,"q":"Kaj se zgodi z vsebino CLAUDE.md, ko začneš novo sejo?","options":["Prezre se, dokler Claude ne vpraša","Avtomatično se doda k vsakemu promptu","Shrani se v oblačno bazo","Claude jo prebere samo enkrat ob prvem zagonu"],"correct":1,"explanation":"Vsebina CLAUDE.md se avtomatično doda k tvojemu promptu ob vsakem zagonu — Claude zato vedno pozna kontekst projekta brez da mu razlagaš."},{"id":67,"q":"S katerim ukazom Claude sam ustvari CLAUDE.md na podlagi tvojega projekta?","options":["/create","/memory","/init","/setup"],"correct":2,"explanation":"Ukaz /init naroči Claudu, da analizira strukturo projekta in ustvari CLAUDE.md izhodišče. Nato ga urediš po potrebi."},{"id":68,"q":"Kje živi uporabniški (user-level) CLAUDE.md?","options":["V root mapi vsakega projekta","V tvoji konfiguracijski mapi — velja za vse projekte","V ~/.ssh/ mapi","Ne obstaja — je samo en CLAUDE.md"],"correct":1,"explanation":"Uporabniški CLAUDE.md živi v konfiguracijski mapi in velja za vse projekte. Tam shraniš osebne preference, ki se aplicirajo povsod."},{"id":69,"q":"Kaj Anthropic priporoča glede CLAUDE.md pri novem projektu?","options":["Ustvari jo takoj, preden začneš","Začni brez nje in jo dodaj ko vidiš ponavljajoče vzorce","Kopiraj od drugega projekta kot izhodišče","CLAUDE.md je opcijska in jo večina ne rabi"],"correct":1,"explanation":"Anthropic priporoča: začni brez CLAUDE.md. Ko vidiš kje pogosto popravljaš Clauda, veš kaj dodati. Nato poženi /init."},{"id":70,"q":"Kako v CLAUDE.md referenciraš dokumentacijo projekta, ki jo naj Claude prebere?","options":["Z @ simbolom in potjo datoteke, npr. @README.md","Z # simbolom, npr. #README.md","Z !import README.md","S posebnim razdelkom ## References"],"correct":0,"explanation":"Uporabi @ simbol s potjo datoteke: @README.md. Claude bo vedel, da naj prebere to dokumentacijo za dodatni kontekst."},{"id":71,"q":"Kako Anthropic opisuje CLAUDE.md v kontekstu projekta?","options":["Kot konfiguracijska datoteka za IDE","Kot backup datoteka za kodo","Kot onboarding skripta za Clauda na tvoj projekt","Kot README za razvijalce"],"correct":2,"explanation":"Anthropic opisuje CLAUDE.md kot 'onboarding script for your codebase' — pove Claudu vse kar mora vedeti o projektu, da ne začne znova vsakič."},{"id":72,"q":"Katerega od teh podatkov NE smeš shranjevati v CLAUDE.md?","options":["Ukazi za zagon dev serverja","Kodni slog in konvencije projekta","API ključi in gesla","Opis stacka in arhitekture"],"correct":2,"explanation":"CLAUDE.md je navadna besedilna datoteka, ki jo commitaš v version control — nikoli vanjo ne shranjuj gesel, API ključev ali občutljivih podatkov!"},{"id":73,"q":"Ali naj CLAUDE.md datoteko commitaš v version control (npr. Git)?","options":["Da — da jo deli cel team in vsi imajo enak kontekst","Ne — ostane samo lokalno pri tebi","Samo če delaš solo, ne v timu","Odvisno od IDE nastavitev"],"correct":0,"explanation":"CLAUDE.md commitaš v version control. Projektni CLAUDE.md je namenjen celemu timu — vsi dobijo enak kontekst za Claude Code."},{"id":74,"q":"V katerem formatu je napisana CLAUDE.md datoteka?","options":["JSON","YAML","Markdown (.md)","Plain text brez formatiranja"],"correct":2,"explanation":"CLAUDE.md je Markdown datoteka — zato ima .md končnico. Markdown format omogoča jasno strukturo z naslovi, seznami in kodo."}]},{"id":9,"lesson":"Lekcija 2","title":"Subagents: Delegiraj, ne obremenjuj","features":[{"id":54,"section_id":9,"name":"Subagent","icon":"ti-robot","badge_type":"when","badge_text":"Ključni koncept","short_desc":"Ločen agent z lastnim kontekstnim oknom — opravi nalogo in vrne samo odgovor","what_it_does":"Subagent je samostojen agent, ki ga Claude spawna znotraj tvoje seje. Dobi specifično nalogo — na primer »preiščite celotno kodo in poiščite vse klice na zunanji API« — jo izvede v svojem kontekstnem oknu in vrne samo povzetek rezultata. Tvoja glavna seja tega procesa sploh ne vidi.","when_to_use":"Ko potrebuješ odgovor na specifično vprašanje, ne pa celotnega procesa iskanja. Tipični primeri: iskanje po kodi, analiza datoteke, preverjanje dokumentacije, raziskovanje neznane baze kode.","when_not":"Ne za naloge, kjer subagent potrebuje ves kontekst tvoje trenutne seje — subagent začne brez zgodovine pogovora. Če naloga zahteva »vedeti, kaj smo že naredili«, subagent ni pravi tool.","why_it_matters":"Vsak agent — človeški ali AI — dela bolje, ko ima jasno definirano nalogo in omejen obseg. Subagent je ta princip v praksi: specializirana enota za točno določeno stvar.","sort_order":1},{"id":55,"section_id":9,"name":"Kontekstna izolacija","icon":"ti-box","badge_type":"when","badge_text":"Zakaj deluje","short_desc":"Subagent nosi vso 'umazanijo' iskanja sam — tvoj kontekst ostane čist za dejansko delo","what_it_does":"Ko Claude razišče kodo, zažene web search ali prebere množico datotek, vsaka ta operacija zasede prostor v kontekstnem oknu. Subagent to naredi v svojem, ločenem oknu. Ko konča, vrne samo povzetek — brez da bi tvoje glavno okno nosilo breme celotne poti.","when_to_use":"Vsakič, ko čutiš, da bi neka naloga 'onesnažila' tvoj kontekst z vmesnimi koraki. Iskanje, debugging specifičnega modula, analiza logov — vse to so primeri, kjer izolacija pomaga.","when_not":"Ne v primerih, kjer sta procesa med seboj prepletena in vsak korak subagenta vpliva na naslednji korak v tvoji seji. Takrat potrebuješ en skupen kontekst.","why_it_matters":"Kontekstno okno je dragocen prostor. Vsak token, ki ga zasede vmesni korak iskanja, je token manj za dejansko reševanje problema. Izolacija pomeni, da ga porabiš za tisto, kar šteje.","sort_order":2},{"id":56,"section_id":9,"name":"Vzporednost","icon":"ti-stack-2","badge_type":"when","badge_text":"Zmogljivost","short_desc":"Več subagentov teče hkrati — vzporedno, ne zaporedno","what_it_does":"Claude lahko spawna več subagentov hkrati, ki tečejo vzporedno. Medtem ko eden razišče frontend kodo, drugi analizira backend, tretji preverja dokumentacijo. Rezultati pridejo skupaj v tvojo sejo, ko so vsi končali.","when_to_use":"Ko imaš nalogo, ki jo je mogoče razdeliti na neodvisne dele. Namesto da čakaš na zaporedno izvajanje, Claude razdeli delo in ga opravi vzporedno — bistveno hitreje.","when_not":"Ne za naloge, kjer drugi subagent čaka na rezultat prvega. Vzporednost deluje samo pri neodvisnih nalogah — če med njimi obstaja odvisnost, morajo teči zaporedno.","why_it_matters":"Za tech-savvy non-developerja: predstavljaj si, da namesto enega asistenta dobiš tim specializiranih. Vsak dela na svojem delu hkrati — skupni čas je krajši, kakovost višja.","sort_order":3},{"id":57,"section_id":9,"name":"/agents ukaz","icon":"ti-terminal-2","badge_type":"when","badge_text":"Kako začeti","short_desc":"En ukaz, ki te vodi skozi ustvarjanje novega subagenta korak za korakom","what_it_does":"Poženi /agents v Claude Code in izberi »Create new agent«. Claude te vodi skozi celoten postopek: izbiro obsega agenta, definicijo namena, izbiro orodij, ki jih ima na voljo, in celo izbiro barve. Na koncu ustvari konfiguracijo zate.","when_to_use":"Ko prvič ustvarjaš subagenta ali ko ne veš natančno, kakšno konfiguracijo potrebuješ. /agents je vodeni čarovnik — ne zahteva poznavanja YAML sintakse.","when_not":"Ne za urejanje že obstoječih subagentov, ki jih že razumeš — tam je direktna ureditev YAML datoteke hitrejša.","why_it_matters":"Anthropic je zavestno naredil onboarding za subagente interaktiven. /agents znižuje vstopno bariero: ni treba razumeti formata datoteke, da začneš eksperimentirati.","sort_order":4},{"id":58,"section_id":9,"name":"YAML frontmatter","icon":"ti-file-code","badge_type":"rare","badge_text":"Redko ručno","short_desc":"Subagent je Markdown datoteka z YAML glavo — Claude jo navadno ustvari namesto tebe","what_it_does":"Vsak subagent je Markdown datoteka (.md) z YAML frontmatter na vrhu. Ta glava definira ime, opis, prompt in orodja, ki jih subagent ima na voljo. Claude ustvari to datoteko avtomatično, ko greš skozi /agents čarovnika.","when_to_use":"Ko želiš fino nastaviti subagenta, ki ga je Claude ustvaril — na primer spremeniti prompt, omejiti orodja ali dodati skill ključ. Odpreš datoteko in uredis direktno.","when_not":"Ni treba, da to razumeš za osnovno uporabo. /agents poskrbi za format — YAML je implementacijski detajl, ne pogoj za začetek.","why_it_matters":"Vedeti, da je subagent samo tekstovna datoteka, pomeni: lahko jo daš v version control, jo deliš s teamom, jo kopiraš med projekti. Ni skrite konfiguracije — vse je pregledno.","sort_order":5},{"id":59,"section_id":9,"name":"Persistent memory","icon":"ti-brain","badge_type":"when","badge_text":"Med sejami","short_desc":"Subagent si zapomni kontekst med sejami — idealno za naloge, ki se ponavljajo","what_it_does":"Z možnostjo persistent memory subagent hrani kontekst med ločenimi sejami. Ko ga naslednjič pokličeš, se spomni prejšnjih interakcij — ne začne znova od nič. To je posebej koristno, če subagenta uporabljaš redno za isti tip naloge.","when_to_use":"Ko imaš subagenta za ponavljajočo se nalogo — na primer daily code reviewer, ki sčasoma razume tvoje kodne konvencije in preference. Persistent memory naredi tega subagenta vedno boljšega.","when_not":"Ne za enkratne ali občasne naloge, kjer historia ni relevantna. Persistent memory dodaja kompleksnost — uporabi ga le, kjer prinaša opazno vrednost.","why_it_matters":"Večina AI orodij pozabi vse med sejami. Subagent s persistent memory je bolj podoben specializiranemu sodelavcu, ki se uči in izboljšuje — ne pa orodju, ki vsakič začne znova.","sort_order":6},{"id":60,"section_id":9,"name":"Preload skills","icon":"ti-books","badge_type":"when","badge_text":"Napredna konfiguracija","short_desc":"Dodaj skill ključ v YAML — celoten skill se naloži v kontekst subagenta ob zagonu","what_it_does":"V YAML frontmatter subagenta dodaš ključ skills s seznamom imen skillov. Ko se subagent zažene, se ti skilli avtomatično naložijo v njegov kontekst — ima takoj na voljo vse navodila in znanje, ki ga skill definira.","when_to_use":"Ko subagent potrebuje specifično domensko znanje za svojo nalogo — na primer code reviewer, ki mora poznati tvoje interne konvencije, ali research agent z navodili za specifičen format poročila.","when_not":"Ne za vsak subagent brez premisleka. Vsak preloadan skill poveča kontekst subagenta — naloži samo tisto, kar je relevantno za njegovo specifično nalogo.","why_it_matters":"Skills v subagentih delujejo drugače kot v glavni seji: tam se naložijo on-demand, tu pa se naložijo v celoti ob zagonu. To pomeni, da subagent deluje takoj s polnim znanjem — brez da bi ga moral posebej klicati med nalogo.","sort_order":7}],"notes":[{"id":42,"section_id":9,"note_type":"youtube","content":"jKErNxuxPXg","sort_order":-3},{"id":43,"section_id":9,"note_type":"desc","content":"Vsaka seja Claude Code ima omejeno kontekstno okno. Med delom se to okno polni: iskanje po kodi, branje datotek, web researchi — vsak korak zasede prostor. Ko kontekst zastara ali se zapolni, postane Claude manj fokusiran. Subagenti so odgovor: delegiraš specifično nalogo ločenemu agentu, ki jo opravi v svojem oknu in vrne samo rezultat. Tvoj kontekst ostane čist. Tvoja seja ostane osredotočena.","sort_order":-2},{"id":44,"section_id":9,"note_type":"tip","content":"Subagent ≠ novo okno brskalnika. Teče znotraj tvoje seje, vzporedno z njo — ima dostop do datotek tvojega projekta, a nima dostopa do zgodovine tvojega pogovora. To je namerno: svež pogled brez pristranskosti.","sort_order":1}],"questions":[{"id":75,"q":"Kaj je subagent v Claude Code?","options":["Novo okno Claude Code, ki ga odpreš ročno","Ločen agent z lastnim kontekstnim oknom, ki ga Claude spawna znotraj tvoje seje","Plugin, ki ga inštaliraš posebej","Ime za Plan Mode, ko teče brez nadzora"],"correct":1,"explanation":"Subagent je samostojen agent, ki ga Claude spawna znotraj aktivne seje. Teče v svojem kontekstnem oknu, opravi nalogo in vrne povzetek — tvoja seja ga ne 'vidi' od znotraj."},{"id":76,"q":"Zakaj kontekstna izolacija subagenta koristi tvoji glavni seji?","options":["Ker subagent dela hitreje kot glavna seja","Ker subagent porabi manj elektrike","Ker subagent nosi breme iskanja in vmesnih korakov sam — tvoje okno ostane čisto za dejansko reševanje","Ker subagent shrani rezultate na disk samodejno"],"correct":2,"explanation":"Iskanje po kodi, branje datotek in web searchi zasedejo dragocen prostor v kontekstnem oknu. Subagent te operacije izvede v svojem oknu in vrne samo povzetek — tvoj kontekst ostane rezerviran za dejansko delo."},{"id":77,"q":"Kdaj vzporednost subagentov prinese največ vrednosti?","options":["Ko je vsak naslednji subagent odvisen od rezultata prejšnjega","Ko imaš nalogo, ki jo je mogoče razdeliti na neodvisne dele, ki tečejo hkrati","Ko delaš na projektu brez kode","Ko imaš samo en subagent aktiven"],"correct":1,"explanation":"Vzporednost deluje samo pri neodvisnih nalogah. Če subagent B čaka na rezultat subagenta A, morata teči zaporedno. Ko sta nalogi neodvisni — na primer frontend in backend analiza hkrati — vzporednost bistveno skrajša skupni čas."},{"id":78,"q":"Kaj naredi ukaz /agents v Claude Code?","options":["Prikaže seznam vseh aktivnih Claude Code sej","Odpre vodeni čarovnik za ustvarjanje novega subagenta","Zažene vse subagente hkrati","Izbriše obstoječe subagente"],"correct":1,"explanation":"/agents odpre interaktivni meni, kjer izbereš 'Create new agent'. Claude te vodi skozi definicijo obsega, namena, orodij in barve subagenta — brez da bi moral ročno pisati YAML."},{"id":79,"q":"Kakšen format ima konfiguracijska datoteka subagenta?","options":["JSON datoteka s posebno ekstenzijo .agent","Python skripta, ki jo Claude izvede","Markdown datoteka z YAML frontmatter na vrhu","XML datoteka, ki jo moraš pisati ročno"],"correct":2,"explanation":"Vsak subagent je preprosta Markdown (.md) datoteka. Na vrhu ima YAML frontmatter z metapodatki (ime, opis, orodja, prompt). Claude jo ustvari avtomatično prek /agents — ročno pisanje YAML ni potrebno za začetek."},{"id":80,"q":"Kaj omogoča persistent memory pri subagentih?","options":["Subagent shranjuje rezultate v oblak","Subagent si zapomni kontekst med ločenimi sejami in postaja bolj učinkovit pri ponavljajočih nalogah","Subagent samodejno naredi backup kode","Subagent posreduje informacije med različnimi projekti"],"correct":1,"explanation":"Persistent memory pomeni, da subagent hrani kontekst med sejami. Naslednjič, ko ga pokličeš, se spomni prejšnjih interakcij. To je koristno za subagente z določeno specializirano vlogo, ki jo opravljajo redno."},{"id":81,"q":"Kako se preload skills v subagentih razlikuje od skills v glavni seji?","options":["V subagentih skills sploh ne delujejo","V glavni seji se naložijo v celoti ob zagonu, v subagentih on-demand","V subagentih se skills naložijo v celoti ob zagonu, v glavni seji pa on-demand ko jih pokličeš","Ni razlike — delujeta enako"],"correct":2,"explanation":"V glavni seji se skill naloži on-demand — ko ga eksplicitno pokličeš. V subagentih s preload skills ključem pa se skill naloži v celoti ob zagonu subagenta. Subagent ima takoj dostop do celotnega znanja skilla, brez posebnega klica."}]},{"id":10,"lesson":"Lekcija 3","title":"Skills: Knjižnica znanja na zahtevo","features":[{"id":61,"section_id":10,"name":"Skill","icon":"ti-file-sparkle","badge_type":"when","badge_text":"Ključni koncept","short_desc":"Markdown datoteka z navodili, ki jo Claude naloži na zahtevo — ne vedno, ampak samo ko je relevantna","what_it_does":"Skill je Markdown datoteka z navodili, postopki ali vzorci, shranjena v .claude/skills/. Ko pokličeš skill (/skill ime-skilla ali referenca v promptu), Claude naloži celotno vsebino v kontekst in jo upošteva pri delu. Skill se ne naloži samodejno ob vsaki seji.","when_to_use":"Za proceduralno znanje, ki ga ne rabiš vsakič — postopki deployanja, standardi code reviewa, arhitekturni vzorci, team konvencije za specifičen del sistema. Skill kličeš samo ko je relevanten.","when_not":"Ne za projektno znanje, ki ga Claude vedno potrebuje — za to je CLAUDE.md. Skill je za znanje, ki pride v poštev samo v določenih situacijah, ne v vsakdanjem delu.","why_it_matters":"Skills ti dajo knjižnico specializiranega znanja, ki ne obremenjuje konteksta dokler ga ne rabiš. CLAUDE.md je vedno prisoten, Skills so na zahtevo — ta razlika je bistvena za dolge, fokusirane seje."},{"id":62,"section_id":10,"name":"Skills vs CLAUDE.md","icon":"ti-git-compare","badge_type":"when","badge_text":"Ključna razlika","short_desc":"CLAUDE.md se naloži ob VSAKI seji — Skill samo ko ga eksplicitno pokličeš","what_it_does":"CLAUDE.md se samodejno doda k vsakemu promptu ob zagonu seje — vsebina je vedno prisotna v kontekstu. Skill se naloži samo ko ga aktiviraš (/skill ime ali omemba v promptu). Ista informacija — radikalno drugačna cena konteksta.","when_to_use":"CLAUDE.md: za vse kar Claude vedno potrebuje (stack, ukazi za zagon, konvencije, arhitektura). Skills: za proceduralno znanje z jasnim obsegom — deployment checklist, code review standard, specifičen vzorec — ki ga ne rabiš pri vsaki nalogi.","when_not":"Ne podvajaj vsebine med CLAUDE.md in Skills. Vprašaj se: je to informacija, ki jo Claude potrebuje vsakič, ali samo v določenih situacijah? Odgovor določi, kam gre.","why_it_matters":"Preobremenjeni CLAUDE.md upočasni vsako sejo — zaseda kontekst z informacijami, ki so relevantne samo včasih. Skills ohranijo CLAUDE.md jedrnat; specializirano znanje je dostopno, a ne zaseda prostora brez razloga."},{"id":63,"section_id":10,"name":"Skills vs Subagents","icon":"ti-arrows-exchange","badge_type":"when","badge_text":"Razlika vlog","short_desc":"Skill = znanje in navodila za Clauda — Subagent = samostojni agent, ki izvaja naloge","what_it_does":"Skill pove Claudu KAK delati — vsebuje navodila, vzorce, postopke. Subagent je ločeni agent ki TO NAREDI v svojem kontekstnem oknu. Skill je vhod z znanjem, subagent je izvajalec. Kombinacija obojega je najzmogljivejša: subagent s preloadanim skillom dobi specializirano znanje IN ga takoj izvede.","when_to_use":"Skill: ko Claude potrebuje specifično domensko znanje za nalogo — kateri vzorci veljajo za vašo arhitekturo, kateri koraki so obvezni pri deployanju. Subagent: ko hočeš delegirati nalogo ločeni enoti z lastnim kontekstom.","when_not":"Ne zamenjuj njune vloge: skill ne izvaja nalog sam od sebe, subagent ne hrani znanja. Skill brez izvajalca je samo dokument; subagent brez znanja dela na slepo.","why_it_matters":"Razlika med 'vedeti' in 'narediti'. Subagent s preloadanim skillom združi oboje: jasna naloga (subagent) + specifično znanje za opravljanje (skill). To je arhitektura specializiranih agentov v praksi."},{"id":64,"section_id":10,"name":"/skills ukaz","icon":"ti-terminal-2","badge_type":"when","badge_text":"Upravljanje","short_desc":"Vtipkaj /skills v pogovornem polju — prikaže dostopne skille, aktiviraš z /skill ime","what_it_does":"Ukaz /skills prikaže seznam vseh dostopnih skillov — projektnih (.claude/skills/) in uporabniških (~/.claude/skills/). Posamezen skill aktiviraš z /skill ime-skilla. Claude prebere vsebino in jo doda k aktivnemu kontekstu seje. Skill ostane aktiven za čas seje.","when_to_use":"Ko začnjaš nalogo, ki zahteva specifično proceduralno znanje. /skills pokaže, kaj imaš na voljo — tako ne rabiš zapomniti imen vseh skillov.","when_not":"Ne kliči /skills pred vsako nalogo kot ritual. Skills so za specifične situacije — ko znaš, da naloga potrebuje poseben postopek ali standard.","why_it_matters":"Skills so knjižnica v živo. /skills je njen katalog; /skill aktivira točno tisto, kar potrebuješ. Jasen, predvidljiv vmesnik — ne moreš pomotoma naložiti napačnega znanja."},{"id":65,"section_id":10,"name":"Hierarhija skillov","icon":"ti-hierarchy","badge_type":"when","badge_text":"Dva nivoja","short_desc":"Projektni skilli v .claude/skills/ — uporabniški v ~/.claude/skills/ — oba delujeta skupaj","what_it_does":"Projektni skilli živijo v .claude/skills/ v repozitoriju — commitaš jih v version control, cel team jih deli. Uporabniški skilli živijo v ~/.claude/skills/ in so dostopni v vseh tvojih projektih — tam so tvoje osebne procedure in vzorci, ki jih jemlješ od projekta do projekta.","when_to_use":"Projektni: za team-specifično znanje (arhitekturni vzorci tega projekta, deployment postopek, code review standard ekipe). Uporabniški: za znanje ki je tvoje in prenosljivo (moj debugging workflow, moja navodila za commit sporočila).","when_not":"Ne podvajaj skillov med nivojema. Kar je specifično za projekt, gre v projektni skill. Kar je splošno in tvoje, gre v uporabniški. Vsebine ki sta isti ni treba pisati dvakrat.","why_it_matters":"Enako načelo kot pri CLAUDE.md hierarhiji: projektno in osebno delata skupaj. Team dobi konsistentnost, posameznik ohrani osebne preference. Claude kombinira oba nivoja samodejno."},{"id":66,"section_id":10,"name":"Kdaj je Skill pravi tool","icon":"ti-checklist","badge_type":"when","badge_text":"Primeri","short_desc":"Deployment, code review, arhitekturni vzorci, debug workflow — ponavljajoče procedure z jasno obliko","what_it_does":"Najboljši kandidati za skille: deployment checklist (koraki pred in po produkcijskemu deploymentu), code review standard (kaj preveriti pri vsakem PR), arhitekturni vzorec (kako graditi nov modul po team standardih), API integration template, sistematičen debug workflow. Skupni imenovalec: jasno definirana procedura, ki se ponavlja.","when_to_use":"Ko naloga in postopek imata jasno definirano obliko — in se postopek ponavlja. Enkratnih nalog ne pretvarjaj v skille. Procedura, ki jo ponavljaš dvakrat mesečno — nedvomno ja.","when_not":"Ne za kratka, enostavna navodila, ki jih lažje vneseš direktno v prompt. Skill ima smisel ko je navodilo dovolj kompleksno, da ga ne bi pisal vsakič znova. Overhead pisanja skilla se mora povrniti.","why_it_matters":"Skills so institucionalno znanje v obliki, ki jo Claude razume in takoj izvede. Namesto da vsakič razlagaš istih 10 korakov deployanja ali code review standarda, enkrat napišeš skill in ga kličeš ko ga rabiš."},{"id":67,"section_id":10,"name":"Ustvarjanje skilla","icon":"ti-file-plus","badge_type":"rare","badge_text":"Kako začneš","short_desc":"Skill je navadna .md datoteka — napišeš jo sam ali prosiš Clauda, da jo ustvari na podlagi tvojega opisa","what_it_does":"Skill ustvariš kot Markdown datoteko v .claude/skills/ (ime-skilla.md). Vsebina je prosta oblika — zapišeš navodila, postopke, vzorce v Markdown. Alternativno rečeš Claudu: 'Ustvari skill za naš deployment postopek' in Claude napiše datoteko na podlagi tvojega opisa ali obstoječe dokumentacije.","when_to_use":"Ko opaziš, da daješ Claudu ista navodila znova in znova v vsaki seji. Ko subagent potrebuje specializirano znanje za svojo nalogo. Ko hočeš ekipi zagotoviti konsistentno proceduro.","when_not":"Ne začni s skilli takoj ob zagonu projekta. Enako kot pri CLAUDE.md — pusti, da se vzorci pokažejo organsko. Skill ima vrednost, ko je jasno kaj vsebuje in kdaj se kliče.","why_it_matters":"Skill je naložba: enkrat napišeš, večkrat kličeš. Anthropic je Claude Code zasnoval za organsko gradnjo knjižnice znanja — skills so mehanizem za ta dolgoročni spomin. Vsaka dobra procedura je potencialni skill."}],"notes":[{"id":45,"section_id":10,"note_type":"youtube","content":"bjdBVZa66oU","sort_order":-3},{"id":46,"section_id":10,"note_type":"desc","content":"Skills so ena od naprednih funkcij Claude Code, ki ločijo pravo produktivno delo od eksperimentiranja. Ko razumeš razliko med CLAUDE.md (vedno), Skills (na zahtevo) in Subagents (izvajalci), imaš cel sistem za organizacijo znanja in dela — vsaka plast opravlja svojo vlogo.","sort_order":-2},{"id":47,"section_id":10,"note_type":"tip","content":"Skills delajo skupaj s Subagents: dodaj ključ <code>skills</code> v YAML frontmatter subagenta in skill se naloži samodejno ob zagonu — brez da ga moraš posebej klicati med nalogo.","sort_order":-1},{"id":48,"section_id":10,"note_type":"subsection-header","content":"Skills, CLAUDE.md ali Subagents?","sort_order":10},{"id":49,"section_id":10,"note_type":"tip","content":"Hitro pravilo: <strong>CLAUDE.md</strong> = kdo smo in kako delamo (vedno v kontekstu). <strong>Skill</strong> = kako narediti X (na zahtevo). <strong>Subagent</strong> = agent ki X naredi (delegiraj). Vsako na svojem mestu.","sort_order":11}],"questions":[{"id":82,"q":"Kaj je Skill v Claude Code?","options":["Razširitev za IDE","Markdown datoteka z navodili, ki jo Claude naloži na zahtevo","Posebna vrsta subagenta z lastnim kontekstom","Ukaz za namestitev paketov"],"correct":1,"explanation":"Skill je Markdown datoteka z navodili, postopki ali vzorci v .claude/skills/. Claude jo naloži samo ko jo eksplicitno aktiviraš — ne samodejno ob vsaki seji."},{"id":83,"q":"Kaj je ključna razlika med Skill in CLAUDE.md?","options":["Skills so v JSON formatu, CLAUDE.md v Markdown","CLAUDE.md se naloži ob vsaki seji, Skill samo ko ga pokličeš","Skills so samo za napredne razvijalce","Ni razlike — oba delata enako"],"correct":1,"explanation":"CLAUDE.md se samodejno doda k vsakemu promptu ob zagonu seje — vedno v kontekstu. Skill se naloži samo ko ga eksplicitno aktiviraš. To je bistvena razlika za upravljanje kontekstnega prostora."},{"id":84,"q":"Kje shranješ projektne Skille, da jih deli cel team?","options":["V root mapi skupaj z CLAUDE.md","V .claude/skills/ direktoriju (commitaš v version control)","V ~/.claude/skills/ (osebna mapa)","V /usr/local/lib/claude/"],"correct":1,"explanation":"Projektni skilli živijo v .claude/skills/ in se commitajo v repozitorij — cel team jih deli. Uporabniški skilli gredo v ~/.claude/skills/ in so samo tvoji."},{"id":85,"q":"Kdaj je Skill boljša izbira kot CLAUDE.md?","options":["Vedno — Skills so novejša in boljša funkcija","Ko gre za proceduralno znanje ki ga Claude ne potrebuje vsakič, ampak samo v določenih situacijah","Ko projekt nima CLAUDE.md datoteke","Ko delaš v Plan Mode"],"correct":1,"explanation":"CLAUDE.md je za znanje ki ga Claude vedno potrebuje. Skill je za proceduralno znanje z določenim obsegom — deployment, code review, vzorci — ki ga kličeš samo ko je relevantno."},{"id":86,"q":"Kakšna je razlika med Skill in Subagent?","options":["Skill izvaja naloge, Subagent hrani znanje","Skill = znanje/navodila za Clauda, Subagent = ločeni agent ki izvaja naloge","Sta sinonima — isto orodje z drugačnim imenom","Skill je starejša verzija Subagenta"],"correct":1,"explanation":"Skill pove Claudu KAK delati — vsebuje navodila in vzorce. Subagent je ločeni agent ki TO NAREDI v svojem kontekstnem oknu. Skill je vhod z znanjem, subagent je izvajalec."},{"id":87,"q":"Kako aktiviraš specifičen Skill med sejo?","options":["Z ukazom /skill ime-skilla ali referenco v promptu","Z restartem Claude Code","Samodejno se aktivira ob vsaki seji","Prek Edit > Skills v meniju IDE"],"correct":0,"explanation":"/skill ime-skilla aktivira skill in naloži njegovo vsebino v aktiven kontekst. /skills (množina) prikaže seznam vseh dostopnih skillov."},{"id":88,"q":"Kdaj je pravi čas za ustvariti Skill?","options":["Takoj ob začetku projekta, preventivno","Ko opaziš, da vsakič daješ Claudu ista navodila — vzorec se je pokazal","Samo ko ti to naroči vodja ekipe","Ko imaš vsaj 100 datotek v projektu"],"correct":1,"explanation":"Enako načelo kot pri CLAUDE.md: začni brez skillov in jih dodajaj ko vidimo ponavljajoče vzorce. Skill ima smisel ko se ista procedura pojavi večkrat."},{"id":89,"q":"Kako Skills delajo skupaj s Subagenti?","options":["Skills nadomestijo subagente","Skill dodaš v YAML frontmatter subagenta — naloži se samodejno ob zagonu, subagent takoj dobi specializirano znanje","Subagent kliče skill samo v Plan Mode","Med njima ni povezave"],"correct":1,"explanation":"Skill dodaš v YAML frontmatter subagenta prek ključa skills. Ko se subagent zažene, se skill naloži v celoti samodejno — subagent takoj deluje s polnim specializiranim znanjem."}]},{"id":11,"lesson":"Lekcija 4","title":"MCP: Povezi Claude Code z zunanjim svetom","features":[{"id":68,"section_id":11,"name":"Model Context Protocol","icon":"ti-plug-connected","badge_type":"when","badge_text":"Odprti standard","short_desc":"Odprti standard, ki Claude Code poveže z zunanjimi orodji in podatki — tvoj ekosistem dostopen Claudu","what_it_does":"MCP (Model Context Protocol) je odprti standard, ki Claude Code omogoča dostop do zunanjih orodij in podatkovnih virov. Namesto da Claude dela samo z lokalnimi datotekami, dobi dostop do projektnih orodij (Linear, Jira), dokumentacijskih baz, API-jev, baz podatkov — česarkoli kar ima MCP strežnik.","when_to_use":"Ko velik del tvojega konteksta živi zunaj kode — v projektnih orodjih, dokumentacijah, oblačnih podatkih. MCP prinaša ta kontekst neposredno v Claudovo delovno okolje.","when_not":"Ne za vsak zunanji servis brez premisleka. Vsak aktiven MCP strežnik zasede prostor v kontekstu — dodaj samo tiste, ki jih aktivno potrebuješ za ta projekt.","why_it_matters":"Večina resničnega dela se ne dogaja samo v kodi — dogaja se v kombinaciji kode, nalog, dokumentacije in podatkov. MCP je most med Claudom in tem ekosistemom, ki je bil prej nedostopen."},{"id":69,"section_id":11,"name":"HTTP vs Stdio strežniki","icon":"ti-server","badge_type":"when","badge_text":"Dve vrsti","short_desc":"HTTP = oddaljeni servis pri ponudniku, Stdio = lokalni proces na tvojem računalniku","what_it_does":"HTTP MCP strežniki so oddaljeni — hostirani pri ponudniku servisa, komunicirajo prek omrežja. Primeri: Slack MCP, GitHub MCP, Notion MCP. Stdio MCP strežniki so lokalni procesi na tvojem računalniku. Primeri: lokalna baza podatkov, interni tool podjetja, skript za dostop do internih sistemov.","when_to_use":"HTTP za javne servise z uradnim MCP strežnikom (Linear, Notion, Slack, GitHub). Stdio za lokalna orodja ali ko potrebuješ predelati podatke preden jih pokažeš Claudu.","when_not":"HTTP strežniki zahtevajo omrežno povezavo — v offline scenarijih niso na voljo. Stdio strežniki zahtevajo lokalno konfiguracijo in zagon procesa — malo več nastavitev na začetku.","why_it_matters":"Razumevanje tipov pomaga pri troubleshootingu: je strežnik nedostopen? Preveri omrežje za HTTP ali lokalni proces za Stdio. Tip pove, kje iskati težavo."},{"id":70,"section_id":11,"name":"claude mcp add","icon":"ti-terminal-2","badge_type":"when","badge_text":"Kako dodaš","short_desc":"Ukaz v terminalu zunaj seje — Claude te vodi skozi nastavitev novega MCP strežnika","what_it_does":"MCP strežnik dodaš z ukazom <code>claude mcp add</code> v terminalu zunaj Claude Code seje. Claude te vodi skozi postopek: ime strežnika, tip (HTTP ali Stdio), URL ali ukaz, obseg (Local/User/Project). Ko je strežnik dodan, je na voljo ob naslednjem zagonu seje.","when_to_use":"Ko hočeš Claudu dati dostop do novega zunanjega servisa ali podatkovnega vira. Enkratna nastavitev — potem je strežnik vedno na voljo glede na izbrani obseg.","when_not":"Ne za strežnike ki jih rabiš samo enkrat za eksperiment. Dodaj samo trajne integracije, ki prinašajo redno vrednost — vsak strežnik ima kontekstno ceno.","why_it_matters":"<code>claude mcp add</code> je enostavna vstopna točka brez ročnega urejanja konfiguracijskih datotek. En ukaz, en vodeni postopek, strežnik je dodan. Nič skritega."},{"id":71,"section_id":11,"name":"/mcp ukaz","icon":"ti-adjustments-horizontal","badge_type":"when","badge_text":"Med sejo","short_desc":"Vtipkaj /mcp med sejo — prikaže vse strežnike, stanje in možnost začasnega izklopa","what_it_does":"Ukaz /mcp med sejo prikaže vse konfigurirane MCP strežnike: kateri so povezani, kateri niso, kateri imajo napako. Odtod jih začasno izklopiš za trenutno sejo brez brisanja permanentne konfiguracije. Vgrajeni strežniki (claude-in-chrome, plugin-context) so vedno vidni.","when_to_use":"Ko hočeš preveriti kateri strežniki so aktivni, ali ko hočeš začasno izklopiti strežnik ki ga za to sejo ne potrebuješ — in s tem sprostiti kontekstni prostor za nalogo.","when_not":"Ne za permanentno brisanje strežnikov — to narediš zunaj seje z <code>claude mcp remove</code>. /mcp je za sprotno upravljanje, ne konfiguracijo.","why_it_matters":"/mcp je tvoja kontrolna plošča za MCP med delom. Jasna slika tega, kaj je aktivno, ti da nadzor nad kontekstnim prostorom brez iskanja konfiguracijskih datotek."},{"id":72,"section_id":11,"name":"Scopanje strežnikov","icon":"ti-git-branch","badge_type":"when","badge_text":"Trije nivoji","short_desc":"Local = samo tvoj projekt, User = vsi tvoji projekti, Project = cel team prek .mcp.json","what_it_does":"Obseg MCP strežnika določiš ob dodajanju: Local — dostopen samo v trenutnem projektu, samo zate. User — dostopen v vseh tvojih projektih (shranjen v ~/.claude/). Project — dostopen vsem v teamu; commitaš .mcp.json v repozitorij in ekipa dobi enake strežnike samodejno ob kloniranju.","when_to_use":"Local: za testiranje novega strežnika. User: za osebne integracije ki jih jemlješ od projekta do projekta. Project: za ekipne integracije — vsi morajo imeti enak dostop do istih orodij.","when_not":"Ne dajaj vsega na User nivo — hitro postane nepregledno. Razmisli: je ta integracija za ta projekt ali za vse moje projekte? Za eksperimente vedno Local.","why_it_matters":"Project scope s .mcp.json je ekipni mehanizem: enkrat dodaš strežnik in cel team ga dobi samodejno ob clonanju repozitorija. Nič ročnega nastavljanja za vsakega člana."},{"id":73,"section_id":11,"name":"Kontekstni stroški MCP","icon":"ti-battery-charging","badge_type":"caution","badge_text":"Pazi","short_desc":"Vsak aktiven strežnik naloži definicije orodij v kontekst — 5 strežnikov × 20 orodij = precejšen prostor","what_it_does":"Claude naloži definicije orodij vsakega aktivnega MCP strežnika samodejno — preden sploh začneš delati. Pet strežnikov z dvajsetimi orodji vsak zasede precejšen del kontekstnega okna. Ukaz /mcp ti pokaže kaj je aktivno — izklopiti kar ne potrebuješ za to sejo.","when_to_use":"/mcp preveri pred začetkom obsežne seje: kateri strežniki so aktivni, izklopiti neuporabljene. Posebno važno pri nalogah, ki zahtevajo dolg kontekst (analiza velike kode baze, kompleksne refaktoracije).","when_not":"Ne izklopiti strežnikov, ki jih aktivno potrebuješ za nalogo. Cilj je odstraniti NEPOTREBNE — ne vse MCP strežnike. Ravnovesje med dostopnostjo in kontekstno ekonomijo.","why_it_matters":"Ko Claude-ovi MCP orodji presežejo 10% kontekstnega okna, Claude Code preklopi na auto-discovery (išče orodja on-demand) — a to morda ne deluje vedno zanesljivo. Bolje preventivno upravljati obseg."},{"id":74,"section_id":11,"name":"Skills kot alternativa MCP","icon":"ti-replace","badge_type":"when","badge_text":"Kontekstna alternativa","short_desc":"Ko imaš CLI ekvivalent, je Skill + terminal kontekstno varčnejša alternativa MCP strežniku","what_it_does":"Nekateri MCP strežniki imajo CLI ekvivalent: gh za GitHub, aws za AWS, kubectl za Kubernetes. CLI je kontekstno varčnejši — ne doda persistentnih definicij orodij v kontekst. Napiši Skill z navodili za specifično nalogo in Claude jo izvede prek terminala namesto MCP.","when_to_use":"Ko je naloga dobro definirana in ima dober CLI tool: deployment na AWS, GitHub operacije (PR, issue, review), database queries. Skill + terminal pogosto doseže enak rezultat brez kontekstnih stroškov MCP.","when_not":"Ne za kompleksne integracije, ki zahtevajo real-time dvosmerni dostop ali zahtevno procesiranje podatkov na strani servisa. Tam MCP nima enakovredne alternative.","why_it_matters":"Kontekstna ekonomija je stalna tema pri Claude Code. MCP je zmogljiv, a ima ceno. Skill + CLI je pragmatična alternativa za enokontaktne operacije — jasna procedura brez trajnega zasedanja kontekstnega prostora."}],"notes":[{"id":50,"section_id":11,"note_type":"youtube","content":"kkBFmwkDzdo","sort_order":-3},{"id":51,"section_id":11,"note_type":"desc","content":"MCP (Model Context Protocol) je odprti standard, ki Claude Code poveže z zunanjimi orodji in podatkovnimi viri. Ko velik del tvojega konteksta živi zunaj kode — v projektnih orodjih, bazah podatkov, dokumentacijah — MCP prinaša ta kontekst neposredno v Claudovo delovno okolje.","sort_order":-2},{"id":52,"section_id":11,"note_type":"tip","content":"Vgrajeni MCP strežniki so vedno dostopni brez konfiguracije: <code>claude-in-chrome</code> (brskalni agent) in <code>plugin-context</code> (kontekst iz IDE). Ostale dodaš z <code>claude mcp add</code>.","sort_order":-1},{"id":53,"section_id":11,"note_type":"subsection-header","content":"Scopanje in kontekstni stroški","sort_order":10},{"id":54,"section_id":11,"note_type":"warning","content":"MCP strežniki dodajo definicije orodij v kontekst — tudi ko jih ne uporabljate aktivno. Redno preverjaj z /mcp in izklopiti strežnike, ki jih za ta projekt ne potrebuješ. Manj aktivnih strežnikov = več prostora za dejansko delo.","sort_order":11}],"questions":[{"id":90,"q":"Kaj je MCP (Model Context Protocol)?","options":["Nova verzija Claude Code","Odprti standard za povezavo Claude Code z zunanjimi orodji in podatkovnimi viri","Metoda za optimizacijo kontekstnega okna","Format za pisanje CLAUDE.md"],"correct":1,"explanation":"MCP je odprti standard ki Claude Code omogoča dostop do zunanjih orodij in podatkov — projektnih orodij, baz podatkov, dokumentacij. Claude ni več omejen samo na lokalne datoteke."},{"id":91,"q":"Kateri dve vrsti MCP strežnikov obstajata?","options":["Javni in zasebni","HTTP (oddaljeni pri ponudniku) in Stdio (lokalni procesi)","Brezplačni in plačljivi","Hitri in počasni"],"correct":1,"explanation":"HTTP strežniki so oddaljeni — hostirani pri ponudniku servisa, komunicirajo prek omrežja. Stdio strežniki so lokalni procesi na tvojem računalniku."},{"id":92,"q":"Kako dodaš MCP strežnik v Claude Code?","options":["Z ročnim urejanjem ~/.claude/config.json","Z ukazom claude mcp add v terminalu (zunaj seje)","Prek nastavitev v VS Code razširitvi","Samodejno se doda ob prvem zagonu"],"correct":1,"explanation":"claude mcp add je ukaz v terminalu zunaj seje, ki te vodi skozi nastavitev: ime, tip, URL/ukaz, obseg. Enkratna nastavitev."},{"id":93,"q":"Kaj naredi ukaz /mcp med sejo?","options":["Doda novi MCP strežnik","Prikaže vse konfigurirane strežnike, stanje in možnost začasnega izklopa","Briše vse MCP strežnike","Prenese novo verzijo Claude Code"],"correct":1,"explanation":"/mcp je kontrolna plošča za MCP med delom — vidiš kateri so aktivni, kateri imajo napako, in jih začasno izklopiš za trenutno sejo."},{"id":94,"q":"Kateri scope omogoča deljenje MCP strežnikov z ekipo?","options":["Local scope","User scope","Project scope prek .mcp.json v repozitoriju","Global scope"],"correct":2,"explanation":"Project scope zahteva .mcp.json datoteko, ki jo commitaš v repozitorij. Ob kloniranju ekipa dobijo enake MCP strežnike samodejno."},{"id":95,"q":"Zakaj je treba izklopiti neuporabljene MCP strežnike?","options":["Ker so nevarni za varnost","Ker upočasnijo internet","Ker vsak aktiven strežnik naloži definicije orodij v kontekst brez koristi za nalogo","Ker zasedejo prostor na disku"],"correct":2,"explanation":"Claude naloži definicije orodij vsakega aktivnega MCP strežnika samodejno — tudi tistih ki jih ne folosiš. To zasede dragoceni kontekstni prostor brez koristi."},{"id":96,"q":"Kaj pomeni Local scope pri MCP strežniku?","options":["Strežnik ki teče na lokalnem računalniku (Stdio)","MCP strežnik dostopen samo v trenutnem projektu, samo tebi","Strežnik brez dostopa do interneta","Strežnik ki deluje samo v terminalu"],"correct":1,"explanation":"Local scope = strežnik je dostopen samo v tem projektu, samo zate. Ni v version controlu. Dobro za testiranje pred trajno dodajo."},{"id":97,"q":"Kdaj je Skill + CLI boljša alternativa MCP strežniku?","options":["Vedno — Skill je vedno boljši","Ko ima naloga dober CLI ekvivalent — Skill + terminal brez trajnih kontekstnih stroškov MCP","Ko MCP strežnik ni na voljo","Ko delaš v Plan Mode"],"correct":1,"explanation":"Nekatere MCP integracije imajo CLI ekvivalent (gh, aws, kubectl). Skill + CLI je kontekstno varčnejši — ne dodaja persistentnih definicij orodij v kontekst. Za enokontaktne operacije pragmatična alternativa."}]},{"id":12,"lesson":"Lekcija 5","title":"Hooks: Deterministična kontrola nad Claude Code","features":[{"id":75,"section_id":12,"name":"Hooks","icon":"ti-hook","badge_type":"when","badge_text":"Deterministično","short_desc":"Ukazi, ki se zaženejo ob točno določenih točkah Claude Code lifecycle-a — vsakič, brez izjeme","what_it_does":"Hooks ti omogočijo namestiti ukaze na specifičnih točkah Claude Code lifecycle-a: pred klicem orodja, po klicu, ob vnosu prompta, ob zaključku. Ključna lastnost: hooks so deterministični — vedno se zaženejo, brez izjeme. Claude v CLAUDE.md morda bo formatiral datoteko — hook zagotovi, da se to zgodi absolutno vsakič.","when_to_use":"Ko hočeš zagotoviti, da se določena stvar zgodi VEDNO — ne samo ko Claude presodi, da je primerno. Auto-formatting, varnostni pregledi pred akcijami, logging, obvestila ob zaključku — vse kar zahteva zanesljivo izvajanje.","when_not":"Ne za prilagodljiva vedenja, ki se morajo odzvati na kontekst. Hook je za togo, deterministično logiko — 'vsakič, brez razmišljanja'. Za priporočila in soft suggestions so CLAUDE.md navodila bolj primerna.","why_it_matters":"Ključna razlika je beseda 'vsakič'. Claude je inteligenten in prilagodljiv — a včasih rabiš garancijo, ne sugestijo. Za varnostne pravila in konsistentno formatiranje je hook ta garancija."},{"id":76,"section_id":12,"name":"PreToolUse","icon":"ti-player-stop","badge_type":"caution","badge_text":"Pred akcijo","short_desc":"Teče PRED vsakim klicem orodja — lahko blokira akcijo preden se zgodi","what_it_does":"PreToolUse hook se izvede preden Claude pokliče katero koli orodje (branje datoteke, pisanje, terminalni ukaz). Prejme ime orodja in vhod kot JSON na stdin. Z exit kodo nadziraš vedenje: exit 0 = nadaljuj normalno, exit 2 = blokiraj akcijo (tvoje sporočilo na stderr gre Claudu kot feedback), katerakoli druga koda = neblokirajoča napaka, vidna samo tebi.","when_to_use":"Za uveljavljanje trdih varnostnih pravil: blokiraj pisanje v produkcijsko konfiguracijo, blokiraj bash z rm -rf, blokiraj commite neposredno na main branch. Vse, kar mora biti PREPREČENO — ne samo odsvetovano.","when_not":"Ne za priporočila ali mehka opozorila — za to so CLAUDE.md navodila dovolj. PreToolUse je za hard blocks, ki se morajo uveljavljati brez izjeme.","why_it_matters":"Exit koda 2 z jasnim sporočilom vrne feedback Claudu — Claude ve zakaj je bil ustavljen in predlaga alternativo. To je varnostni mehanizem z inteligentnim odzivom, ne slepa blokada ki povzroča zmedeno ponavljanje."},{"id":77,"section_id":12,"name":"PostToolUse","icon":"ti-player-play","badge_type":"when","badge_text":"Po akciji","short_desc":"Teče TAKOJ po klicu orodja — najpogostejša uporaba: auto-formatting in logging","what_it_does":"PostToolUse hook se izvede takoj ko orodje zaključi. Nastavi matcher na 'Edit|Write' — hook se sproži vsakič ko Claude uredi ali napiše datoteko. Ukaz preveri ekstenzijo in požene pravi formatter: Prettier za TypeScript, gofmt za Go, black za Python. En hook, konsistentno formatiranje za cel projekt.","when_to_use":"Auto-formatting po vsakem urejanju datoteke, logging vseh izvedenih ukazov za audit trail, sprožanje specifičnih testov po spremembi kritičnih datotek, pošiljanje obvestil ekipi ob določenih akcijah.","when_not":"Pazi na performance: PostToolUse hook, ki teče po vsakem branju datoteke, bo bistveno upočasnil delo. Vedno nastavi matcher, da se sproži samo za relevantna orodja (Edit|Write, ne vsa).","why_it_matters":"Najcenejši način za konsistentno formatiranje pri celemu timu: namesto da Claudu razlagaš 'vedno formatiraj po urejanju', to garantiraš z enim hook-om v repozitoriju. Enkrat nastavljeno, vsakič izvršeno, za vsakogar."},{"id":78,"section_id":12,"name":"UserPromptSubmit","icon":"ti-send","badge_type":"when","badge_text":"Ob promptu","short_desc":"Teče ob vnosu prompta, preden Claude začne procesirati — priložnost za obogatitev ali pregled","what_it_does":"UserPromptSubmit hook se izvede ob vnosu prompta, preden Claude začne procesirati. Prejme vsebino prompta. Primeri: samodejno dodaj kontekst vsakemu promptu (datum, ime trenutnega branch-a, ime projekta), preveri ali prompt vsebuje občutljive podatke pred pošiljanjem, logiraj vse prompte za analizo.","when_to_use":"Ko hočeš sistematično obogatiti vsak prompt s kontekstom, ki ga Claude vsakič potrebuje — brez da ga ročno dodajate. Ali za revizijsko sled vseh promptov v organizacijskem okolju.","when_not":"Ne za spremembe, ki jih mora Claude interpretirati drugače glede na situacijo — tam je boljši sistem promptov v CLAUDE.md ali samem promptu. Hook je za deterministično, ne kontekstualno obogatitev.","why_it_matters":"Vsak prompt gre skozi UserPromptSubmit hook — to je priložnost za sistematično dodajanje metapodatkov ali pregled. En hook, ki dvigne kakovost vsakega prompta brez nobenega ročnega dela."},{"id":79,"section_id":12,"name":"Stop & Notification","icon":"ti-bell","badge_type":"when","badge_text":"Po zaključku","short_desc":"Stop teče ko Claude konča — Notification ko Claude pošlje obvestilo; idealno za lastna obvestila","what_it_does":"Stop hook se izvede ko Claude zaključi z odgovarjanjem. Idealno za pošiljanje obvestil (e-mail, Slack sporočilo, sistemski zvok) ko dolga naloga konča. Notification hook se izvede ko Claude sam pošlje obvestilo — tu ga prestrežeš in obdelaš po svoje (drug kanal, drug format, dodaten logging).","when_to_use":"Stop: ko začnjaš dolge naloge, ki trajajo minute ali dlje, in hočeš biti obveščen ko so končane — brez čakanja pri terminalu. Notification: ko hočeš prilagoditi format ali kanal Claude-ovih obvestil.","when_not":"Ne za kratke, hitre naloge — obvestilo ob 3-sekundnem odgovoru je nepotrebno. Stop hook je za naloge, kjer bi sicer čakal brez dela.","why_it_matters":"Claude Code zna delati v ozadju na dolgotrajnih nalogah. Stop hook te osvobodi od čakanja — naredi kaj drugega, pride obvestilo, vrneš se ko je čas."},{"id":80,"section_id":12,"name":"Blokiranje z exit kodo","icon":"ti-circle-x","badge_type":"when","badge_text":"Trije odzivi","short_desc":"Exit 0 = nadaljuj, Exit 2 = blokiraj in pojasni Claudu, katera koli druga koda = napaka samo za tebe","what_it_does":"PreToolUse hooks nadzorujejo Claude z exit kodami: Exit 0 = normalno nadaljuj. Exit 2 = blokiraj akcijo; stderr sporočilo gre Claudu kot feedback, ki razume zakaj in se prilagodi. Katera koli druga exit koda = neblokirajoča napaka, vidna samo tebi — Claude ne ve zanjo in nadaljuje.","when_to_use":"Exit 2 z jasnim sporočilom: ko hočeš Claudu povedati zakaj je bila akcija blokirana in mu dati smer za alternativo. Npr: 'Pisanje v produkcijski direktorij je blokirano. Uporabi staging okolje ali dodaj spremembo v PR.'","when_not":"Ne za pusto blokiranje brez razlage — Claude bo brez feedbacka poskusil znova na drugačen način, kar lahko povzroči zmedeno izvajanje. Vedno dodaj smiselno sporočilo z exit 2.","why_it_matters":"Exit 2 je eleganten mehanizem: ne samo prepreči akcijo, ampak Claudu pove zakaj. Claude se prilagodi in predlaga alternativo — namesto da se ponavlja v krogu. Varnost z razumevanjem, ne slepa blokada."},{"id":81,"section_id":12,"name":"Deljenje hooks z ekipo","icon":"ti-users","badge_type":"when","badge_text":"Ekipni hooks","short_desc":"Hooks v .claude/settings.json gredo v version control — cel team dobi enake varnostne pravice in auto-formatiranje","what_it_does":"Hooks konfigurirani v .claude/settings.json so project-level in jih commitaš v repozitorij — cel team dobi enake hooks samodejno ob kloniranju. Uporabi okoljsko spremenljivko CLAUDE_PROJECT_DIR v ukazih, da se skripte najdejo ne glede na to, kje ima kdo klon repozitorija.","when_to_use":"Za varnostne hooks (blokiraj produkcijske operacije), formatiranje (Prettier/gofmt za cel team), audit logging vseh Claude Code akcij — vse kar mora biti konsistentno pri vsakem članu ekipe.","when_not":"Osebni hooks (tvoje obvestilo na Slack, tvoj terminal zvok ob zaključku) gredo v ~/.claude/settings.json — ne v repozitorij. Ločuj ekipne (varnost, formatiranje) od osebnih (preference) hooks.","why_it_matters":"Deljeni hooks zagotovijo, da varnostna pravila niso samo priporočila v CLAUDE.md — so uveljavljeni pri vsakem članu ekipe, v vsaki seji, avtomatično. En merge request za varnostni hook ščiti cel team."}],"notes":[{"id":55,"section_id":12,"note_type":"youtube","content":"IkaPHiMDazM","sort_order":-3},{"id":56,"section_id":12,"note_type":"desc","content":"Hooks so zadnji nivo prilagajanja Claude Code. Medtem ko CLAUDE.md, Skills, Subagents in MCP razširjajo Claudovo znanje in zmogljivosti, Hooks dodajo deterministično logiko — ukaze, ki se zaženejo vsakič, brez izjeme. Auto-formatting, varnostni pregledi, obvestila ob zaključku.","sort_order":-2},{"id":57,"section_id":12,"note_type":"tip","content":"Hooks konfiguriraj z ukazom <code>/hooks</code> v Claude Code, ali z direktnim urejanjem <code>~/.claude/settings.json</code> za osebne hooks in <code>.claude/settings.json</code> za ekipne hooks v repozitoriju.","sort_order":-1},{"id":58,"section_id":12,"note_type":"subsection-header","content":"Praktični primer: auto-formatting","sort_order":10},{"id":59,"section_id":12,"note_type":"desc","content":"Nastavi PostToolUse hook z matcherjem <code>'Edit|Write'</code>. Ukaz preveri ekstenzijo datoteke in požene pravi formatter — Prettier za TypeScript, gofmt za Go, black za Python. Enostavna nastavitev enkrat v .claude/settings.json: konsistentno formatiranje pri vsakem urejanju, za cel team, brez da bi se na to sploh morali spomniti.","sort_order":11},{"id":60,"section_id":12,"note_type":"warning","content":"PreToolUse hooks z exit kodo 2 BLOKIRAJO akcijo. Preden jih aktiviraš na produkcijskem projektu, testiraj na testnem okolju. Napačna konfiguracija blokira legitimne operacije — in to je težje opaziti kot pričakovati.","sort_order":12}],"questions":[{"id":98,"q":"Kaj je ključna lastnost Hooks, ki jih loči od CLAUDE.md navodil?","options":["So hitrejši od CLAUDE.md","So deterministični — vsakič se zaženejo brez izjeme","Delajo samo v terminalu","Podpirajo samo Python ukaze"],"correct":1,"explanation":"Hooks so deterministični — vedno se zaženejo, brez izjeme. Claude z navodilom v CLAUDE.md 'bo poskušal' narediti X. Hook garantira da se zgodi absolutno vsakič."},{"id":99,"q":"Kdaj se sproži PreToolUse hook?","options":["Ob zagonu Claude Code","Ko vneseš prompt","PRED vsakim klicem orodja — preden Claude izvede akcijo","Ko Claude zaključi z odgovarjanjem"],"correct":2,"explanation":"PreToolUse se izvede preden Claude pokliče katero koli orodje — pred branjem datoteke, pisanjem, terminalskim ukazom. Priložnost za blokiranje preden se akcija zgodi."},{"id":100,"q":"Kateri hook je najboljši za auto-formatting po urejanju datotek?","options":["PreToolUse","UserPromptSubmit","PostToolUse z matcherjem 'Edit|Write'","Stop"],"correct":2,"explanation":"PostToolUse se izvede takoj ko orodje zaključi. Matcher 'Edit|Write' zagotovi, da se hook sproži samo ob urejanju datotek — ne pri vsakem klicu orodja."},{"id":101,"q":"Kaj pomeni exit koda 2 v PreToolUse hooku?","options":["Hook je bil uspešen","Hook je imel interno napako","Blokiraj akcijo in pošlji stderr sporočilo Claudu kot feedback","Nadaljuj normalno"],"correct":2,"explanation":"Exit 2 = blokiraj akcijo + stderr sporočilo gre Claudu kot feedback. Claude ve zakaj je bil ustavljen in se prilagodi. Exit 0 = normalno, katera koli druga koda = neblokirajoča napaka vidna samo tebi."},{"id":102,"q":"Kdaj se sproži Stop hook?","options":["Ko stopiš Claude Code","Ko Claude zaključi z odgovarjanjem — odlično za obvestila po dolgih nalogah","Ko blokiraš akcijo z exit 2","Ob vsakem vnosu prompta"],"correct":1,"explanation":"Stop hook se izvede ko Claude zaključi z odgovarjanjem. Idealno za pošiljanje obvestil (Slack, e-mail, zvok) ko dolga naloga konča — osvobodi te od čakanja pri terminalu."},{"id":103,"q":"Kje shranješ hooks za deljenje z ekipo?","options":["V CLAUDE.md datoteki","V ~/.claude/settings.json (samo zate)","V .claude/settings.json v repozitoriju (commitaš v version control)","Prek /skills ukaza"],"correct":2,"explanation":"Ekipni hooks gredo v .claude/settings.json v repozitoriju — cel team dobi enake hooks ob kloniranju. Osebni hooks gredo v ~/.claude/settings.json in so samo tvoji."},{"id":104,"q":"Zakaj je smiselno dodati sporočilo ob exit kodi 2 v PreToolUse hooku?","options":["Ker je to obvezno po specifikaciji","Claude dobi feedback — razume zakaj je bil ustavljen in predlaga alternativo namesto ponavljanja","Sporočilo se zapiše v log datoteko","Samo za lažji debugging hooka"],"correct":1,"explanation":"Sporočilo ob exit 2 gre Claudu kot feedback — razume zakaj je bil ustavljen in predlaga alternativo. Brez sporočila Claude ne ve zakaj in bo morda poskusil znova na drugačen način."},{"id":105,"q":"Kateri hook se izvede ob vnosu prompta, preden Claude začne procesirati?","options":["PreToolUse","PostToolUse","UserPromptSubmit","Stop"],"correct":2,"explanation":"UserPromptSubmit se izvede ob vnosu prompta, preden Claude začne procesirati. Primeri: samodejno dodaj kontekst (datum, branch), preveri občutljive podatke, logiraj prompte."},{"id":106,"q":"Zakaj je deljenje Hooks z ekipo prek version controla ključno?","options":["Ker hooks drugače ne delajo","Ker varnostna pravila postanejo uveljavljana pri vseh članih — ne samo priporočena v CLAUDE.md","Ker je to zahteva Anthropic","Samo iz organizacijskih razlogov"],"correct":1,"explanation":"Hooks v repozitoriju zagotovijo, da varnostna pravila, formatiranje in logging veljajo za vsakega člana ekipe, v vsaki seji. En merge request ščiti cel team — brez ročnega nastavljanja pri vsakomur."}]}]},{"id":5,"title":"Certification Prep","objectives":["Imeti vse ključne ukaze in koncepte na enem mestu za hitro ponovitev pred izpitom","Razumeti kritične razlike med podobnimi koncepti ki se pogosto zamenjujejo","Prepoznati najpogostejše pasti in napačne odgovore na certifikatskem izpitu","Zaključiti tečaj z zanesljivim, celostnim razumevanjem Claude Code"],"reflections":["Kakšna je ključna razlika med /compact in /clear?|/compact stisne pogovor a ohrani spomin — nadaljuješ isto nalogo. /clear izbriše vse brez sledi — svež start za novo nalogo. Napačna izbira je nepovratna: /compact je varna, /clear je definitvna.","Kaj je edina stvar ki je NIKOLI ne smeš shraniti v CLAUDE.md?|API ključe, gesla in vse občutljive podatke. CLAUDE.md je navadna besedilna datoteka commitana v version control — vidna vsem ki imajo dostop do repozitorija.","Katera exit koda v PreToolUse hooku blokira akcijo in pošlje feedback Claudu?|Exit koda 2. Exit 0 = nadaljuj normalno. Exit 2 = blokiraj akcijo + stderr sporočilo gre Claudu kot razlaga. Katera koli druga koda = napaka vidna samo tebi, Claude ne ve zanjo."],"sections":[{"id":13,"lesson":"Lekcija 1","title":"Quick Reference: Vse na enem mestu","features":[{"id":82,"section_id":13,"name":"Ukazi v seji","icon":"ti-terminal-2","badge_type":"when","badge_text":"Referenca","short_desc":"Vsi ključni /ukazi — vtipkaj direktno v pogovorno polje med sejo","what_it_does":"<strong>/context</strong> — vizualni pregled porabe kontekstnega okna po kategorijah.<br><strong>/compact</strong> — ročna kompakcija, ohrani spomin na potek dela.<br><strong>/clear</strong> — popolna ponastavitev brez spomina.<br><strong>/agents</strong> — ustvari ali upravljaj subagente.<br><strong>/skills</strong> — seznam skillov; <strong>/skill ime</strong> aktivira ga.<br><strong>/hooks</strong> — konfiguracija hooks med sejo.<br><strong>/mcp</strong> — stanje MCP strežnikov, začasni izklop.","when_to_use":"Na začetku obsežne seje: /context (diagnostika prostora), /mcp (izklopiti neuporabljene strežnike). Med nalogo: /compact ko se bližaš limitu. Ob prehodu na novo nalogo: /clear.","when_not":"Ne /clear ko hočeš samo stisniti kontekst — to izgubi vse. Ne /compact pred novo, nepovezano nalogo — star kontekst bo vnašal pristranskost.","why_it_matters":"Poznavanje ukazov ni zapomnitev sintakse — je razumevanje kdaj kateri pomaga. Razlika /compact vs /clear je ena najpogostejših tem na certifikatskem izpitu."},{"id":83,"section_id":13,"name":"Načini dela","icon":"ti-sliders","badge_type":"when","badge_text":"Trije načini","short_desc":"Approval (privzeto) → Auto-accept → Plan Mode — SHIFT+TAB cikla med njimi v terminalu","what_it_does":"<strong>Approval Mode</strong> (privzeto): dovoljenje pred vsako datoteko in ukazom — polni nadzor.<br><strong>Auto-accept Mode</strong>: datoteke ureja samodejno; terminalni ukazi (npm, git, rm…) še vedno zahtevajo potrditev.<br><strong>Plan Mode</strong>: samo bere in planira, nobenih sprememb dokler ne odobriš načrta.<br><strong>SHIFT+TAB</strong> v terminalu cikla med vsemi tremi brez ponovnega zagona.","when_to_use":"Approval: vedno privzeto, posebej na novem projektu ali kritičnih sistemih. Auto-accept: rutinska opravila na testnem okolju. Plan Mode: pred vsako večjo ali tvegano spremembo.","when_not":"Auto-accept ne na produkcijskem sistemu — napako je težje ujeti. Plan Mode ne za trivialne enodatotečne spremembe.","why_it_matters":"Kritična past izpita: Auto-accept Mode še VEDNO zahteva potrditev za terminalne ukaze — samo datoteke so samodejne. To je pogosta napačna predpostavka pri testnih vprašanjih."},{"id":84,"section_id":13,"name":"Context management","icon":"ti-arrows-minimize","badge_type":"when","badge_text":"Tri orodja","short_desc":"/context (diagnostika) → /compact (stisni, ohrani) → /clear (ponastavi vse) — vsako za svojo situacijo","what_it_does":"<strong>/context</strong>: vizualni pregled porabe po kategorijah (pogovor, datoteke, orodja) — diagnostično.<br><strong>/compact</strong>: ročno stisne pogovor, ohrani spomin na potek, odstrani vmesne podrobnosti.<br><strong>/clear</strong>: izbriše VSE — Claude začne brez nobenega spomina.<br><strong>Samodejni compaction</strong>: aktivira se ko se okno napolni, del konteksta se vedno izgubi.","when_to_use":"/context: ko se seja upočasni. /compact: nadaljevanje iste naloge blizu limita. /clear: prehod na novo, nepovezano nalogo. Pred /clear shrani ključne ugotovitve v CLAUDE.md.","when_not":"Ne /clear samo zato, ker je kontekst velik — /compact je varnejša izbira. Ne /compact ob prehodu na novo nalogo — staro znanje bo vnašalo pristranskost.","why_it_matters":"Razlika je nepovratna: /compact je varna intervencija, /clear je definitvna odločitev. Samodejni compaction je varnostna mreža, ne strategija — bolje proaktivno."},{"id":85,"section_id":13,"name":"CLAUDE.md — ključne točke","icon":"ti-file-description","badge_type":"when","badge_text":"Referenca","short_desc":"Root mapa, vedno v kontekstu, /init, @ sintaksa, dve hierarhiji — in kaj NIKOLI ne smeš shraniti","what_it_does":"<strong>Lokacija</strong>: root mapa projekta.<br><strong>Naloži se</strong>: samodejno ob vsaki seji, doda se k promptu.<br><strong>Ustvari</strong>: ukaz /init (Claude analizira projekt in napiše izhodišče).<br><strong>Referenciraj dokumentacijo</strong>: @README.md v vsebini.<br><strong>Hierarhija</strong>: projektni (version control, za team) + uporabniški (~/.claude/, za vse projekte).<br><strong>NIKOLI</strong>: API ključi, gesla, občutljivi podatki.","when_to_use":"Za stack, ukaze za zagon, kodne konvencije, arhitekturne odločitve — kar Claude vedno potrebuje. Anthropic priporoča: začni brez nje, dodaj ko vidiš ponavljajoče vzorce.","when_not":"Ne polni z vsem — samo kar res vedno potrebuje. Ne shrani gesel ali API ključev — datoteka je v version controlu.","why_it_matters":"Standardno izpitno vprašanje: kaj ne smeš shraniti v CLAUDE.md? API ključi in gesla. Razlika projektni/uporabniški je pogosta tema."},{"id":86,"section_id":13,"name":"CLAUDE.md vs Skills vs Subagents","icon":"ti-git-compare","badge_type":"when","badge_text":"Tri vloge","short_desc":"Vedno v kontekstu vs na zahtevo vs izvajalec — tri ločene vloge, ne alternative","what_it_does":"<strong>CLAUDE.md</strong>: vedno v kontekstu ob vsaki seji — stalno znanje o projektu.<br><strong>Skill</strong>: naloži se samo ko ga pokličeš (/skill ime) — proceduralno znanje na zahtevo.<br><strong>Subagent</strong>: ločeni agent z lastnim kontekstom, izvaja naloge neodvisno, vrne samo rezultat.<br><strong>Kombinacija</strong>: subagent s preloadanim skillom = specializiran izvajalec s specifičnim znanjem.","when_to_use":"CLAUDE.md: stalno, vsakdanje znanje o projektu. Skills: kompleksne procedure ki niso potrebne vsakič (deployment, code review). Subagents: delegiraj nalogo, ohrani čist kontekst.","when_not":"Ne zamenjuj vloge: skill ne izvaja nalog, subagent ne hrani stalnega znanja, CLAUDE.md ne delegira. Vsako orodje ima svojo, jasno vlogo.","why_it_matters":"Ena najpomembnejših konceptualnih razlik v tečaju. Tipično izpitno vprašanje: 'Kdaj Skills namesto CLAUDE.md?' Ko znanja ne rabiš vsakič — na zahtevo je ceneje."},{"id":87,"section_id":13,"name":"MCP — scopanje in stroški","icon":"ti-plug-connected","badge_type":"caution","badge_text":"Pazi na kontekst","short_desc":"Local / User / Project (.mcp.json) — vsak aktiven strežnik zasede kontekst","what_it_does":"<strong>Local</strong>: samo ta projekt, samo ti.<br><strong>User</strong>: vsi tvoji projekti (~/.claude/).<br><strong>Project</strong>: .mcp.json v version controlu — cel team dobi samodejno.<br><strong>Dodaš</strong>: claude mcp add (zunaj seje).<br><strong>Upravljaš</strong>: /mcp med sejo (začasni izklop).<br><strong>Kontekstni strošek</strong>: vsak aktiven strežnik naloži definicije orodij v kontekst brez koristi za nalogo.<br><strong>Alternativa</strong>: Skills + CLI za dobro definirane procedure.","when_to_use":"HTTP za javne servise (Slack, GitHub, Linear). Stdio za lokalne procese. Project scope za ekipne integracije. Redno izklapljaj neuporabljene z /mcp.","when_not":"Ne scopeaj vsega na User — postane nepregledno. Ne pozabi, da aktiven strežnik zasede kontekst tudi ko ga ne используješ.","why_it_matters":"Vprašanje na izpitu: kateri scope za ekipno deljenje? Project (.mcp.json). Zakaj izklapljati neuporabljene strežnike? Kontekstni stroški brez koristi."},{"id":88,"section_id":13,"name":"Hooks — dogodki in exit kode","icon":"ti-hook","badge_type":"when","badge_text":"Referenca","short_desc":"5 dogodkov × 3 exit kode — deterministično, vsakič, brez izjeme","what_it_does":"<strong>Dogodki</strong>: PreToolUse (pred orodjem, blokira), PostToolUse (po orodju — formatiranje), UserPromptSubmit (ob vnosu), Stop (ob zaključku — obvestila), Notification (ob Claude obvestilu).<br><strong>Exit kode (PreToolUse)</strong>: 0 = nadaljuj, 2 = blokiraj + stderr feedback Claudu, ostalo = neblokirajoča napaka samo zate.<br><strong>Konfiguracija</strong>: /hooks ali .claude/set
