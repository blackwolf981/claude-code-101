<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 101 — Interactive Learning Guide</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">

  <style>
    :root {
      --bg:        #111111;
      --surface:   #1c1c1c;
      --border:    rgba(255,255,255,0.07);
      --border-md: rgba(255,255,255,0.13);
      --text:      #F0F0F0;
      --text-sec:  #A0A0A0;
      --text-ter:  #606060;
      --accent:    #FFD166;
      --accent-bg: #2b2200;
      --radius:    10px;
      --radius-lg: 14px;
      --sidebar-w: 270px;
      --header-h:  53px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    button { font-family: system-ui, -apple-system, sans-serif; }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border-md);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: baseline;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      height: var(--header-h);
    }
    .header-title {
      font-family: Georgia, serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
    }
    .header-sub {
      font-size: 12px;
      color: var(--text-sec);
    }
    .header-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 500;
      background: var(--accent-bg);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .layout { display: flex; flex: 1; min-height: 0; }

    /* ── Sidebar ────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 0.5px solid var(--border-md);
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #sb-nav { flex: 1; }

    .ch-btn {
      width: 100%;
      text-align: left;
      padding: 12px 1.25rem 13px;
      background: none;
      border: none;
      border-left: 2px solid transparent;
      border-top: 0.5px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      transition: all .15s;
    }
    .ch-btn:first-child { border-top: none; }
    .ch-btn:hover { background: var(--bg); }
    .ch-btn.active { border-left-color: var(--accent); background: var(--accent-bg); }
    .ch-btn-inner { flex: 1; min-width: 0; }
    .ch-part {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-ter);
      font-weight: 500;
      margin-bottom: 3px;
    }
    .ch-btn.active .ch-part { color: var(--accent); }
    .ch-name { display: block; font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .ch-btn.active .ch-name { color: var(--accent); }

    .ch-sections { display: block; background: var(--bg); border-bottom: 0.5px solid var(--border); }

    .obj-panel { padding: 10px 1.25rem 10px 1.5rem; border-bottom: 0.5px solid var(--border); }
    .obj-title { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); margin-bottom: 6px; }
    .obj-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .obj-list li { font-size: 12px; color: var(--text-sec); line-height: 1.4; padding-left: 12px; position: relative; }
    .obj-list li::before { content: '·'; position: absolute; left: 0; color: var(--accent); }

    .sidebar-item {
      display: flex; flex-direction: column;
      padding: 7px 1.25rem 7px 1.75rem;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all .15s;
    }
    .sidebar-item:hover { background: var(--surface); }
    .sidebar-item.active { border-left-color: var(--accent); background: var(--surface); }
    .si-lesson { font-size: 11px; color: var(--text-ter); margin-bottom: 2px; }
    .si-title  { font-size: 12.5px; color: var(--text-sec); line-height: 1.4; }
    .sidebar-item.active .si-lesson,
    .sidebar-item.active .si-title { color: var(--accent); font-weight: 500; }

    .refl-panel { padding: 10px 1.25rem 12px; border-top: 0.5px solid var(--border); }
    .refl-title { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); margin-bottom: 6px; }
    .refl-item {
      font-size: 12px; color: var(--text-sec);
      padding: .4rem .5rem;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer; margin-bottom: 4px;
      line-height: 1.4; transition: all .15s;
      display: flex; align-items: flex-start; gap: .4rem;
    }
    .refl-item:hover { background: var(--surface); border-color: var(--border-md); }
    .refl-item i { flex-shrink: 0; font-size: 13px; color: var(--text-ter); margin-top: 1px; }
    .refl-hint { font-size: 11.5px; color: var(--accent); padding: .35rem .5rem .5rem 1.5rem; display: none; line-height: 1.45; }
    .refl-hint.open { display: block; }

    /* ── Language switcher ──────────────────────────────────────── */
    .lang-bar { padding: .75rem 1.25rem; border-top: 0.5px solid var(--border-md); }
    .lang-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-ter); margin-bottom: .4rem; }
    .lang-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .lang-btn {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      border: 0.5px solid var(--border-md); background: none;
      cursor: pointer; color: var(--text-sec); transition: all .15s;
    }
    .lang-btn:hover { background: var(--surface); }
    .lang-btn.active { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 600; }

    /* ── Content ────────────────────────────────────────────────── */
    .content { flex: 1; padding: 2rem 2.5rem 3rem; max-width: 900px; overflow-y: auto; }

    .sec-lesson { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); font-weight: 500; margin-bottom: .5rem; }
    .sec-title  { font-size: 22px; font-weight: 500; color: var(--text); line-height: 1.2; margin-bottom: .25rem; }
    .sec-sub    { font-size: 13px; color: var(--text-sec); margin-bottom: 1.5rem; }
    .sec-gap    { margin-bottom: 1.5rem; }

    /* ── Notes ──────────────────────────────────────────────────── */
    .note-youtube {
      width: 100%; aspect-ratio: 16/9;
      border-radius: var(--radius); overflow: hidden;
      border: 0.5px solid var(--border-md); margin-bottom: 1.25rem;
    }
    .note-youtube iframe { width: 100%; height: 100%; display: block; border: none; }

    .note-desc { font-size: 13px; color: var(--text-sec); line-height: 1.65; margin-bottom: 1rem; }

    .note-tip {
      display: flex; align-items: flex-start; gap: .5rem;
      background: rgba(125,211,252,0.08); border-left: 2px solid #38BDF8;
      padding: 9px 13px; font-size: 12px; line-height: 1.6;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #7DD3FC; margin-bottom: .75rem;
    }
    .note-tip i { flex-shrink: 0; margin-top: .1rem; }

    .note-warning {
      display: flex; align-items: flex-start; gap: .5rem;
      background: rgba(251,146,60,0.08); border-left: 2px solid #FB923C;
      padding: 9px 13px; font-size: 12px; line-height: 1.6;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #FB923C; margin-bottom: .75rem;
    }
    .note-warning i { flex-shrink: 0; margin-top: .1rem; }

    .note-subsection {
      font-size: 10px; text-transform: uppercase; letter-spacing: .07em;
      color: var(--text-ter); padding-top: 1rem; margin: .5rem 0 .75rem;
      border-top: 0.5px solid var(--border);
    }

    /* ── View toggle ────────────────────────────────────────────── */
    .view-toggle { display: flex; gap: 6px; margin-bottom: 1.25rem; align-items: center; }
    .view-label  { font-size: 12px; color: var(--text-ter); margin-right: 4px; }
    .view-btn {
      padding: 4px 12px; border-radius: 20px;
      border: 0.5px solid var(--border-md); background: transparent;
      font-size: 12px; color: var(--text-sec); cursor: pointer;
      display: flex; align-items: center; gap: .3rem; transition: all .15s;
    }
    .view-btn:hover { background: var(--surface); }
    .view-btn.active { background: var(--accent); color: #111; border-color: transparent; font-weight: 500; }

    /* ── Feature cards ──────────────────────────────────────────── */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px; margin-bottom: 1rem;
    }
    .feature-grid.hide { display: none; }

    .feature-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 1rem 1.25rem;
      cursor: pointer; transition: border-color .15s; user-select: none;
    }
    .feature-card:hover { border-color: var(--border-md); }
    .feature-card.selected { border: 1.5px solid var(--accent); }
    .feature-card.selected .feature-name i { color: var(--accent); }

    .badge {
      display: inline-block; font-size: 10px; padding: 2px 8px;
      border-radius: 20px; margin-bottom: 8px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge-when    { background: rgba(134,239,172,0.12); color: #86EFAC; }
    .badge-caution { background: rgba(251,146,60,0.12);  color: #FB923C; }
    .badge-rare    { background: rgba(255,255,255,0.07);  color: #A0A0A0; }

    .feature-name {
      font-size: 14px; font-weight: 500; color: var(--text);
      margin-bottom: 4px; display: flex; align-items: center; gap: .35rem;
    }
    .feature-name i { font-size: 15px; color: var(--text-ter); }
    .feature-desc { font-size: 12px; color: var(--text-sec); line-height: 1.5; }

    /* ── Feature table ──────────────────────────────────────────── */
    .features-table {
      width: 100%; border-collapse: collapse; display: none;
      margin-bottom: 1rem; font-size: 13px; background: var(--surface);
      border-radius: var(--radius-lg); overflow: hidden;
      border: 0.5px solid var(--border); table-layout: fixed;
    }
    .features-table.show { display: table; }
    .features-table th {
      text-align: left; padding: 9px 14px; background: var(--bg);
      color: var(--text-sec); font-weight: 500; font-size: 11px;
      text-transform: uppercase; letter-spacing: .04em;
      border-bottom: 0.5px solid var(--border-md);
    }
    .features-table td {
      padding: 10px 14px; border-bottom: 0.5px solid var(--border);
      color: var(--text); vertical-align: top; line-height: 1.5; cursor: pointer;
    }
    .features-table tr:last-child td { border-bottom: none; }
    .features-table tr:hover td { background: var(--bg); }
    .features-table tr.row-selected td { background: var(--accent-bg); }

    /* ── Detail panel — inline 2×2 ──────────────────────────────── */
    .detail-panel {
      background: var(--surface); border: 1.5px solid var(--accent);
      border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem;
    }
    .detail-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 1rem;
    }
    .detail-title {
      font-size: 15px; font-weight: 500; color: var(--text);
      display: flex; align-items: center; gap: .5rem;
    }
    .detail-title i { color: var(--accent); font-size: 16px; }
    .detail-title .badge { margin-bottom: 0; }
    .detail-close {
      background: none; border: 0.5px solid var(--border-md);
      color: var(--text-ter); font-size: 12px; padding: 3px 10px;
      border-radius: 20px; cursor: pointer;
      display: flex; align-items: center; gap: 4px; transition: all .15s; flex-shrink: 0;
    }
    .detail-close:hover { color: var(--text); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detail-cell { padding: 10px 14px; background: var(--bg); border-radius: var(--radius); }
    .detail-cell-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-ter); margin-bottom: 4px; }
    .detail-cell-val   { font-size: 13px; color: var(--text); line-height: 1.6; }

    /* ── Chapter overview ──────────────────────────────────────────── */
    .ch-overview { padding: 0; }
    .ch-overview-header { margin-bottom: 2rem; }
    .ch-overview-num { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); font-weight: 500; margin-bottom: .4rem; }
    .ch-overview-title { font-size: 26px; font-weight: 500; color: var(--text); line-height: 1.2; margin-bottom: 0; }

    .ch-overview-block { margin-bottom: 2rem; }
    .ch-overview-block-title { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); font-weight: 500; margin-bottom: .75rem; padding-bottom: .5rem; border-bottom: 0.5px solid var(--border); }

    .ch-obj-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .ch-obj-list li { font-size: 14px; color: var(--text-sec); line-height: 1.5; padding-left: 16px; position: relative; }
    .ch-obj-list li::before { content: '·'; position: absolute; left: 0; color: var(--accent); font-size: 16px; line-height: 1.3; }

    .ch-lesson-list { display: flex; flex-direction: column; gap: 8px; }
    .ch-lesson-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: .9rem 1.25rem;
      cursor: pointer; transition: border-color .15s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .ch-lesson-card:hover { border-color: var(--border-md); }
    .ch-lesson-card-left { display: flex; flex-direction: column; gap: 2px; }
    .ch-lesson-card-num { font-size: 11px; color: var(--text-ter); }
    .ch-lesson-card-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .ch-lesson-card i { font-size: 16px; color: var(--text-ter); }

    .ch-refl-list { display: flex; flex-direction: column; gap: 6px; }
    .ch-refl-item {
      font-size: 13px; color: var(--text-sec);
      padding: .6rem .75rem;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer; line-height: 1.5; transition: all .15s;
      display: flex; align-items: flex-start; gap: .5rem;
    }
    .ch-refl-item:hover { background: var(--surface); border-color: var(--border-md); }
    .ch-refl-item i { flex-shrink: 0; font-size: 14px; color: var(--text-ter); margin-top: 2px; }
    .ch-refl-hint { font-size: 12px; color: var(--accent); padding: .4rem .75rem .5rem 2rem; display: none; line-height: 1.5; }
    .ch-refl-hint.open { display: block; }

    /* ── Footer ─────────────────────────────────────────────────── */
    .footer { text-align: center; padding: 1.5rem; font-size: 12px; color: var(--text-ter); border-top: 0.5px solid var(--border); }

    /* ── Quiz: sidebar links ───────────────────────────────────────── */
    .ch-quiz-btn {
      background: none; border: 0.5px solid var(--border-md);
      border-radius: 6px; color: var(--text-ter);
      width: 24px; height: 24px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; font-size: 13px; margin-top: 1px;
    }
    .ch-quiz-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }

    .ch-total-btn {
      width: 100%; text-align: left; padding: 12px 1.25rem;
      background: none; border: none; border-top: 0.5px solid var(--border-md);
      border-left: 2px solid transparent; cursor: pointer;
      display: flex; align-items: center; gap: 8px; transition: all .15s;
    }
    .ch-total-btn:hover { background: var(--bg); }
    .ch-total-btn.active { border-left-color: var(--accent); background: var(--accent-bg); }
    .ch-total-btn i { font-size: 16px; color: var(--text-ter); }
    .ch-total-btn.active i { color: var(--accent); }
    .ch-total-inner { flex: 1; }
    .ch-total-part { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); font-weight: 500; }
    .ch-total-btn.active .ch-total-part { color: var(--accent); }
    .ch-total-name { display: block; font-size: 12.5px; color: var(--text-sec); }
    .ch-total-btn.active .ch-total-name { color: var(--accent); font-weight: 500; }

    /* ── Quiz: lesson inline block ─────────────────────────────────── */
    .quiz-start-block {
      margin-top: 1.5rem; padding: 1.5rem;
      background: var(--surface); border: 0.5px solid var(--border-md);
      border-radius: var(--radius-lg); text-align: center;
    }
    .quiz-start-icon { font-size: 32px; margin-bottom: .5rem; }
    .quiz-start-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: .25rem; }
    .quiz-start-desc { font-size: 12.5px; color: var(--text-sec); margin-bottom: 1rem; line-height: 1.5; }

    /* ── Quiz: full-panel (chapter / total) ────────────────────────── */
    .quiz-panel-header { margin-bottom: 1.5rem; }
    .quiz-panel-label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-ter); font-weight: 500; margin-bottom: .4rem; }
    .quiz-panel-title { font-size: 24px; font-weight: 500; color: var(--text); line-height: 1.2; }

    /* ── Quiz: shared engine UI ────────────────────────────────────── */
    .quiz-engine {
      background: var(--surface); border: 0.5px solid var(--border-md);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .quiz-bar {
      padding: 1rem 1.25rem; border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 1rem;
    }
    .quiz-bar-count { font-size: 12px; color: var(--text-sec); white-space: nowrap; font-weight: 500; }
    .quiz-bar-count span { color: var(--accent); }
    .quiz-progress { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .quiz-progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .35s ease; }
    .quiz-engine-body { padding: 1.5rem; }

    .quiz-question { font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.45; margin-bottom: 1.25rem; }
    .quiz-options { display: flex; flex-direction: column; gap: 8px; }
    .quiz-option {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--bg);
      border: 0.5px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: all .13s; font-size: 14px; color: var(--text-sec);
    }
    .quiz-option:not(.answered):hover { border-color: var(--accent); color: var(--text); background: var(--accent-bg); }
    .quiz-option.answered { cursor: default; }
    .quiz-option.correct { background: rgba(134,239,172,0.10); border-color: rgba(134,239,172,0.30); color: #86EFAC; }
    .quiz-option.wrong   { background: rgba(248,113,113,0.10); border-color: rgba(248,113,113,0.30); color: #FB7185; }
    .quiz-option.reveal  { background: rgba(134,239,172,0.10); border-color: rgba(134,239,172,0.30); color: #86EFAC; opacity: .6; }
    .quiz-option-letter {
      width: 24px; height: 24px; border-radius: 5px; background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .quiz-option.correct .quiz-option-letter { background: rgba(134,239,172,0.20); }
    .quiz-option.wrong .quiz-option-letter   { background: rgba(248,113,113,0.20); }
    .quiz-option.reveal .quiz-option-letter  { background: rgba(134,239,172,0.20); }

    .quiz-explain {
      display: none; margin-top: 1rem; padding: 10px 14px;
      background: var(--bg); border-left: 2px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      font-size: 12.5px; color: var(--text-sec); line-height: 1.6;
    }
    .quiz-explain.show { display: block; }
    .quiz-engine-foot { margin-top: 1.5rem; display: flex; justify-content: flex-end; }

    .quiz-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #111;
      font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600;
      padding: 9px 20px; border-radius: 8px; border: none; cursor: pointer; transition: opacity .15s;
    }
    .quiz-btn:hover { opacity: .88; }
    .quiz-btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; color: var(--text-sec);
      font-family: system-ui, sans-serif; font-size: 13px; font-weight: 500;
      padding: 9px 20px; border-radius: 8px; border: 0.5px solid var(--border-md); cursor: pointer; transition: all .15s;
    }
    .quiz-btn-ghost:hover { color: var(--text); background: var(--surface); }

    /* ── Quiz: final score ─────────────────────────────────────────── */
    .quiz-final { text-align: center; padding: 1.5rem 1rem; }
    .quiz-final-emoji { font-size: 46px; margin-bottom: .75rem; }
    .quiz-final-score { font-size: 44px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: .25rem; }
    .quiz-final-pct { font-size: 14px; color: var(--text-sec); margin-bottom: .5rem; }

posreden dostop","short_desc":"Bere in ureja datoteke po celotnem projektu — brez copy/paste","what_it_does":"Ima neposreden dostop do tvojih datotek in celotne kode. Lahko bere, piše, preoblikuje in posodablja katerokoli datoteko v projektu.","when_to_use":"Kadar imaš nalogo, ki vključuje več datotek hkrati — Claude Code sam najde vse relevantne dele.","when_not":"Ne za enkratna vprašanja, ki ne zahtevajo dostopa do datotek — za to je Claude.ai primernejši.","why_it_matters":"Konec copy/paste maratona. Claude Code vidi in ureja tvoj projekt kot celoto, ne samo fragmentov, ki jih prilepiš v chat.","sort_order":2},{"id":3,"section_id":1,"name":"Terminal ukazi","icon":"ti-terminal-2","badge_type":"when","badge_text":"Izvaja akcije","short_desc":"Zažene skripte, testira, instaliira pakete — neposredno v tvojem sistemu","what_it_does":"Izvaja ukaze v terminalu — build skripte, teste, namestitev paketov. Vidi rezultate in se na podlagi njih odloča, kaj narediti naprej.","when_to_use":"Ko imaš nalogo, ki zahteva zagon kode, testiranje ali namestitev orodij.","when_not":"Vedno preveri ukaz preden ga potrdiš — nekateri ukazi imajo stranske učinke na sistemu, ki jih je težko razveljaviti.","why_it_matters":"Claude Code ne samo piše kodo — jo tudi zažene in preveri, ali deluje. To je razlika med predlogom in rešitvijo.","sort_order":3},{"id":4,"section_id":1,"name":"Spletno iskanje","icon":"ti-world-search","badge_type":"when","badge_text":"Vgrajeno","short_desc":"Ko potrebuje dokumentacijo ali API reference, poišče sam","what_it_does":"Kadar naleti na neznano knjižnico, API ali napako, samostojno poišče aktualne informacije na spletu.","when_to_use":"Koristno pri delu z novejšimi knjižnicami ali hitro razvijajočimi se API-ji, kjer so informacije zastarele.","when_not":"Iskanje po spletu upočasni odgovor — ni vedno potrebno za dobro znane tehnologije.","why_it_matters":"Claude Code ni omejen na svoje znanje iz treninga. Doseže zunanji svet, kadar je to potrebno.","sort_order":4},{"id":5,"section_id":1,"name":"Context Window","icon":"ti-brain","badge_type":"caution","badge_text":"Razumej mejo","short_desc":"Delovna memoria Claude Code — drži ogromno, a ne vsega hkrati","what_it_does":"Context window je Claude-ova delovna memoria — koliko informacij lahko hkrati vidi in obdeluje. Za velike projekte to pomeni, da ne naloži vsega naenkrat, ampak strateško navigira.","when_to_use":"Razumevanje context window pomaga pri pisanju boljših navodil — bolj fokusiranih, z manj odvečnega šuma.","when_not":"Ne skrbi preveč — Claude Code sam pametno navigira po bazi kode in naloži le relevantne dele.","why_it_matters":"To je agentic del — Claude Code ne bere celotne kode po vrsti, ampak strateško išče odgovore znotraj nje. Fokusirana navodila = boljši rezultati.","sort_order":5},{"id":6,"section_id":1,"name":"Permission Model","icon":"ti-lock-check","badge_type":"when","badge_text":"Vedno v nadzoru","short_desc":"Pred vsako akcijo vpraša za dovoljenje — ti odločaš, koliko svobode ima","what_it_does":"Pred vsakim ukazom ali spremembo datoteke Claude Code pokaže, kaj namerava narediti, in počaka na tvoje dovoljenje. Ti si vedno zadnja instanca.","when_to_use":"Privzeto vedenje — priporočeno za začetnike in za kritične sisteme. Vedno veš, kaj se dogaja.","when_not":"Za rutinska opravila ga lahko nastaviš na bolj avtonomno delovanje — a le ko zaupate drug drugemu.","why_it_matters":"Ti si vedno v nadzoru. Claude Code je orodje, ne avtopilot. Dovoljenja so varovalo, ne ovira.","sort_order":6},{"id":7,"section_id":1,"name":"Napake so možne","icon":"ti-alert-triangle","badge_type":"caution","badge_text":"Ostani v zanki","short_desc":"Claude Code ni popoln — napačno razume namen, over-engineera rešitve","what_it_does":"Kot vsako AI orodje, Claude Code ni nezmotljiv. Napačno razume tvojo nalogo, uvede hrošče, ali predlaga preveč kompleksno rešitev.","when_to_use":"Vedno ostani v zanki — pregleduj spremembe, preverjaj rezultate, sprašuj za razlago.","when_not":" L"],"correct":2,"explanation":"Spletno iskanje uporabi, ko naleti na nekaj neznanega — npr. novejšo knjižnico ali hitro razvijajoč se API."},{"id":4,"q":"Kaj je context window?","options":["Okno za nastavitve","Claude-ova delovna memoria — koliko informacij hkrati vidi in obdeluje","Seznam vseh datotek v projektu","Terminal za ukaze"],"correct":1,"explanation":"Context window je delovna memoria — koliko informacij Claude Code hkrati vidi. Zato strateško navigira po veliki bazi kode."},{"id":5,"q":"Kaj naredi Permission Model?","options":["Avtomatsko izvede vse akcije","Pred vsako akcijo vpraša za dovoljenje","Onemogoči Claude Code","Shrani tvoja gesla"],"correct":1,"explanation":"Pred vsakim ukazom ali spremembo Claude Code pokaže, kaj namerava, in počaka na tvoje dovoljenje. Ti si zadnja instanca."},{"id":6,"q":"Ali je Claude Code nezmotljiv?","options":["Da, vedno dela brez napak","Ne — napačno razume namen, uvede hrošče ali over-engineera","Samo na velikih projektih dela napake","Samo brez interneta"],"correct":1,"explanation":"Kot vsako AI orodje ni popoln. Zato ostani v zanki in pregleduj vsako večjo spremembo."},{"id":7,"q":"Kaj pomeni, da je Claude Code 'agent'?","options":["Da te zastopa pri pogajanjih","Da deluje v zanki: odloča, izvaja, preverja in nadaljuje","Da je vohunsko orodje","Da naredi samo en ukaz naenkrat"],"correct":1,"explanation":"Agent = LLM v zanki, ki sprejema odločitve in izvaja akcije — ne samo odgovarja kot chatbot."},{"id":8,"q":"Kje vse je Claude Code dostopen?","options":["Samo v terminalu","Samo v brskalniku","Terminal, VS Code, Claude Desktop, JetBrains IDE-ji in splet","Samo na Linuxu"],"correct":2,"explanation":"Dostopen je povsod: terminal, Visual Studio Code, Claude Desktop app, JetBrains IDE-ji in splet."}]},{"id":2,"lesson":"Lekcija 2","title":"How Claude Code Works: Agentna zanka in orodja","features":[{"id":8,"section_id":2,"name":"Agentna zanka","icon":"ti-refresh","badge_type":"when","badge_text":"Jedro sistema","short_desc":"5-koračni cikel: prompt → kontekst → akcija → preveritev → konec ali ponovi","what_it_does":"Ko vneseš prompt, Claude Code zbere kontekst, ki ga potrebuje, nato izvede akcijo (uredi datoteko, zažene ukaz), preveri rezultat in odloči: ali je naloga opravljena ali je treba ponoviti zanko.","when_to_use":"Razumevanje zanke ti pomaga bolje strukturirati naloge — daljše razdeli na manjše, da imaš vmesni pregled nad rezultati.","when_not":"Ne predpostavljaj, da se vse zgodi v eni zanki. Več iteracij je normalno, ne napaka.","why_it_matters":"Zanka je razlog, zakaj Claude Code rešuje prave probleme — vsaka iteracija ga pripelje bližje tvojemu cilju.","sort_order":1},{"id":9,"section_id":2,"name":"Context Window","icon":"ti-brain","badge_type":"caution","badge_text":"Pozoren na mejo","short_desc":"Delovna memoria — koliko pogovora, kode in rezultatov Claude hkrati vidi","what_it_does":"Context window določa, koliko informacij Claude Code hkrati 'drži v glavi' — pogovor, vsebina datotek, rezultati ukazov. Ko se napolni, se aktivira compaction.","when_to_use":"Dolge seje ali velike datoteke? Začni nov pogovor ali manjšo nalogo, da ohraniš fokus in kakovost rezultatov.","when_not":"Ne dodajaj nepotrebnih datotek v kontekst — več šuma pomeni manj fokusa. Daj Claude Code samo tisto, kar res potrebuje za nalogo.","why_it_matters":"Fokusirana navodila delujejo bolje od razpotegnjenih pogovorov. Manj šuma = boljši rezultati.","sort_order":2},{"id":10,"section_id":2,"name":"Compaction","icon":"ti-arrows-minimize","badge_type":"when","badge_text":"Samodejno","short_desc":"Ko se context napolni, Claude Code sam stisne in povzame — brez tvoje intervencije","what_it_does":"Ko context window doseže mejo, Claude Code samodejno določi, kaj je mogoče odstraniti ali povzeti — in tako sprosti prostor brez izgube ključnih informacij.","when_to_use":"Compaction se aktivira samodejno — ti tega ne upravljaš. Zavedaj se ga, ko opaziš, da Claude Code 'pozablja' zgodnejše dele pogovora.","when_not":"Za kritične dolge naloge razdeli seje. Compaction je pameten, ni pa nezmotljiv — del konteksta se vedno izgubi.","why_it_matters":"Omogoča dolge delovne seje brez ročnega upravljanja. Claude Code sam skrbi za svojo delovno memorijo.","sort_order":3},{"id":11,"section_id":2,"name":"Tools","icon":"ti-tools","badge_type":"when","badge_text":"Osnova agenta","short_desc":"Orodja odločijo kdaj izvršiti kodo — branje datotek, spletno iskanje, terminal","what_it_does":"Tools so razlog, zakaj Claude Code ni le chatbot. Namesto da samo vrne besedilo, Claude Code sam odloči, kdaj prebrati datoteko, poiskati na spletu ali zagnati ukaz — in to vgradi v zanko.","when_to_use":"Bolj ko razumeš, katera orodja so na voljo (branje datotek, terminal, splet), bolje znaš oblikovati naloge.","when_not":"Orodij ne kličeš ročno — Claude Code jih izbere sam. Fokusiraj se na nalogo, ne na to, katero orodje bo uporabil.","why_it_matters":"Orodja so ločnica med chatbotom, ki svetuje, in agentom, ki dela v resničnem svetu. Vsako orodje je akcija — ne samo besedilo.","sort_order":4},{"id":12,"section_id":2,"name":"Default Mode","icon":"ti-lock","badge_type":"when","badge_text":"Priporočeno","short_desc":"Claude vpraša za dovoljenje pred vsako datoteko ali ukazom — ti vedno v nadzoru","what_it_does":"V Default Mode Claude Code pokaže vsako nameravano akcijo — urejanje datoteke, zagon ukaza — in počaka na tvoje dovoljenje. Nič se ne zgodi brez tvojega 'yes'.","when_to_use":"Vedno, kadar delaš na novem projektu, se učiš, ali delaš na kritičnih sistemih. Default Mode je tvoj varnostni pas.","when_not":"Za rutinska, dobro znana opravila na testnem okolju je morda počasen — takrat premisli o Auto-accept Mode, a z razumevanjem tveganj.","why_it_matters":"Nadzor je temelj zaupanja. Default Mode ti da čas, da razumeš, kaj Claude Code dela in zakaj. To je najhitrejši način učenja.","sort_order":5},{"id":13,"section_id":2,"name":"Auto-accept Mode","icon":"ti-bolt","badge_type":"caution","badge_text":"Pazi","short_desc":"Datoteke ureja brez vprašanja — ukazi še vedno čakajo na potrditev","what_it_does":"V Auto-accept Mode Claude Code ureja datoteke samodejno, brez vsakokratnega dovoljenja. Terminal ukazi (npm install, git push…) pa še vedno zahtevajo potrditev.","when_to_use":"Za hitrejše iteracije na testnem projektu, ko že zaupate drug drugemu in veš, kaj Claude Code počne.","when_not":"Ne na produkcijskih sistemih, ne za kodo, ki je nisi pregledal, ne za operacije, ki jih je težko razveljaviti. Hitreje ≠ varneje.","why_it_matters":"Produktivnostno orodje — a odgovornost za napake se prenese nate. Veš, kaj delaš? Potem pospešuj.","sort_order":6},{"id":14,"section_id":2,"name":"Plan Mode","icon":"ti-clipboard-list","badge_type":"when","badge_text":"Premisli najprej","short_desc":"Claude Code samo bere in planira — nobene spremembe, dokler ne rečeš 'go'","what_it_does":"V Plan Mode Claude Code uporablja samo bralna orodja — prebere kodo, datoteke, dokumentacijo — in sestavi natančen načrt, kaj bo naredil in v katerem vrstnem redu. Nobene spremembe se ne zgodijo. Ko načrt odobritev, šele takrat preide v izvedbo. Aktiviraš ga z besedo 'plan' v promptu ali s Shift+Tab v terminalu.","when_to_use":"Pred vsako večjo ali tvegano spremembo: refaktoring, nove funkcionalnosti, migracije, brisanje datotek. Plan Mode je obvezen varnostni korak za kompleksne naloge, kjer napaka pride drago.","when_not":"Za majhne, enostavne naloge je Plan Mode odvečen korak. Uporabi ga, ko negotovost narašča ali ko sprememb ne moreš zlahka razveljaviti.","why_it_matters":"Najboljše od obeh svetov: hitrost agenta + nadzor človeka. Preden Claude Code karkoli naredi, točno veš, kaj bo naredil in zakaj. Brez presenečenj, brez neprijetnih odkritij po dejstvu.","sort_order":7}],"notes":[{"id":6,"section_id":2,"note_type":"youtube","content":"6bs5b4FltCU","sort_order":-3},{"id":7,"section_id":2,"note_type":"desc","content":"Claude Code ne odgovarja — deluje v zanki. Razumevanje te zanke ti da moč, da ga bolje usmeriš: kdaj mu dati svobodo, kdaj ga ustaviti, kdaj ga vprašati za načrt.","sort_order":-2},{"id":8,"section_id":2,"note_type":"tip","content":"Med agentno zanko lahko kadarkoli dodaš kontekst, prekinješ izvajanje ali preusmeriš Claude Code — zanka ni zaklenjena.","sort_order":-1},{"id":9,"section_id":2,"note_type":"subsection-header","content":"Kateri način izbrati?","sort_order":10},{"id":10,"section_id":2,"note_type":"warning","content":"Auto-accept Mode je hitrejši — a napako je težje ujeti, preden se zgodi. Začni z Default Mode, preklopi šele ko dobro razumeš, kaj Claude Code počne.","sort_order":11}],"questions":[{"id":9,"q":"Koliko korakov ima agentna zanka?","options":["3 koraki","5 korakov","7 korakov","10 korakov"],"correct":1,"explanation":"5-koračni cikel: prompt → kontekst → akcija → preveritev → konec ali ponovi."},{"id":10,"q":"Kaj se zgodi, ko se context window napolni?","options":["Claude Code se ustavi","Aktivira se compaction — samodejno stiskanje in povzemanje","Izgubiš vse delo","Računalnik se sesuje"],"correct":1,"explanation":"Ko context doseže mejo, Claude Code samodejno določi, kaj stisniti ali povzeti, da sprosti prostor."},{"id":11,"q":"Ali compaction upravljaš ročno?","options":["Da, vedno ga sprožiš sam","Ne — aktivira se samodejno","Samo v Plan Mode","Samo s posebnim ukazom"],"correct":1,"explanation":"Compaction se aktivira samodejno, ti ga ne upravljaš. Za kritične dolge naloge pa raje razdeli seje."},{"id":12,"q":"Kaj so 'tools' v kontekstu Claude Code?","options":["Fizična orodja","Razlog, da Claude Code izvaja akcije — branje datotek, splet, terminal","Nastavitve videza","Tipkovne bližnjice"],"correct":1,"explanation":"Tools so ločnica med chatbotom in agentom — vsako orodje je akcija v resničnem svetu, ne samo besedilo."},{"id":13,"q":"Kaj naredi Default Mode?","options":["Izvede vse brez vprašanja","Vpraša za dovoljenje pred vsako datoteko ali ukazom","Onemogoči terminal","Samo bere kodo"],"correct":1,"explanation":"V Default Mode Claude Code pokaže vsako akcijo in počaka na tvoje 'yes'. Priporočeno za začetnike in kritične sisteme."},{"id":14,"q":"Česa Auto-accept Mode NE naredi samodejno?","options":["Urejanja datotek","Terminal ukazov (npm install, git push)","Branja kode","Ničesar — vse dela samodejno"],"correct":1,"explanation":"V Auto-accept Mode datoteke ureja samodejno, ampak terminal ukazi še vedno zahtevajo potrditev."},{"id":15,"q":"Kaj počne Claude Code v Plan Mode?","options":["Takoj izvede vse spremembe","Samo bere in sestavi načrt — nobene spremembe dokler ne odobriš","Izbriše nepotrebne datoteke","Se izklopi"],"correct":1,"explanation":"V Plan Mode uporablja samo bralna orodja in sestavi natančen načrt. Šele po odobritvi preide v izvedbo. Aktiviraš s Shift+Tab."},{"id":16,"q":"Kdaj je Plan Mode najbolj smiseln?","options":["Za majhne, enostavne naloge","Pred večjimi ali tveganimi spremembami: refaktoring, migracije, brisanje","Nikoli","Samo za branje dokumentacije"],"correct":1,"explanation":"Plan Mode je obvezen varnostni korak za kompleksne naloge, kjer napaka pride drago."},{"id":17,"q":"Ali je zanka zaklenjena, ko Claude Code dela?","options":["Da, ne moreš poseči vmes","Ne — kadarkoli lahko dodaš kontekst, prekineš ali preusmeriš","Samo v Default Mode lahko posežeš","Samo če ustaviš terminal"],"correct":1,"explanation":"Med agentno zanko lahko kadarkoli dodaš kontekst, prekineš izvajanje ali preusmeriš Claude Code."}]}]},{"id":2,"title":"Your first prompt","objectives":["Vedeti, da Claude Code deluje v terminalu, IDE-jih, Desktop appu in spletu — enako orodje, različna okolja","Razumeti razliko med okolji: katera zahtevajo namestitev, katera ne","Znati izbrati pravo okolje glede na lastni profil in način dela","Razumeti koncept delovnega direktorija — kaj Claude Code vidi in česa ne"],"reflections":["Katero okolje bi izbral za svoje delo? Zakaj?|Desktop je najboljša izbira za ne-developerje — zaženeš ga brez terminala, dela v ozadju, in imaš vizualni vmesnik. Web je odlična alternativa, če delaš na GitHub projektih.","Zakaj Claude Code 'ne vidi' datoteke, ki jo imaš odprto kje drugje?|Claude Code vidi samo mapo, v kateri si ga zagnal, in vse njene podmape. Datoteke zunaj tega direktorija zanjo preprosto ne obstajajo.","Katera metoda namestitve ne podpira samodejnih posodobitev?|Metoda curl — direkten prenos skripte. Za samodejne posodobitve uporabi npm ali brew (macOS).","Zakaj je pri namestitvi važno, kateri račun izbereš?|Claude Code te med namestitvijo vpraša za Pro, Team ali Enterprise. Napačna prijava pomeni napačen model, napačne limite — posebej kritično za organizacije z Enterprise računom."],"sections":[{"id":3,"lesson":"Lekcija 1","title":"Installing Claude Code","features":[{"id":15,"section_id":3,"name":"Terminal","icon":"ti-terminal-2","badge_type":"when","badge_text":"Največja kontrola","short_desc":"Namesti prek npm, brew ali curl — direkten dostop, priporočen za napredne","what_it_does":"V terminalu namestiš Claude Code z enim ukazom: npm install ali brew install za macOS. Obstaja tudi curl metoda, a ta ne podpira samodejnih posodobitev. Na Windowsu uporabiš PowerShell ali winget. Po namestitvi poženete ukaz claude in Claude Code se zažene.","when_to_use":"Ko že delaš v terminalu, ko hočeš najbolj svežo verzijo Claude Code, ali ko potrebuješ polno kontrolo nad namestitvijo in posodobitvami.","when_not":"Ni najboljša izbira za ne-developerje — zahteva Node.js in osnovno poznavanje terminala. Za začetnike je Desktop app boljša pot.","why_it_matters":"Terminal daje največjo svobodo in je vedno prvi, ki dobi nove funkcije. Če veš, kaj delaš — to je tvoje okolje.","sort_order":1},{"id":16,"section_id":3,"name":"Visual Studio Code","icon":"ti-brand-vscode","badge_type":"when","badge_text":"Za VS Code uporabnike","short_desc":"Razširitev v VS Code — Claude Code teče vzporedno z editorjem","what_it_does":"V VS Code odpreš ploščo Extensions, poiščeš 'Claude Code' in namestiš razširitev Anthropic. Po namestitvi restartiraj VS Code, odpri ukazno paleto (Ctrl+Shift+P) in poišči 'Open in New Tab'. Claude logo bo viden v stranski vrstici.","when_to_use":"Ko že delaš v VS Code in hočeš Claude Code neposredno ob svoji kodi — brez preklapljanja med okni.","when_not":"Če ne delaš v VS Code, ni razloga za to pot. Desktop ali Web sta enostavnejša.","why_it_matters":"VS Code razširitev ti da terminalno izkušnjo Claude Code znotraj editorja — Claude Code vidi tvojo kodo, ti pa vidiš Claude Code. Vse na enem mestu.","sort_order":2},{"id":17,"section_id":3,"name":"JetBrains","icon":"ti-device-laptop","badge_type":"when","badge_text":"Za JetBrains IDE-je","short_desc":"Plugin iz JetBrains Marketplace — deluje vzporedno z editorjem","what_it_does":"Namestiš Claude Code plugin iz JetBrains Marketplace, restartiraj IDE. Ob kliku na Claude logo se odpre stranski panel s terminalno izkušnjo — Claude Code dela vzporedno s tvojim editorjem.","when_to_use":"Ko delaš v JetBrains IDE-jih (IntelliJ, PyCharm, WebStorm…) in hočeš Claude Code ob svoji kodi.","when_not":"Samo za JetBrains ekosistem — za VS Code ali terminal uporabi drugo pot.","why_it_matters":"JetBrains IDE-ji so priljubljeni med profesionalnimi razvijalci. Plugin prinaša enako izkušnjo kot VS Code razširitev — Claude Code ob editorju, brez menjave orodij.","sort_order":3},{"id":18,"section_id":3,"name":"Claude Desktop","icon":"ti-device-desktop","badge_type":"when","badge_text":"Brez terminala","short_desc":"Toggle 'Code' v Desktop appu — idealno za ne-developerje","what_it_does":"Po namestitvi in prijavi v Claude Desktop app najdeš toggle 'Code' na vrhu vmesnika. Klikni ga — in Claude Code je aktiven. Omogoča delo v specifični mapi, spreminjanje dovoljenj in celo delo v oblačnem okolju.","when_to_use":"Ko hočeš Claude Code brez terminala in brez nameščanja paketov. Desktop app je najboljša vstopna točka za ne-developerje — vizualen vmesnik, dela v ozadju.","when_not":"Ni za napredne scenarije, kjer rabiš polno kontrolo nad terminalom ali nastavitvami.","why_it_matters":"Desktop odstranjuje tehnično bariero. Ne rabiš vedeti, kaj je npm ali brew — samo klikneš 'Code' in začneš. To je Claude Code za vse, ne samo za razvijalce.","sort_order":4},{"id":19,"section_id":3,"name":"Web","icon":"ti-world","badge_type":"when","badge_text":"Brez namestitve","short_desc":"claude.ai/code ali 'Code' v stranskem meniju — dela v brskalniku","what_it_does":"Na spletu dosežeš Claude Code na claude.ai/code ali s klikom na oznako 'Code' v stranskem meniju Claude.ai. Izkušnja je podobna Desktop appu — brez lokalne namestitve.","when_to_use":"Ko delaš na daljavo, na tujem računalniku, ali ko hočeš Claude Code brez kakršne koli namestitve. Še posebej dobro za delo z GitHub repozitoriji.","when_not":"Manj primerno za dolgotrajne lokalne naloge — brez dostopa do lokalnih datotek, ki niso v repozitoriju.","why_it_matters":"Web verzija pomeni, da Claude Code nimaš nič vezanega na en računalnik. Odpri brskalnik, prijavi se — in si tam, kjer si bil.","sort_order":5},{"id":20,"section_id":3,"name":"Delovni direktorij","icon":"ti-folder-open","badge_type":"when","badge_text":"Meja vidljivosti","short_desc":"Claude Code vidi samo mapo, v kateri ga zaženemo — in vse njene podmape","what_it_does":"Ko zaženete Claude Code (v terminalu, VS Code ali Desktop appu), mu daš dostop do specifičnega direktorija. Vse datoteke v tej mapi in njenih podmapah so vidne. Karkoli zunaj te meje — ne obstaja.","when_to_use":"Vedno, ko Claude Code 'ne najde' datoteke — prvi korak je preveriti, ali je datoteka znotraj delovnega direktorija.","when_not":"Ne dodajaj celotnega diska kot delovni direktorij — Claude Code deluje bolje, ko je kontekst fokusiran na en projekt.","why_it_matters":"To je eden najpomembnejših mentalnih modelov za razumevanje Claude Code. Ni vsevideč — ima mejo, in to mejo si postaviš sam z izbiro direktorija.","sort_order":6},{"id":21,"section_id":3,"name":"Prijava & plan","icon":"ti-user-check","badge_type":"when","badge_text":"Pro, Team ali Enterprise","short_desc":"Med namestitvijo izbereš račun — napačna izbira pomeni napačne nastavitve","what_it_does":"Med prvim zagonom Claude Code te vodi skozi začetne korake: barvna tema, prijava z računom. Izbiraš med Claude Pro, Team, Enterprise računom ali API ključem. Vsaka možnost prinaša drugačen model, drugačne limite in drugačne nastavitve.","when_to_use":"Vsakič, ko namestiš Claude Code — ta korak je obvezen. Za organizacije z Enterprise računom je izbira 'Enterprise' kritična, da dobiš prave nastavitve in varnostne politike.","when_not":"Ne preskoči tega koraka na hitro — napačna prijava pomeni napačen plan in morebitne varnostne težave v poslovnem okolju.","why_it_matters":"Za posameznike je to preprosta odločitev. Za organizacije je ta korak varnostna in upravljavska odločitev — kdo ima dostop, kateri model se uporablja, kateri podatki so zaščiteni.","sort_order":7},{"id":22,"section_id":3,"name":"Kateri izbrati?","icon":"ti-help-circle","badge_type":"rare","badge_text":"Odločitveni vodič","short_desc":"Terminal = kontrola, Desktop = preprostost, Web = mobilnost, IDE = integracija","what_it_does":"Vsako okolje ima svoj profil: Terminal je za napredne, ki hočejo svežo verzijo in polno kontrolo. Desktop je za ne-developerje in tiste, ki hočejo Claude Code delati v ozadju. Web je za mobilne scenarije in GitHub projekte. VS Code in JetBrains sta za razvijalce, ki hočejo vse na enem mestu.","when_to_use":"Ko si prvič pred izbiro — ta kartica ti da okvir za odločitev. Kasneje jo ne rabiš več.","when_not":"Ni nujno, da izbereš samo eno. Mnogi uporabljajo Desktop doma in Web na delu.","why_it_matters":"Ni napačne izbire — je pa prava izbira za tvoj profil. Non-developer → Desktop. Remote worker → Web. Developer → Terminal ali IDE.","sort_order":8}],"notes":[{"id":11,"section_id":3,"note_type":"youtube","content":"0kILa02vKuI","sort_order":-3},{"id":12,"section_id":3,"note_type":"desc","content":"Claude Code je preprosto namestiti — ne glede na to, ali raje delaš v terminalu, v IDE-ju, v Desktop appu ali kar v brskalniku. Enako orodje, pet različnih vrat.","sort_order":-2},{"id":13,"section_id":3,"note_type":"tip","content":"Vsa okolja poganjajo isti Claude Code — razlika je samo v tem, kako komuniciraš z njim. Izberi tisto, ki ti leži.","sort_order":-1},{"id":14,"section_id":3,"note_type":"subsection-header","content":"Kateri izbrati?","sort_order":10},{"id":15,"section_id":3,"note_type":"tip","content":"Desktop je najprimernejša izbira za ne-developerje: ni terminala, ni nameščanja paketov, dela v ozadju. Web je idealen, če delaš na GitHub projektih iz katere koli naprave.","sort_order":11}],"questions":[{"id":18,"q":"Katera metoda namestitve v terminalu NE podpira samodejnih posodobitev?","options":["npm install","brew install","curl metoda","winget"],"correct":2,"explanation":"Curl metoda je direkten prenos skripte — posodobitve moraš narediti ročno. npm in brew to uredita samodejno."},{"id":19,"q":"Kje v VS Code najdeš Claude Code razširitev?","options":["V meniju File","V plošči Extensions","V ukazni paleti","V nastavitvah"],"correct":1,"explanation":"Odpreš ploščo Extensions, poiščeš 'Claude Code' in namestiš razširitev Anthropic."},{"id":20,"q":"Kaj moraš narediti po namestitvi Claude Code razširitve v VS Code?","options":["Nič — takoj deluje","Restartati VS Code","Namestiti Node.js","Ustvariti nov projekt"],"correct":1,"explanation":"Po namestitvi rabiš restartati VS Code, nato odpreti ukazno paleto in poiskati 'Open in New Tab'."},{"id":21,"q":"Kako aktiviraš Claude Code v Claude Desktop appu?","options":["Z ukazom v terminalu","S klikom na toggle 'Code' na vrhu vmesnika","Z namestitvijo razširitve","Z odprtjem novega okna"],"correct":1,"explanation":"V Desktop appu je toggle 'Code' na vrhu — klikni ga in Claude Code je aktiven. Brez terminala."},{"id":22,"q":"Kateri URL uporabiš za Claude Code na spletu?","options":["claude.ai/agent","claude.ai/code","code.anthropic.com","claude.ai/terminal"],"correct":1,"explanation":"Spletna verzija je dostopna na claude.ai/code ali s klikom na 'Code' v stranskem meniju Claude.ai."},{"id":23,"q":"Katero okolje je priporočeno za ne-developerje brez izkušenj s terminalom?","options":["Terminal z npm","JetBrains plugin","Claude Desktop app","VS Code razširitev"],"correct":2,"explanation":"Desktop app ne zahteva terminala ali nameščanja paketov — samo klikneš 'Code' in začneš."},{"id":24,"q":"Katero okolje je najboljše za delo z GitHub repozitoriji na daljavo?","options":["Terminal","VS Code","Claude Desktop","Web (claude.ai/code)"],"correct":3,"explanation":"Web verzija je idealna za GitHub projekte in oddaljeno delo — brez lokalne namestitve."},{"id":25,"q":"Kaj vidi Claude Code, ko ga zaženemo v določenem direktoriju?","options":["Vse datoteke na računalniku","Samo datoteko, ki jo odpremo","Samo mapo in vse njene podmape","Samo datoteke, ki jih eksplicitno pošljemo"],"correct":2,"explanation":"Claude Code vidi samo izbrani direktorij in vse podmape. Karkoli zunaj te meje zanj ne obstaja."},{"id":26,"q":"Zakaj je izbira direktorija pri zagonu Claude Code pomembna?","options":["Samo iz estetičnih razlogov","Ker Claude Code vidi samo ta direktorij — to je njegova meja vidljivosti","Ker vpliva na hitrost","Ker določa barvno temo"],"correct":1,"explanation":"Direktorij = meja vidljivosti. Datoteke zunaj njega Claude Code ne more brati ali urejati."},{"id":27,"q":"Katere možnosti prijave ponudi Claude Code med namestitvijo?","options":["Samo Google račun","Claude Pro, Team, Enterprise ali API ključ","Samo API ključ","Facebook ali Apple račun"],"correct":1,"explanation":"Med prvim zagonom izbiraš med Pro, Team, Enterprise računom ali API ključem — vsaka možnost prinaša drugačne nastavitve."},{"id":28,"q":"Zakaj je za organizacije kritično izbrati Enterprise račun med namestitvijo?","options":["Ker je cenejši","Ker prinaša prave varnostne politike in nastavitve za organizacijo","Ker ima boljši UI","Ker je edini, ki deluje v VS Code"],"correct":1,"explanation":"Napačna prijava pomeni napačen model in napačne varnostne nastavitve — za organizacije je to resna težava."},{"id":29,"q":"Kateri dve okolji ne zahtevata ločene namestitve Claude Code?","options":["Terminal in VS Code","Desktop in JetBrains","Web in Claude Desktop","VS Code in Web"],"correct":2,"explanation":"Web deluje v brskalniku brez namestitve. Desktop app vključuje Claude Code brez ločene namestitve — samo namestiš Claude Desktop in aktiviraš toggle."},{"id":30,"q":"Kje najdeš Claude Code plugin za JetBrains IDE-je?","options":["V VS Code Extensions","V JetBrains Marketplace","Na claude.ai","V GitHub repozitoriju"],"correct":1,"explanation":"JetBrains plugin namestiš iz JetBrains Marketplace — enako kot ostale JetBrains plugine."},{"id":31,"q":"Katero okolje je priporočeno, če hočeš vedno najnovejšo verzijo Claude Code?","options":["Web","Claude Desktop","Terminal","JetBrains"],"correct":2,"explanation":"Terminal je 'cutting edge' — prvi dobi nove funkcije in omogoča polno kontrolo nad verzijo."},{"id":32,"q":"Ali moraš izbrati samo eno okolje za delo s Claude Code?","options":["Da, izbira je dokončna","Ne — mnogi kombinirajo npr. Desktop doma in Web na delu","Da, ker vsako okolje shranjuje drugačne nastavitve","Ne, ampak zamenjava briše zgodovino"],"correct":1,"explanation":"Ni nujno, da se odločiš samo za eno. Mnogi kombinirajo okolja glede na situacijo — Desktop za lokalno delo, Web za GitHub projekte ali oddaljeni dostop."}]},{"id":4,"lesson":"Lekcija 2","title":"Your first prompt: Načini dela in pisanje promptov","features":[{"id":23,"section_id":4,"name":"Pisanje promptov","icon":"ti-message-2","badge_type":"when","badge_text":"Osnova dela","short_desc":"Govori Claude Code-u opisno in jasno — kakovost prompta določa kakovost rezultata","what_it_does":"Vnosi prompte v naravnem jeziku — ni posebne sintakse. Povej cilj, kontekst in omejitve. Claude Code razume namere, podobno kot bi govoril z izkušenim razvijalcem.","when_to_use":"Vsakič. Bolj ko si opisen o cilju in kontekstu, boljši rezultat. Povej, kaj hočeš doseči — ne samo kaj narediti.","when_not":"Izogibaj se prekratkim ukazom za kompleksne naloge. 'Popravi bug' brez konteksta ne bo dalo dobrega rezultata.","why_it_matters":"Prompt je tvoje edino orodje za komunikacijo z agentom. Boljše vprašanje = boljša rešitev.","sort_order":1},{"id":24,"section_id":4,"name":"Approval Mode","icon":"ti-hand-stop","badge_type":"when","badge_text":"Varno","short_desc":"Claude vpraša za dovoljenje pred vsako spremembo datoteke ali ukazom","what_it_does":"Privzeti način. Pred vsako akcijo Claude Code pokaže, kaj namerava narediti, in počaka na potrditev. Polni nadzor nad vsako spremembo.","when_to_use":"Kadar delaš na novem projektu, ko se učiš, ali ko delaš spremembe, ki jih ni enostavno razveljaviti.","when_not":"Za rutinska opravila na testnem okolju je morda počasen — takrat razmisli o Auto-accept Mode.","why_it_matters":"Preden karkoli spremenijo v tvojem sistemu, ti to pokažejo. Idealno za učenje in kritično okolje.","sort_order":2},{"id":25,"section_id":4,"name":"Auto-accept Mode","icon":"ti-bolt","badge_type":"caution","badge_text":"Hitro","short_desc":"Spremembe datotek se sprejmejo samodejno — ukazi še vedno čakajo na potrditev","what_it_does":"Claude Code ureja datoteke brez vsakokratnega dovoljenja. Terminal ukazi (npm, git…) pa še vedno zahtevajo potrditev.","when_to_use":"Za hitrejše iteracije na testnem projektu, ko zaupate drug drugemu in dobro razumeš, kaj Claude Code počne.","when_not":"Ne na produkcijskem sistemu. Ne za kodo, ki je nisi pregledal. Napako je težje ujeti, ko se zgodi samodejno.","why_it_matters":"Produktivnostno orodje — a odgovornost za napake je tvoja. Hitreje ≠ varneje.","sort_order":3},{"id":26,"section_id":4,"name":"SHIFT+TAB meni","icon":"ti-keyboard","badge_type":"when","badge_text":"Bližnjica","short_desc":"Tipki SHIFT+TAB v terminalu ciklata med Approval, Auto-accept in Plan Mode","what_it_does":"Med delom pritisni SHIFT+TAB, da ciklaš med načini: Default (Approval) → Auto-accept → Plan Mode → nazaj na Default. Hitro dostopen brez nastavitev.","when_to_use":"Kadar med sejo želiš spremeniti način dela brez ponovnega zagona ali nastavitev.","when_not":"V IDE razširitvi (VS Code, JetBrains) je dostop do načinov v meniju IDE-ja — tam SHIFT+TAB ne deluje enako.","why_it_matters":"En pritisk tipke, tri različna vedenja. Fleksibilnost brez konfiguracije — takoj na voljo med delom.","sort_order":4},{"id":27,"section_id":4,"name":"Plan Mode","icon":"ti-clipboard-list","badge_type":"when","badge_text":"Premisli najprej","short_desc":"Prek SHIFT+TAB do Plan Mode — Claude bere in planira, nobenih sprememb dokler ne odobriš","what_it_does":"Plan Mode aktiviraš s SHIFT+TAB (ali z besedo 'plan' v promptu). Claude Code prebere kodo, postavi vprašanja in predlaga natančen načrt. Nobene spremembe se ne zgodijo, dokler ne odobriš.","when_to_use":"Pred kompleksnimi implementacijami: nova funkcionalnost čez več datotek, refaktoring, migracije. Primer: 'dark mode čez celotno aplikacijo'.","when_not":"Za enostavne, enodatotečne spremembe Plan Mode doda nepotrebne korake — za to je Default Mode hitrejši.","why_it_matters":"Vidiš točno, kaj bo Claude Code naredil — preden to naredi. Nobenih presenečenj, nobenih nepopravljivih napak.","sort_order":5}],"notes":[{"id":16,"section_id":4,"note_type":"desc","content":"Vse začne se s promptom. Claude Code razume naravni jezik — ni ukaza, ki bi ga moral zapomniti. Ključno je razumeti, kateri način dela izbrati za vsako situacijo.","sort_order":-2},{"id":17,"section_id":4,"note_type":"tip","content":"SHIFT+TAB v terminalu cikla med načini: Approval → Auto-accept → Plan Mode. Ni potrebno restartati — preklopiš med delom.","sort_order":-1},{"id":18,"section_id":4,"note_type":"warning","content":"Auto-accept Mode je hitrejši — a napako je težje ujeti, preden se zgodi. Začni z Approval Mode, preklopi šele ko dobro razumeš, kaj Claude Code počne.","sort_order":10},{"id":19,"section_id":4,"note_type":"youtube","content":"gbetp6D7J_Q","sort_order":-3},{"id":20,"section_id":4,"note_type":"subsection-header","content":"Primer v praksi: Plan Mode","sort_order":8},{"id":21,"section_id":4,"note_type":"desc","content":"Recimo, da tvoja aplikacija potrebuje dark mode po celotni kodi. Odpri korenski direktorij projekta in zaženi <code>claude</code>. Pritisni <strong>Shift+Tab</strong> dvakrat, da preklopliš v Plan Mode — Claude bo prebral kodo in sestavil natančen načrt. Vpiši: <em>\"My app needs a dark mode implemented across the entire app.\"</em> Claude ne bo nič spremenil — samo načrtoval. Ko načrt odobriš, preide v izvedbo in te sproti vpraša za dovoljenje pri vsakem koraku. Na koncu točno vidiš, kaj je naredil in zakaj.","sort_order":9}],"questions":[{"id":33,"q":"Kako aktiviraš Plan Mode v terminalu?","options":["Z nastavitvami Claude Code","S tipkama SHIFT+TAB (cikel do Plan Mode)","Z ukazom /plan v promptu","Z restartem terminala"],"correct":1,"explanation":"SHIFT+TAB cikla med načini: Approval → Auto-accept → Plan Mode. Aktiviraš ga z večkratnim pritiskom."},{"id":34,"q":"Kaj naredi Auto-accept Mode?","options":["Izvede vse brez kakršnega koli vprašanja","Samodejno sprejme spremembe datotek, ukazi pa še zahtevajo potrditev","Onemogoči Claude Code","Samo bere kodo brez sprememb"],"correct":1,"explanation":"V Auto-accept Mode se datoteke uredijo samodejno, ampak terminalni ukazi (npm, git…) še vedno zahtevajo potrditev."},{"id":35,"q":"Kateri način dela je privzeti (default)?","options":["Auto-accept Mode","Plan Mode","Approval Mode","Read-only Mode"],"correct":2,"explanation":"Privzeti način je Approval Mode — Claude Code vpraša za dovoljenje pred vsako spremembo ali ukazom."},{"id":36,"q":"Kaj se zgodi v Plan Mode?","options":["Claude Code takoj izvede vse spremembe","Claude Code bere kodo in predlaga načrt — nobenih sprememb, dokler ne odobriš","Claude Code se izklopi","Samo terminalni ukazi se izvajajo"],"correct":1,"explanation":"Plan Mode je bralno-analitičen — nobene spremembe se ne zgodijo. Šele po odobritvi načrta preide v izvedbo."},{"id":37,"q":"Kako napišeš učinkovit prompt za Claude Code?","options":["Čim krajši, da ne zapravljaš tokenov","Opisno — povej cilj, kontekst in omejitve","Samo z ukazi, brez razlag","Vedno v angleščini"],"correct":1,"explanation":"Kakovost prompta določa kakovost rezultata. Bolj ko si opisen o cilju in kontekstu, boljšo rešitev boš dobil."},{"id":38,"q":"Kaj naredi SHIFT+TAB med delom v terminalu?","options":["Prekine Claude Code","Shrani pogovor","Cikla med načini: Approval → Auto-accept → Plan Mode","Odpre nastavitve"],"correct":2,"explanation":"SHIFT+TAB je hitri dostop do menjave načinov — brez ponovnega zagona ali nastavitev."},{"id":39,"q":"Ali Auto-accept Mode zahteva potrditev za terminalne ukaze?","options":["Ne — vse sprejme samodejno","Da — datoteke so samodejne, ukazi pa še vedno zahtevajo potrditev","Samo za git ukaze","Samo za npm ukaze"],"correct":1,"explanation":"Auto-accept Mode ne pomeni vse samodejno. Datoteke se uredijo brez vprašanja, a terminalni ukazi ostanejo zaklenjeni za potrditev."},{"id":40,"q":"Za kakšno nalogo je Plan Mode posebej primeren?","options":["Za popravek tipkarske napake","Za branje dokumentacije","Za kompleksne spremembe čez več datotek, npr. dark mode čez celotno aplikacijo","Za namestitev paketa"],"correct":2,"explanation":"Plan Mode zasije pri večjih implementacijah — vidite natančno, kaj bo Claude Code naredil, preden to naredi. Idealno za multi-file spremembe."}]}]},{"id":3,"title":"Daily workflows","objectives":["Razumeti 4-fazni Explore → Plan → Code → Commit workflow kot osnovo vsakodnevnega dela","Vedeti, kdaj in kako uporabiti Plan Mode za varno načrtovanje pred izvedbo","Znati definirati success criteria in test suite za boljše rezultate","Razumeti vlogo subagent code reviewerja pred commitom"],"reflections":["Zakaj je Explore faza pomembna, preden Claude sploh začne pisati kodo?|Explore faza je brezplačna informacija. Claude zbere kontekst — datoteke, splet, strukturo projekta — preden karkoli naredi. Brez tega skače v kodo na slepo.","Kdaj bi prekinil Code fazo in prosil Claude za popravek načrta?|Ko Claude naleti na nepričakovano oviro ali predlaga rešitev, ki se ti zdi napačna. Plan Mode je vedno na voljo — prekini, pojdi nazaj v načrtovanje.","Kaj bi shranil v CLAUDE.md, da Claude ne ponavlja istih napak?|Specifične rešitve za ponavljajoče se probleme v projektu — npr. kateri ukazi ne delujejo, katere konvencije upoštevati, kateri deli kode so občutljivi."],"sections":[{"id":5,"lesson":"Lekcija 1","title":"Explore → Plan → Code → Commit: Workflow za vsakodnevno delo","features":[{"id":28,"section_id":5,"name":"Explore","icon":"ti-search","badge_type":"when","badge_text":"Osnova","short_desc":"Plan Mode bere datoteke in splet — razume projekt, preden karkoli naredi","what_it_does":"V Explore fazi Claude v Plan Mode prebere relevantne datoteke, požene spletna iskanja in zbere vse, kar potrebuje za razumevanje projekta. Nič se ne spremeni — samo zbira kontekst.","when_to_use":"Vedno na začetku vsake večje naloge — Explore faza je brezplačna informacija, ki prepreči napake pozneje.","when_not":"Ne preskoči Explore faze pri kompleksnih nalogah. Hitrost brez konteksta pomeni napake, ki jih je drago popraviti.","why_it_matters":"Claude Code je toliko boljši, kolikor bolje razume projekt. Explore mu da ta kontekst — brez vsakega tveganja.","sort_order":1},{"id":29,"section_id":5,"name":"Plan","icon":"ti-clipboard-list","badge_type":"when","badge_text":"Preveri najprej","short_desc":"Claude sestavi natančen načrt — ti ga pregledaš in odobriš preden karkoli naredi","what_it_does":"Po Explore fazi Claude sestavi načrt: kaj bo naredil, v katerem vrstnem redu, katere datoteke bo spremenil. Ti pregledaš in se odločiš: odobriš, popraviš ali prosiš za revizijo.","when_to_use":"To je najboljši trenutek za course-correct — preden je karkoli napisano. Če načrt ne ustreza, povej zdaj.","when_not":"Ne odobri načrta na hitro, če česa ne razumeš. Vprašaj Claude za razlago posameznih korakov — to je brezplačno.","why_it_matters":"Plan faza je varnostna mreža. Napaka v načrtu je brezplačna — napaka v kodi stane čas.","sort_order":2},{"id":30,"section_id":5,"name":"Code","icon":"ti-code","badge_type":"when","badge_text":"Izvedi","short_desc":"Claude dela po načrtu — Approval ali Auto-accept, ti vidiš vsak korak","what_it_does":"Ko odobriš načrt, Claude preide v izvedbo. Izbiraš: Approval Mode vpraša za vsako datoteko, Auto-accept ureja samodejno. Claude bo troubleshootал ovire in te sproti obveščal o odločitvah.","when_to_use":"Ko si zadovoljen z načrtom. Ostani v zanki — Claude bo postavljal vprašanja in potreboval tvoje odločitve.","when_not":"Ne izklopi pozornosti v Code fazi. Claude bo včasih naletel na nepričakovane ovire in potreboval tvojo usmeritev.","why_it_matters":"Code faza je kjer se načrt sreča z realnostjo. Tvoja prisotnost zagotavlja, da Claude ne zavije s poti.","sort_order":3},{"id":31,"section_id":5,"name":"Commit","icon":"ti-git-commit","badge_type":"when","badge_text":"Zaključi","short_desc":"Subagent pregleda kodo, Claude napiše commit message — in začneš znova","what_it_does":"Ko si zadovoljen z rezultati, poženi subagent code reviewer — svež par oči brez pristranskosti glavne seje. Nato Claude napiše commit message v tvojem stilu. Ponovi cikel.","when_to_use":"Pred vsakim commitom — subagent reviewer ujame, kar glavna seja spregleda, ker nosi kontekst celotnega pogovora.","when_not":"Ne preskoči code review koraka pri večjih spremembah. Subagent je hiter varnostni korak z velikim učinkom.","why_it_matters":"Commit je zaključek zanke. Subagent reviewer zagotavlja svež pogled — brez pristranskosti, ki jo prinese dolga delovna seja.","sort_order":4},{"id":32,"section_id":5,"name":"Success criteria","icon":"ti-target","badge_type":"caution","badge_text":"Definiraj najprej","short_desc":"Povej Claude, kako izgleda 'pravilno' — brez tega sam ugiba","what_it_does":"Preden Claude začne, mu povej, kako bo vedel, da je naloga opravljena. Konkretni kriteriji: 'aplikacija se naloži brez napak', 'vsi testi zeleni', 'dark mode deluje na vseh straneh'.","when_to_use":"Vedno, pri vsaki večji nalogi. Success criteria so del prompta — ne ločen korak.","when_not":"Ne prepusti Claudu, da sam definira 'finished'. Brez kriterijev bo naredil, kar se mu zdi smiselno — ne nujno, kar si ti hotel.","why_it_matters":"Claude je samozavesten izvajalec. Brez jasnih kriterijev bo 'finished' razlagal po svoje — in to je pogost vir razočaranj.","sort_order":5},{"id":33,"section_id":5,"name":"Test suite","icon":"ti-test-pipe","badge_type":"when","badge_text":"Priporočeno","short_desc":"Daj Claude teste — sam bo preverjal rezultate brez tvojega vmešavanja","what_it_does":"Če projekt ima teste, jih daj Claudu kot del naloge. Claude bo sam zaganjal teste po vsaki spremembi in preverjal, ali je na pravi poti — brez da bi mu moral ti vsakič reči.","when_to_use":"Kadar koli imaš test suite — to je ena najmočnejših stvari, ki jih Claude Code zna narediti samodejno.","when_not":"Pred oddajo testov preveri, da niso 'lažno zeleni'. Claude jih bo resno jemal, tudi napačne.","why_it_matters":"Testi so Claudov GPS. Z njimi ve točno, kdaj je dosegel cilj — brez ugibanja in brez tvojega vmešavanja pri vsakem koraku.","sort_order":6},{"id":34,"section_id":5,"name":"CLAUDE.md","icon":"ti-file-text","badge_type":"rare","badge_text":"Redko","short_desc":"Shrani rešitve ponavljajočih se težav — Claude jih bo bral vsako sejo","what_it_does":"CLAUDE.md je datoteka v korenu projekta, ki jo Claude Code prebere ob vsakem zagonu. Vanjo shraniš rešitve za probleme, ki se ponavljajo — da Claude ne ponavlja istih napak v prihodnjih sejah.","when_to_use":"Ko opaziš, da Claude v vsaki seji naleti na isti problem. Shrani rešitev enkrat, Claude jo bo upošteval vedno.","when_not":"Ne napiši vsega v CLAUDE.md — samo kar je res specifično za projekt. Preveč informacij pomeni preveč šuma.","why_it_matters":"CLAUDE.md je dolgoročni spomin projekta. Brez njega vsaka seja začne od začetka — z njim Claude ve, kaj je že naučen.","sort_order":7}],"notes":[{"id":22,"section_id":5,"note_type":"youtube","content":"xJQuF02NAK8","sort_order":-3},{"id":23,"section_id":5,"note_type":"desc","content":"Explore → Plan → Code → Commit je najpomembnejši workflow v Claude Code. Brez tega večina začetnikov skači naravnost v Code fazo — in porablja čas za popravljanje namesto ustvarjanja.","sort_order":-2},{"id":24,"section_id":5,"note_type":"tip","content":"Vstopi v Plan Mode s Shift+Tab v terminalu — pritiskaj dokler ne vidiš 'Plan Mode' pod vnosnim poljem. V Plan Mode Claude bere in načrtuje, ne izvaja.","sort_order":-1},{"id":25,"section_id":5,"note_type":"subsection-header","content":"Nasveti za Code fazo","sort_order":8},{"id":26,"section_id":5,"note_type":"tip","content":"Definiraj success criteria v promptu — 'naloga je opravljena, ko vsi testi zeleni in aplikacija se naloži brez napak'. Claude bo to upošteval pri vsaki odločitvi.","sort_order":9}],"questions":[{"id":41,"q":"Kateri je prvi korak v Explore → Plan → Code → Commit workflowu?","options":["Takoj začni pisati kodo","Explore — Plan Mode prebere datoteke in splet","Odpri CLAUDE.md","Poženi teste"],"correct":1,"explanation":"Explore faza je prva — Claude v Plan Mode zbere kontekst (datoteke, splet, struktura projekta), preden karkoli naredi."},{"id":42,"q":"Zakaj je Plan faza najboljši trenutek za course-correct?","options":["Ker je Claude takrat najhitrejši","Ker še ni bila napisana nobena koda — napaka v načrtu je brezplačna","Ker je Plan Mode cenejši","Ker Claude takrat ne more narediti napak"],"correct":1,"explanation":"Plan faza je pred izvedbo — napaka v načrtu ne stane nič, napaka v kodi stane čas."},{"id":43,"q":"Kaj naredi subagent code reviewer pred commitom?","options":["Samodejno commita kodo","Pregleda kodo brez pristranskosti glavne seje — svež par oči","Izbriše nepotrebne datoteke","Napiše dokumentacijo"],"correct":1,"explanation":"Subagent nima konteksta dolge seje — zato ujame, kar glavna seja spregleda zaradi pristranskosti."},{"id":44,"q":"Zakaj je pomembno definirati success criteria pred začetkom?","options":["Samo iz organizacijskih razlogov","Brez kriterijev Claude sam definira 'finished' — ne nujno kot ti hočeš","Da Claude dela hitreje","Ker je to zahteva Anthropic"],"correct":1,"explanation":"Claude je samozavesten izvajalec. Brez jasnih kriterijev bo 'finished' razlagal po svoje — in to je pogost vir razočaranj."},{"id":45,"q":"Kaj je CLAUDE.md?","options":["Anthropic dokumentacija","Datoteka v projektu, ki jo Claude bere ob vsakem zagonu — dolgoročni spomin projekta","Shramba za API ključe","Nastavitve za VS Code"],"correct":1,"explanation":"CLAUDE.md je projektni spomin — shrani rešitve za ponavljajoče se težave, da Claude ne začne od začetka vsako sejo."},{"id":46,"q":"Kako aktiviraš Plan Mode v terminalu?","options":["Z ukazom 'plan'","S Shift+Tab dokler ne vidiš 'Plan Mode' pod vnosnim poljem","Z ukazom '/plan'","Samodejno se aktivira ob zagonu"],"correct":1,"explanation":"Shift+Tab cikla med Approval, Auto-accept in Plan Mode. Pritiskaj dokler ne vidiš 'Plan Mode' pod vnosnim poljem."},{"id":47,"q":"Zakaj je priporočljivo dati Claudu test suite med Code fazo?","options":["Ker je to obvezno","Claude bo sam zaganjal teste in vedel, kdaj je na pravi poti — brez tvojega vmešavanja","Da je koda lepša","Ker Claude ne zna pisati testov"],"correct":1,"explanation":"Testi so Claudov GPS — sam preveri po vsaki spremembi, ali je dosegel cilj, brez da bi mu moral ti vsakič reči."},{"id":48,"q":"V kateri fazi workflowa je 'course-correct' najcenejši?","options":["Code — ko je koda že napisana","Commit — na koncu","Plan — preden je karkoli izvedeno","Explore — na samem začetku"],"correct":2,"explanation":"Plan faza je pred izvedbo — napaka v načrtu ne stane nič. Ko je koda enkrat napisana, je popravek dražji."}]},{"id":6,"lesson":"Lekcija 2","title":"Context Management: Upravljanje kontekstnega okna","features":[{"id":35,"section_id":6,"name":"Kontekstno okno","icon":"ti-brain","badge_type":"when","badge_text":"Delovna memoria","short_desc":"Vsak prompt, prebrana datoteka, ukaz in rezultat zasede prostor v kontekstnem oknu","what_it_does":"Context window je Claude-ova delovna memoria — vsak tvoj prompt, vsaka prebrana datoteka, vsak zagnani ukaz in vsak rezultat orodja zasede del tega prostora. Ko se prostor napolni, postane upravljanje kljucno.","when_to_use":"Razumevanje context window ti pomaga pisati boljse prompte in izbrati pravi ukaz za upravljanje seje (/compact ali /clear).","when_not":"Ne misli, da ti ni treba skrbeti za kontekst samo zato, ker ima Claude Code samodejni compaction — ta resi krizo, ne prepreci suma.","why_it_matters":"Omejen prostor pomeni, da vsak nepotrebni korak stane. Boljse razumevanje = manj zapravljenega prostora = boljsi rezultati v dolgi seji.","sort_order":1},{"id":36,"section_id":6,"name":"Samodejni compaction","icon":"ti-arrows-minimize","badge_type":"when","badge_text":"Samodejno","short_desc":"Ko se okno napolni, Claude sam stisne pogovor in odstrani nepotrebne rezultate","what_it_does":"Ko se kontekstno okno napolni, Claude samodejno stisne pogovor: povzame prejsnje dele in odstrani nepotrebne rezultate orodij, da sprosti prostor za nadaljevanje dela.","when_to_use":"Zavedaj se ga, ko opaziš, da Claude pozablja zgodnejse podrobnosti iz seje — to je znak, da se je compaction ze zgodil.","when_not":"Samodejni compaction je varnostna mreza, ne strategija. Za dolge seje ga ne cakaj — uporabljaj /compact proaktivno.","why_it_matters":"Omogoca delo brez prekinitve, a del konteksta se ob tem vedno izgubi. Proaktivno upravljanje je boljse od reaktivnega resevanja.","sort_order":2},{"id":37,"section_id":6,"name":"/compact","icon":"ti-player-skip-forward","badge_type":"when","badge_text":"Med sejo","short_desc":"Rocno sprozi kompakcijo — stisne pretekli pogovor, nadaljujes z manj suma","what_it_does":"Ukaz /compact rocno stisne vse, kar je v kontekstu do tega trenutka. Claude ohrani spomin na to, kaj ste delali, a odstrani podrobnosti in rezultate, ki jih ne potrebuje vec.","when_to_use":"Ko delaš na isti funkcionalnosti in se blizaš kontekstnemu limitu, a hoces nadaljevati brez izgube niti. Sprozi /compact preden se okno napolni samodejno.","when_not":"Ne za prehod na novo, nepovezano nalogo — tam je /clear boljsa izbira.","why_it_matters":"Daje ti nadzor nad tem, kdaj in kako se kontekst sprosti — boljse od cakanja na samodejni compaction, ki se zgodi v nepravem trenutku.","sort_order":3},{"id":38,"section_id":6,"name":"/clear","icon":"ti-refresh","badge_type":"caution","badge_text":"Brez spomina","short_desc":"Popolna ponastavitev — izbrise celoten kontekst, Claude zacne popolnoma sveze","what_it_does":"Ukaz /clear odstrani celoten kontekst — pogovor, prebrane datoteke, rezultate orodij. Claude nima nobenega spomina na prejsnjo sejo in zacne kot pri prvem zagonu.","when_to_use":"Ko prehajate na novo, nepovezano nalogo. Prejsnji pogovor bi samo vnasˇal pristranskost v novo smer.","when_not":"Ne, ce bos v novi seji potreboval karkoli iz te. Vse, kar hoces obdrzati, shrani v CLAUDE.md preden pozenete /clear.","why_it_matters":"Cist zacetek je vcase edina prava odlocitev — a je nepovratna. /clear je orodje za premisleno uporabo, ne za hitro resevanje zapolnjenega okna.","sort_order":4},{"id":39,"section_id":6,"name":"/context","icon":"ti-chart-bar","badge_type":"when","badge_text":"Diagnostika","short_desc":"Vizualni pregled porabe kontekstnega prostora — katere kategorije jedo najvec","what_it_does":"Ukaz /context prikazˇe pregled stanja kontekstnega okna: koliko prostora je zasedenega, katere kategorije (pogovor, datoteke, rezultati orodij) porabijo najvec, in vizualni grafikon porabe.","when_to_use":"Ko cutiš, da seje postajajo pocasnejse ali manj fokusirane — preveri najprej s /context, preden se odlociš za /compact ali /clear.","when_not":"Ni nujno po vsaki seji — uporabi ga diagnosticno, ko imas sum, da kontekst postaja problem.","why_it_matters":"Ne moreš upravljati tega, cesar ne vidiš. /context ti da podatke za informirano odlocitev — brez ugibanja.","sort_order":5},{"id":40,"section_id":6,"name":"Specificni prompti","icon":"ti-message-2","badge_type":"when","badge_text":"Varčevanje","short_desc":"Natancen prompt stane manj konteksta kot splosˇen — Claude manj isce, bolj dela","what_it_does":"Splosˇen prompt prisili Claude, da sam razisce kodo, naredi vec iskanj in opravi vec sklepanja — kar zasede bistveno vec prostora kot natancen prompt z jasnimi navodili.","when_to_use":"Vedno. Vec konteksta, ki ga das sam (cilj, omejitve, relevantne datoteke), manj prostora porabi Claude za samodejno iskanje.","when_not":"Ne pretiravaj s tem, da vnaprej prilepis ogromne datoteke — cilj je fokus, ne obseg.","why_it_matters":"Paradoks konteksta: krajsi, splosˇen prompt stane vec prostora v zanki, kot daljsi, natancen prompt. Specificnost je nalozba, ki se povrne.","sort_order":6},{"id":41,"section_id":6,"name":"MCP strežniki","icon":"ti-plug","badge_type":"caution","badge_text":"Upravljaj","short_desc":"Claude naloži orodja vseh aktivnih MCP strežnikov v kontekst — ugasni neuporabljene","what_it_does":"Claude naloži seznam vseh orodij vsakega aktivnega MCP strežnika v kontekstno okno samodejno — tudi tistih, ki jih za trenutni projekt sploh ne uporabljas.","when_to_use":"Ugasni MCP strežnike, ki niso relevantni za projekt. Skills so alternativa, ki deluje podobno kot MCP, a ne zasede prostora v kontekstu vnaprej.","when_not":"Ne ugasni strežnikov, ki jih aktivno potrebujes — ampak premisli, koliko jih imas hkrati aktivnih.","why_it_matters":"Nepotrebni MCP strežniki so tihi porabniki konteksta. Aktivnih 5 strežnikov z 20 orodji zasede precejsen del okna, preden sploh zacznete delati.","sort_order":7},{"id":42,"section_id":6,"name":"Subagenti","icon":"ti-users","badge_type":"when","badge_text":"Čist kontekst","short_desc":"Tecejo z locenim kontekstom — vrnejo samo rezultat, tvoj glavni kontekst ostane cist","what_it_does":"Subagenti so loceni agenti z lastnim kontekstnim oknom. Opravijo specificno nalogo (npr. poiscejo vse authentication endpointe) in vrnejo samo rezultat — brez da bi obremenili tvoj glavni kontekst.","when_to_use":"Za naloge, kjer potrebujes samo odgovor, ne celotnega procesa: iskanje po kodi, analiza datoteke, preverjanje dokumentacije.","when_not":"Ne za naloge, kjer Claude potrebuje ves kontekst tvoje seje — tam subagent ne bo imel dovolj informacij.","why_it_matters":"Subagenti so paralelna racunska moc s locenim kontekstom. Delegiras iskanje, dobis odgovor — tvoj kontekst ostane cist za dejansko delo.","sort_order":8}],"notes":[{"id":27,"section_id":6,"note_type":"youtube","content":"eW3oTyfeWZ0","sort_order":-3},{"id":28,"section_id":6,"note_type":"desc","content":"Kontekst je Claude-ova delovna memoria. Vsak prompt, vsaka prebrana datoteka, vsak rezultat orodja zasede prostor v kontekstnem oknu — in ker je prostora omejeno, je upravljanje konteksta kljucno za dolge, produktivne seje.","sort_order":-2},{"id":29,"section_id":6,"note_type":"tip","content":"Ukaze /compact, /clear in /context vtipkas direktno v pogovorno polje med sejo — ni jih treba pomniti, dovolj je, da ves, da obstajajo.","sort_order":-1},{"id":30,"section_id":6,"note_type":"subsection-header","content":"/compact ali /clear?","sort_order":10},{"id":31,"section_id":6,"note_type":"tip","content":"/compact = nadaljuj z manj suma (Claude ohrani spomin). /clear = nov zacetek za novo nalogo — prej shrani vse pomembno v CLAUDE.md.","sort_order":11},{"id":32,"section_id":6,"note_type":"warning","content":"/clear izbrise ves kontekst brez moznosti povratka. Preden ga pozenete, premisli: bo Claude v novi seji potreboval kaj iz te? Ce da — shrani v CLAUDE.md.","sort_order":12}],"questions":[{"id":49,"q":"Kaj zapolni prostor v kontekstnem oknu?","options":["Samo tvoji prompti","Prompti, prebrane datoteke, ukazi in rezultati orodij","Samo rezultati ukazov","Samo koda projekta"],"correct":1,"explanation":"Vsak prompt, vsaka prebrana datoteka, vsak zagnani ukaz in vsak rezultat orodja zasede del kontekstnega okna."},{"id":50,"q":"Kaj se zgodi, ko se kontekstno okno napolni?","options":["Claude Code se ustavi","Claude samodejno stisne pogovor in odstrani nepotrebne rezultate","Izgubi se ves kontekst","Seja se zakljuci"],"correct":1,"explanation":"Samodejni compaction stisne pogovor in odstrani nepotrebne rezultate orodij, da sprosti prostor. Del konteksta se ob tem izgubi."},{"id":51,"q":"Ali samodejni compaction vedno ohrani vse podrobnosti?","options":["Da, brez izgube","Ne — del konteksta se ob compactionu vedno izgubi","Samo izgubi rezultate orodij","Odvisno od projekta"],"correct":1,"explanation":"Samodejni compaction je varnostna mreza, ne brez stroskov. Del konteksta — podrobnosti in rezultati — se ob stiskanju izgubi."},{"id":52,"q":"Kaj naredi ukaz /compact?","options":["Izbrise ves kontekst","Rocno stisne pogovor — Claude ohrani spomin, a odstrani nepotrebne podrobnosti","Pokaze pregled porabe konteksta","Zapre sejo"],"correct":1,"explanation":"/compact rocno stisne vse do tega trenutka. Claude ohrani spomin na potek dela, a odstrani podrobnosti, ki jih ne potrebuje vec."},{"id":53,"q":"Kaj naredi ukaz /clear?","options":["Stisne kontekst","Odstrani samo rezultate orodij","Izbrise celoten kontekst — Claude zacne popolnoma sveze brez spomina","Pokaze stanje konteksta"],"correct":2,"explanation":"/clear odstrani VSE — pogovor, datoteke, rezultate. Claude nima nobenega spomina na prejsnjo sejo."},{"id":54,"q":"Kdaj je /compact boljsa izbira kot /clear?","options":["Ko zacrneš novo, nepovezano nalogo","Ko hoces nadaljevati isto nalogo z manj suma, brez izgube niti","Ko je kontekstno okno popolnoma prazno","Ko Claude naredi napako"],"correct":1,"explanation":"/compact je za nadaljevanje — ohrani sp
