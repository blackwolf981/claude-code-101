tings.json (ekipni, v repo).","when_to_use":"PostToolUse + 'Edit|Write' = auto-formatting. PreToolUse + exit 2 = hard block varnostnih pravil. Stop = obvestilo ob zaključku dolge naloge. .claude/settings.json v repo = ekipni hooks.","when_not":"Exit 2 brez sporočila = Claude ne ve zakaj in ponavlja. Hooks niso za soft suggestions — samo za deterministična, neizogibna pravila.","why_it_matters":"Izpitna past: exit koda 2 ne samo blokira — pošlje tudi feedback Claudu. Katera koli DRUGA koda ne blokira. To je specifičen, preverljiv detajl."},{"id":89,"section_id":13,"name":"Subagents — ključni koncepti","icon":"ti-robot","badge_type":"when","badge_text":"Referenca","short_desc":"Ločen kontekst, vzporednost, /agents, YAML, persistent memory, preload skills","what_it_does":"<strong>Kontekst</strong>: teče v svojem oknu — brez zgodovine tvoje seje, tvoj kontekst ostane čist.<br><strong>Ustvariš</strong>: /agents → 'Create new agent' (vodeni čarovnik).<br><strong>Format</strong>: Markdown .md z YAML frontmatter (ime, opis, orodja, prompt).<br><strong>Vzporedno</strong>: več subagentov hkrati za neodvisne naloge.<br><strong>Persistent memory</strong>: zapomni kontekst med sejami.<br><strong>Preload skills</strong>: skills ključ v YAML — naloži ob zagonu.","when_to_use":"Code reviewer pred PR-jem (read-only). Research in analiza po kodi. Vzporedna analiza neodvisnih delov. Specializirani subagenti z domenskim znanjem prek preload skills.","when_not":"Ne za naloge ki potrebujejo ves kontekst tvoje seje — subagent začne brez zgodovine pogovora. Ne za enkratne enostavne naloge.","why_it_matters":"Vprašanje na izpitu: zakaj je subagent boljši za code review? Svež kontekst brez pristranskosti pisanja kode — ujame kar glavna seja spregleda."},{"id":90,"section_id":13,"name":"Git workflow","icon":"ti-git-commit","badge_type":"when","badge_text":"Referenca","short_desc":"Subagent reviewer → /commit-push-pr → --from-pr za nadaljevanje po prekinitvi","what_it_does":"<strong>Subagent reviewer</strong>: read-only konfiguracija, svež pogled pred vsakim PR-jem.<br><strong>/commit-push-pr</strong>: commit + push + PR ustvaritev v enem koraku.<br><strong>Slack MCP</strong>: ob PR-ju samodejno objavi link v kanal (zahteva nastavitev).<br><strong>--from-pr &lt;ŠTEVILKA&gt;</strong>: obnovi kontekst PR-ja ustvarjenega prek gh pr create — nadaljuj po prekinitvi.","when_to_use":"Subagent reviewer pred vsakim PR-jem. /commit-push-pr ko si zadovoljen s kodo in review je opravljen. --from-pr ko se vračaš po review komentarjih ali CI napaki.","when_not":"/commit-push-pr ne za vmesne commite med razvojem. --from-pr ni potreben, če imaš sejo ki je ustvarila PR še odprto.","why_it_matters":"--from-pr obnovi kontekst PR-ja — ključno vprašanje: kdaj ga uporabiti? Ko se vračaš po prekinitvi na PR ki je bil ustvarjen prek gh pr create."},{"id":91,"section_id":13,"name":"Explore → Plan → Code → Commit","icon":"ti-refresh","badge_type":"when","badge_text":"Workflow","short_desc":"4-fazni workflow — vsaka faza ima namen, orodje in pravi trenutek za course-correct","what_it_does":"<strong>Explore</strong>: Plan Mode zbere kontekst — brez sprememb, samo razumevanje projekta.<br><strong>Plan</strong>: Claude sestavi načrt, ti odobriš — course-correct je tu brezplačen.<br><strong>Code</strong>: Approval ali Auto-accept; definiraj success criteria in test suite v promptu.<br><strong>Commit</strong>: subagent reviewer → /commit-push-pr.<br><strong>CLAUDE.md</strong>: shrani rešitve ponavljajočih se težav za naslednje seje.","when_to_use":"Vsakič za večjo nalogo. Explore + Plan sta naložba v kakovost Code faze. Brez tega večina začetnikov skače v Code in porablja čas za popravljanje napak.","when_not":"Ne za trivialne enodatotečne spremembe — Explore in Plan sta tam odvečna. Presodi glede na kompleksnost in tveganje naloge.","why_it_matters":"Najpomembnejši workflow v tečaju. Izpitno vprašanje: kdaj je course-correct najcenejši? V Plan fazi — preden je karkoli izvedeno. Napaka v načrtu stane nič, napaka v kodi stane čas."}],"notes":[{"id":61,"section_id":13,"note_type":"desc","content":"Ta lekcija je tvoj kompaktni pregled pred certifikatom. Vsaka kartica povzema ključne koncepte enega področja — v gostejši, referenčni obliki kot posamezne lekcije. Skupaj s Total Quizom je to tvoja zadnja postaja pred izpitom.","sort_order":-2},{"id":62,"section_id":13,"note_type":"tip","content":"Certifikatski izpit testira razumevanje konceptov in razlik med njimi — ne zapomnitve ukazov. Fokusiraj se na ZAKAJ in KDAJ, ne samo na KAJ.","sort_order":-1},{"id":63,"section_id":13,"note_type":"subsection-header","content":"Najpogostejše pasti na izpitu","sort_order":10},{"id":64,"section_id":13,"note_type":"warning","content":"<strong>Tri pasti:</strong> (1) Auto-accept Mode še vedno zahteva potrditev za terminalne ukaze — samo datoteke so samodejne. (2) /compact ≠ /clear — ohrani spomin vs izbriše vse. (3) Exit koda 2 v Hooks ne samo blokira — pošlje feedback Claudu. Katera koli DRUGA koda ne blokira.","sort_order":11}],"questions":[{"id":107,"q":"Auto-accept Mode samodejno sprejema spremembe datotek. Kaj pa terminalni ukazi?","options":["Tudi terminalni ukazi se izvedejo samodejno","Terminalni ukazi (npm, git, rm…) še vedno zahtevajo potrditev","Terminalni ukazi so v Auto-accept Mode onemogočeni","Odvisno od nastavitev terminala"],"correct":1,"explanation":"Auto-accept Mode ne pomeni vse samodejno. Spremembe datotek so samodejne, terminalni ukazi pa še vedno zahtevajo potrditev — to je pogosta napačna predpostavka."},{"id":108,"q":"Delaš na kompleksni nalogi, kontekst se polni. Hočeš nadaljevati brez izgube niti. Kateri ukaz?","options":["/clear — popolna ponastavitev","/compact — stisni, ohrani spomin, nadaljuj","/context — diagnostika stanja","Restaraj sejo"],"correct":1,"explanation":"/compact ročno stisne pogovor, ohrani spomin na potek dela in sprosti prostor. /clear bi izbrisal VSE — izgubil bi celoten kontekst naloge."},{"id":109,"q":"Kaj NIKOLI ne smeš shraniti v CLAUDE.md?","options":["Ukaze za zagon dev serverja","Arhitekturne odločitve projekta","API ključe in gesla","Kodni slog in konvencije"],"correct":2,"explanation":"CLAUDE.md je besedilna datoteka commitana v version control — vidna vsem z dostopom do repozitorija. API ključi in gesla tam nimajo mesta nikoli."},{"id":110,"q":"Tvoj PreToolUse hook vrne exit kodo 2 z besedilom na stderr. Kaj se zgodi?","options":["Hook se je sesul — napaka se ignorira","Claude se ustavi brez razlage","Akcija je blokirana IN Claude dobi sporočilo kot feedback ter se prilagodi","Akcija se izvede, napaka se zapiše v log"],"correct":2,"explanation":"Exit 2 = blokiraj + stderr sporočilo gre Claudu kot feedback. Claude razume zakaj je bil ustavljen in predlaga alternativo — ne samo slepa blokada."},{"id":111,"q":"Hočeš, da cel team samodejno dobi iste MCP strežnike ob kloniranju repozitorija. Kateri scope?","options":["Local scope","User scope (~/.claude/)","Project scope prek .mcp.json v repozitoriju","Global scope prek CLAUDE.md"],"correct":2,"explanation":"Project scope zahteva .mcp.json datoteko v repozitoriju. Ko ekipa klonira repo, dobijo enake MCP strežnike samodejno — brez ročnega nastavljanja za vsakega."},{"id":112,"q":"Katera je ključna razlika med CLAUDE.md in Skills glede nalaganja v kontekst?","options":["CLAUDE.md se naloži na zahtevo, Skills vedno","CLAUDE.md se naloži vedno ob vsaki seji, Skills samo ko jih eksplicitno pokličeš","Oba se naložita vedno — razlika je samo v formatu","Skills se naložijo ob zagonu Claude Code, CLAUDE.md na zahtevo"],"correct":1,"explanation":"CLAUDE.md je vedno v kontekstu — samodejno doda k vsakemu promptu. Skill se naloži samo ko ga pokličeš z /skill ali referenco. To je bistvena razlika za upravljanje kontekstnega prostora."},{"id":113,"q":"Zakaj je subagent boljši za code review kot glavna seja?","options":["Ker je hitrejši pri branju kode","Ker ima dostop do interneta","Ker teče brez konteksta pisanja kode — svež pogled brez pristranskosti","Ker pozna vse kodne konvencije projekta"],"correct":2,"explanation":"Glavna seja nosi ves kontekst pisanja kode in z njim slepe pege — težje opazi lastne napake. Subagent začne svež, brez tega konteksta, in ujame kar glavna seja spregleda."},{"id":114,"q":"Hočeš, da Claude po vsakem urejanju datoteke samodejno požene formatter. Kateri hook?","options":["PreToolUse — teče pred urejanjem","UserPromptSubmit — teče ob vnosu","PostToolUse z matcherjem 'Edit|Write'","Stop — teče ob zaključku"],"correct":2,"explanation":"PostToolUse se izvede takoj ko orodje zaključi. Matcher 'Edit|Write' zagotovi, da se hook sproži samo ob urejanju/pisanju datotek — ne pri vsakem klicu orodja."},{"id":115,"q":"V kateri fazi workflowa Explore → Plan → Code → Commit je course-correct najcenejši?","options":["Explore — takoj na začetku","Plan — preden je karkoli izvedeno","Code — ko je koda že vidna","Commit — na samem koncu"],"correct":1,"explanation":"Plan faza je pred izvedbo — napaka v načrtu stane nič. Ko je koda enkrat napisana, je popravek dražji. Plan faza je varnostna mreža, ne administrativni korak."},{"id":116,"q":"Kateri ukaz obnovi kontekst PR-ja in nadaljuje sejo po review komentarjih?","options":["/compact z ID PR-ja","claude --resume","claude --from-pr <ŠTEVILKA>","/mcp pr connect"],"correct":2,"explanation":"claude --from-pr <ŠTEVILKA> obnovi kontekst PR-ja ustvarjenega prek gh pr create — nadaljuješ točno tam kjer si ostal, brez ponovnega razlaganja."},{"id":117,"q":"Kateri PreToolUse exit kodi BLOKIRATA akcijo?","options":["Samo exit 0","Samo exit 2","Exit 2 in vse kode razen 0","Samo exit 1"],"correct":1,"explanation":"Samo exit koda 2 blokira akcijo in pošlje feedback Claudu. Exit 0 = nadaljuj. Katera koli DRUGA koda (1, 3, ...) = neblokirajoča napaka vidna samo tebi — Claude ne ve zanjo in nadaljuje."},{"id":118,"q":"Hočeš dati Claudu dostop do Linear (projektno orodje) za celoten team. Kateri tip strežnika in kateri scope?","options":["Stdio strežnik, Local scope","HTTP strežnik, User scope","HTTP strežnik, Project scope (.mcp.json v repo)","Stdio strežnik, Project scope"],"correct":2,"explanation":"Linear je oddaljena storitev → HTTP strežnik. Za ekipno deljenje → Project scope z .mcp.json v repozitoriju. Cel team dobi samodejno ob kloniranju."}]}]}];

let currentLang       = 'sl';
let currentChapterId  = 1;
let currentSectionId  = null;
let currentView       = 'cards';
let selectedFeatureId = null;

// Quiz config — all questions shown (no limit per tier)
// Active quiz object (null when no quiz running)
// { scope:'lesson'|'chapter'|'total', pool:[...], idx:0, correct:0, answered:false }
let quiz = null;

const LANGS = [
  {code:'sl',label:'SL'},{code:'it',label:'IT'},{code:'de',label:'DE'},
  {code:'fr',label:'FR'},{code:'pl',label:'PL'},{code:'en',label:'EN'},
];

/* ── Sidebar ────────────────────────────────────────────────────── */
function renderSidebar() {
  const nav = document.getElementById('sb-nav');
  nav.innerHTML = '';

  DATA.forEach(ch => {
    const isActive = ch.id === currentChapterId;

    const chBtn = document.createElement('button');
    chBtn.className = 'ch-btn' + (isActive ? ' active' : '');
    chBtn.innerHTML = `
      <div class="ch-btn-inner">
        <span class="ch-part">Poglavje ${ch.id}</span>
        <span class="ch-name">${ch.title}</span>
      </div>`;
    chBtn.onclick = () => {
      currentChapterId = ch.id;
      currentSectionId = null;
      selectedFeatureId = null;
      quiz = null;
      render();
    };
    nav.appendChild(chBtn);

    const sec = document.createElement('div');
    sec.className = 'ch-sections';

    // Lesson items — always visible for all chapters
    ch.sections.forEach(s => {
      const isCur = s.id === currentSectionId && !quiz;
      const item = document.createElement('div');
      item.className = 'sidebar-item' + (isCur ? ' active' : '');
      item.innerHTML = `
        <span class="si-lesson">${s.lesson}</span>
        <span class="si-title">${s.title.split(':')[0].trim()}</span>`;
      item.onclick = () => { currentSectionId = s.id; selectedFeatureId = null; quiz = null; render(); };
      sec.appendChild(item);
    });

    nav.appendChild(sec);
  });

  // Total Quiz — special entry at the bottom
  const totalBtn = document.createElement('button');
  totalBtn.className = 'ch-total-btn' + (quiz && quiz.scope === 'total' ? ' active' : '');
  totalBtn.innerHTML = `
    <i class="ti ti-trophy" aria-hidden="true"></i>
    <div class="ch-total-inner">
      <span class="ch-total-part">Zaključni izziv</span>
      <span class="ch-total-name">Total Claude Code 101 kviz</span>
    </div>`;
  totalBtn.onclick = () => startQuiz('total');
  nav.appendChild(totalBtn);

  // Language switcher
  const grid = document.getElementById('lang-grid');
  grid.innerHTML = '';
  LANGS.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (l.code === currentLang ? ' active' : '');
    btn.textContent = l.label;
    btn.onclick = () => { currentLang = l.code; render(); };
    grid.appendChild(btn);
  });
}

function toggleRefl(id) { document.getElementById(id)?.classList.toggle('open'); }

/* ── Chapter Overview ──────────────────────────────────────────── */
function renderChapterOverview(ch) {
  const panel = document.getElementById('lesson-panel');
  if (!ch) return;

  let html = `
    <h1 class="sr-only">Poglavje ${ch.id}: ${ch.title}</h1>
    <div class="ch-overview">
      <div class="ch-overview-header">
        <div class="ch-overview-num">Poglavje ${ch.id}</div>
        <div class="ch-overview-title">${ch.title}</div>
      </div>

      <div class="ch-overview-block">
        <div class="ch-overview-block-title">Learning Objectives</div>
        <ul class="ch-obj-list">
          ${ch.objectives.map(o => `<li>${o}</li>`).join('')}
        </ul>
      </div>

      <div class="ch-overview-block">
        <div class="ch-overview-block-title">Lekcije</div>
        <div class="ch-lesson-list">
          ${ch.sections.map(s => `
            <div class="ch-lesson-card" onclick="goToLesson(${ch.id}, ${s.id})">
              <div class="ch-lesson-card-left">
                <span class="ch-lesson-card-num">${s.lesson}</span>
                <span class="ch-lesson-card-title">${s.title.split(':')[0].trim()}</span>
              </div>
              <i class="ti ti-chevron-right" aria-hidden="true"></i>
            </div>`).join('')}
        </div>
      </div>`;

  if (ch.reflections?.length) {
    html += `
      <div class="ch-overview-block">
        <div class="ch-overview-block-title">Refleksija</div>
        <div class="ch-refl-list">`;
    ch.reflections.forEach((r, i) => {
      const [q, hint] = r.split('|');
      const id = `chrefl-${ch.id}-${i}`;
      html += `
          <div class="ch-refl-item" onclick="toggleRefl('${id}')">
            <i class="ti ti-help-circle" aria-hidden="true"></i><span>${q}</span>
          </div>
          <div class="ch-refl-hint" id="${id}">${hint || ''}</div>`;
    });
    html += `</div></div>`;
  }

  // Chapter quiz block (inline, at bottom of overview)
  const chAllQ = collectQuestions('chapter', ch.id);
  if (chAllQ.length) {
    html += `<div id="quiz-anchor"></div>`;
    if (quiz && quiz.scope === 'chapter' && quiz.id === ch.id) {
      html += quizEngineHTML();
    } else {
      html += `
        <div class="quiz-start-block">
          <div class="quiz-start-icon">🧠</div>
          <div class="quiz-start-title">Preveri poglavje</div>
          <div class="quiz-start-desc">${chAllQ.length} vprašanj iz vseh lekcij tega poglavja. Naključni vrstni red, rezultat na koncu.</div>
          <button class="quiz-btn" onclick="startQuiz('chapter', ${ch.id})"><i class="ti ti-player-play"></i> Začni kviz</button>
        </div>`;
    }
  }

  html += `</div>`;
  panel.innerHTML = html;
}

function goToLesson(chId, secId) {
  currentChapterId = chId;
  currentSectionId = secId;
  selectedFeatureId = null;
  render();
}

/* ── Lesson ─────────────────────────────────────────────────────── */
function renderLesson() {
  const ch  = DATA.find(c => c.id === currentChapterId);

  // Chapter overview mode
  if (currentSectionId === null) {
    renderChapterOverview(ch);
    return;
  }

  const sec = ch?.sections.find(s => s.id === currentSectionId);
  if (!sec) return;

  const panel    = document.getElementById('lesson-panel');
  const prenotes = [...sec.notes].filter(n => n.sort_order <= 0).sort((a,b) => a.sort_order - b.sort_order);
  const postnotes= [...sec.notes].filter(n => n.sort_order >  0).sort((a,b) => a.sort_order - b.sort_order);
  const features = [...sec.features].sort((a,b) => a.sort_order - b.sort_order);

  const parts    = sec.title.split(':');
  const secTitle = parts[0].trim();
  const secSub   = parts.length > 1 ? parts.slice(1).join(':').trim() : '';

  let html = `
    <h1 class="sr-only">Lekcija: ${sec.title}</h1>
    <div class="sec-lesson">${sec.lesson} · Poglavje ${ch.id}</div>
    <div class="sec-title">${secTitle}</div>
    ${secSub ? `<div class="sec-sub">${secSub}</div>` : '<div class="sec-gap"></div>'}
  `;

  prenotes.forEach(n => { html += renderNote(n); });

  html += `
    <div class="view-toggle">
      <span class="view-label">Pogled:</span>
      <button class="view-btn ${currentView==='cards'?'active':''}" onclick="setView('cards')">
        <i class="ti ti-layout-grid" aria-hidden="true"></i> Kartice
      </button>
      <button class="view-btn ${currentView==='table'?'active':''}" onclick="setView('table')">
        <i class="ti ti-table" aria-hidden="true"></i> Tabela
      </button>
    </div>`;

  // Cards
  html += `<div class="feature-grid${currentView==='table'?' hide':''}" id="feat-grid">`;
  features.forEach(f => {
    html += `<div class="feature-card${f.id===selectedFeatureId?' selected':''}" onclick="selectFeature(${f.id})">
      <span class="badge badge-${f.badge_type}">${f.badge_text}</span>
      <p class="feature-name"><i class="ti ${f.icon}" aria-hidden="true"></i>${f.name}</p>
      <p class="feature-desc">${f.short_desc}</p>
    </div>`;
  });
  html += `</div>`;

  // Table
  html += `<table class="features-table${currentView==='table'?' show':''}" id="feat-table">
    <thead><tr><th style="width:28%">Koncept</th><th style="width:18%">Tip</th><th>Opis</th></tr></thead>
    <tbody>`;
  features.forEach(f => {
    html += `<tr class="${f.id===selectedFeatureId?'row-selected':''}" onclick="selectFeature(${f.id})">
      <td><strong><i class="ti ${f.icon}" style="margin-right:.3rem;color:var(--text-ter)"></i>${f.name}</strong></td>
      <td><span class="badge badge-${f.badge_type}">${f.badge_text}</span></td>
      <td style="color:var(--text-sec)">${f.short_desc}</td>
    </tr>`;
  });
  html += `</tbody></table>`;

  // Inline detail panel 2×2
  if (selectedFeatureId !== null) {
    const f = features.find(feat => feat.id === selectedFeatureId);
    if (f) html += `
      <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
          <div class="detail-title">
            <i class="ti ${f.icon}" aria-hidden="true"></i>
            ${f.name}
            <span class="badge badge-${f.badge_type}">${f.badge_text}</span>
          </div>
          <button class="detail-close" onclick="selectFeature(${f.id})">
            <i class="ti ti-x"></i> Zapri
          </button>
        </div>
        <div class="detail-grid">
          <div class="detail-cell">
            <div class="detail-cell-label">Kaj dela</div>
            <div class="detail-cell-val">${f.what_it_does}</div>
          </div>
          <div class="detail-cell">
            <div class="detail-cell-label">Kdaj uporabiti</div>
            <div class="detail-cell-val">${f.when_to_use}</div>
          </div>
          <div class="detail-cell">
            <div class="detail-cell-label">Kdaj NE</div>
            <div class="detail-cell-val">${f.when_not}</div>
          </div>
          <div class="detail-cell">
            <div class="detail-cell-label">Zakaj to šteje</div>
            <div class="detail-cell-val">${f.why_it_matters}</div>
          </div>
        </div>
      </div>`;
  }

  postnotes.forEach(n => { html += renderNote(n); });

  // ── Lesson quiz block (inline) ──
  if (sec.questions && sec.questions.length) {
    html += `<div id="quiz-anchor"></div>`;
    if (quiz && quiz.scope === 'lesson' && quiz.id === sec.id) {
      html += quizEngineHTML();
    } else {
      html += `
        <div class="quiz-start-block">
          <div class="quiz-start-icon">🧠</div>
          <div class="quiz-start-title">Preveri lekcijo</div>
          <div class="quiz-start-desc">${sec.questions.length} vprašanj o tej lekciji. Naključni vrstni red, rezultat na koncu.</div>
          <button class="quiz-btn" onclick="startQuiz('lesson', ${sec.id})"><i class="ti ti-player-play"></i> Začni kviz</button>
        </div>`;
    }
  }

  panel.innerHTML = html;

  if (selectedFeatureId !== null && !quiz) {
    requestAnimationFrame(() =>
      document.getElementById('detail-panel')?.scrollIntoView({behavior:'smooth', block:'nearest'})
    );
  }
}

function renderNote(n) {
  switch (n.note_type) {
    case 'youtube':
      return `<div class="note-youtube">
        <iframe src="https://www.youtube.com/embed/${n.content}?rel=0"
          title="Lekcija — video" allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
        </iframe></div>`;
    case 'desc':
      return `<p class="note-desc">${n.content}</p>`;
    case 'tip':
      return `<div class="note-tip"><i class="ti ti-info-circle" aria-hidden="true"></i><span>${n.content}</span></div>`;
    case 'warning':
      return `<div class="note-warning"><i class="ti ti-alert-triangle" aria-hidden="true"></i><span>${n.content}</span></div>`;
    case 'subsection-header':
      return `<div class="note-subsection">${n.content}</div>`;
    default: return '';
  }
}

/* ── View + Feature select ──────────────────────────────────────── */
function setView(v) { currentView = v; renderLesson(); }

function selectFeature(id) {
  selectedFeatureId = (selectedFeatureId === id) ? null : id;
  renderLesson();
}

/* ── Quiz engine ────────────────────────────────────────────────── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Collect question pool by scope. lesson→id=sectionId, chapter→id=chapterId, total→all
function collectQuestions(scope, id) {
  let qs = [];
  if (scope === 'lesson') {
    DATA.forEach(ch => ch.sections.forEach(s => { if (s.id === id) qs = (s.questions || []).slice(); }));
  } else if (scope === 'chapter') {
    const ch = DATA.find(c => c.id === id);
    if (ch) ch.sections.forEach(s => qs.push(...(s.questions || [])));
  } else { // total
    DATA.forEach(ch => ch.sections.forEach(s => qs.push(...(s.questions || []))));
  }
  return qs;
}

function startQuiz(scope, id) {
  const all = collectQuestions(scope, id);
  if (!all.length) return;
  quiz = { scope, id, pool: shuffle(all), idx: 0, correct: 0, answered: false, selected: null };

  if (scope === 'lesson') {
    renderLesson();
    requestAnimationFrame(() =>
      document.getElementById('quiz-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' })
    );
  } else if (scope === 'chapter') {
    currentSectionId = null;
    render();
    requestAnimationFrame(() =>
      document.getElementById('quiz-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' })
    );
  } else {
    currentSectionId = null;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function answerQuiz(oi) {
  if (!quiz || quiz.answered) return;
  quiz.answered = true;
  quiz.selected = oi;
  if (oi === quiz.pool[quiz.idx].correct) quiz.correct++;
  rerenderQuiz();
}

function nextQuiz() {
  if (!quiz) return;
  quiz.idx++;
  quiz.answered = false;
  quiz.selected = null;
  rerenderQuiz();
}

function restartQuiz() { if (quiz) startQuiz(quiz.scope, quiz.id); }

function exitQuiz() {
  if (!quiz) return;
  const { scope, id } = quiz;
  quiz = null;
  if (scope === 'chapter') { currentChapterId = id; currentSectionId = null; }
  render();
}

function rerenderQuiz() {
  if (!quiz) return;
  if (quiz.scope === 'total') renderQuizPanel();
  else renderLesson();
}

// Renders the shared quiz UI (question + options + progress, or final score)
function quizEngineHTML() {
  const total = quiz.pool.length;

  // Final screen
  if (quiz.idx >= total) {
    const pct = Math.round(quiz.correct / total * 100);
    const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '💪';
    const msg = pct >= 80 ? 'Odlično! Snov ti je jasna.'
              : pct >= 50 ? 'Dobro! Ponovi, kar je zmanjkalo.'
              : 'Še en krog ti bo pomagal.';
    return `
      <div class="quiz-engine">
        <div class="quiz-engine-body">
          <div class="quiz-final">
            <div class="quiz-final-emoji">${emoji}</div>
            <div class="quiz-final-score">${quiz.correct}/${total}</div>
            <div class="quiz-final-pct">${pct}% pravilnih</div>
            <div class="quiz-final-msg">${msg}</div>
            <div class="quiz-final-actions">
              <button class="quiz-btn" onclick="restartQuiz()"><i class="ti ti-refresh"></i> Igraj znova</button>
              <button class="quiz-btn-ghost" onclick="exitQuiz()"><i class="ti ti-x"></i> Zapri</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  // Active question
  const q = quiz.pool[quiz.idx];
  const letters = ['A','B','C','D','E','F'];
  const done = quiz.answered ? quiz.idx + 1 : quiz.idx;
  const pct = Math.round(done / total * 100);

  const opts = q.options.map((opt, oi) => {
    let cls = 'quiz-option';
    if (quiz.answered) {
      cls += ' answered';
      if (oi === q.correct) cls += (oi === quiz.selected) ? ' correct' : ' reveal';
      else if (oi === quiz.selected) cls += ' wrong';
    }
    const click = quiz.answered ? '' : ` onclick="answerQuiz(${oi})"`;
    return `<div class="${cls}"${click}>
      <span class="quiz-option-letter">${letters[oi]}</span><span>${opt}</span>
    </div>`;
  }).join('');

  let foot = '';
  if (quiz.answered) {
    const isLast = quiz.idx === total - 1;
    foot = `<div class="quiz-engine-foot">
      <button class="quiz-btn" onclick="nextQuiz()">
        ${isLast ? '<i class="ti ti-flag"></i> Zaključek' : '<i class="ti ti-arrow-right"></i> Naprej'}
      </button>
    </div>`;
  }

  return `
    <div class="quiz-engine">
      <div class="quiz-bar">
        <span class="quiz-bar-count">Vprašanje <span>${quiz.idx + 1}</span> / ${total}</span>
        <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="quiz-engine-body">
        <div class="quiz-question">${q.q}</div>
        <div class="quiz-options">${opts}</div>
        <div class="quiz-explain ${quiz.answered ? 'show' : ''}">${q.explanation}</div>
        ${foot}
      </div>
    </div>`;
}

// Full-panel quiz (chapter / total)
function renderQuizPanel() {
  const panel = document.getElementById('lesson-panel');
  let label, title;
  if (quiz.scope === 'chapter') {
    const ch = DATA.find(c => c.id === quiz.id);
    label = `Kviz · Poglavje ${quiz.id}`;
    title = ch ? ch.title : 'Kviz poglavja';
  } else {
    label = 'Zaključni izziv';
    title = 'Total Claude Code 101 kviz';
  }
  panel.innerHTML = `
    <h1 class="sr-only">${title} — kviz</h1>
    <div class="quiz-panel-header">
      <div class="quiz-panel-label">${label}</div>
      <div class="quiz-panel-title">${title}</div>
    </div>
    ${quizEngineHTML()}`;
}

/* ── Boot ───────────────────────────────────────────────────────── */
function render() {
  renderSidebar();
  if (quiz && quiz.scope === 'total') renderQuizPanel();
  else renderLesson();
}
render();
</script>
